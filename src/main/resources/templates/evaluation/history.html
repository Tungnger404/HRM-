<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>Evaluation History - HRM System</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid">
        <div class="row mb-4">
            <div class="col-12">
                <h2>My Evaluation History</h2>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <strong>Evaluation Records</strong>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Cycle</th>
                                        <th>Period</th>
                                        <th>Reviewed At</th>
                                        <th>Self Score</th>
                                        <th>Manager Score</th>
                                        <th>Total Score</th>
                                        <th>Classification</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="evaluationTableBody">
                                    <tr th:if="${#lists.isEmpty(evaluations)}">
                                        <td colspan="9" class="text-center text-muted">No evaluation records found</td>
                                    </tr>
                                    <tr th:each="eval : ${evaluations}">
                                        <td th:text="${eval.cycleId != null ? 'Cycle ' + eval.cycleId : 'N/A'}">Cycle 1</td>
                                        <td th:text="${eval.assignedAt != null ? #temporals.format(eval.assignedAt, 'dd/MM/yyyy') + ' - ' + (eval.managerReviewedAt != null ? #temporals.format(eval.managerReviewedAt, 'dd/MM/yyyy') : 'Ongoing') : 'N/A'}">01/01/2024 - 31/03/2024</td>
                                        <td th:text="${eval.managerReviewedAt != null ? #temporals.format(eval.managerReviewedAt, 'dd/MM/yyyy HH:mm') : 'Not reviewed yet'}">15/01/2024 14:30</td>
                                        <td><span class="badge bg-info" th:text="${eval.selfScore != null ? eval.selfScore : 'N/A'}">85</span></td>
                                        <td><span class="badge bg-success" th:text="${eval.managerScore != null ? eval.managerScore : 'N/A'}">88</span></td>
                                        <td>
                                            <strong th:if="${eval.selfScore != null and eval.managerScore != null}" 
                                                    th:text="${(eval.selfScore + eval.managerScore) / 2.0}">86.5</strong>
                                            <span th:unless="${eval.selfScore != null and eval.managerScore != null}">N/A</span>
                                            <br><small class="text-muted">(avg)</small>
                                        </td>
                                        <td>
                                            <span class="badge" 
                                                  th:classappend="${eval.classification == 'A' ? 'bg-success' : (eval.classification == 'B' ? 'bg-primary' : (eval.classification == 'C' ? 'bg-warning' : 'bg-danger'))}"
                                                  th:text="${eval.classification != null ? eval.classification : 'N/A'}">A</span>
                                        </td>
                                        <td><span class="badge bg-success" th:text="${eval.status}">COMPLETED</span></td>
                                        <td>
                                            <a th:href="@{/evaluation/detail/{id}(id=${eval.assignmentId})}" class="btn btn-sm btn-primary">
                                                <i class="fa fa-eye"></i> View
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="alert alert-info d-none" id="emptyState">
                            <i class="fa fa-info-circle"></i> No evaluation records found.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script>
        function viewDetail(evalId) {
            // TODO: Navigate to detail page
            window.location.href = '/evaluation/detail/' + evalId;
        }

        // TODO: Load actual data from API
        // fetch('/api/evaluation/employee/1')
        //   .then(response => response.json())
        //   .then(data => renderTable(data));
    </script>
</th:block>
</body>
</html>

<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      th:with="sidebar='sidebar-hr.html'">

<head>
    <title>Create Offer</title>
</head>

<body>
<div layout:fragment="content">
    <div class="container-fluid px-4">

        <h2 class="mb-4 fw-bold">Create Offer</h2>

        <div class="card shadow-sm">
            <div class="card-body">

                <form th:action="@{/offer/create}" method="post">

                    <input type="hidden"
                           name="candidateId"
                           th:value="${candidate.candidateId}" />
                    <!-- Salary -->
                    <div class="mb-3">
                        <label class="form-label">Salary (VND)</label>
                        <input type="number"
                               class="form-control"
                               name="salary"
                               required>
                    </div>

                    <!-- Start Date -->
                    <div class="mb-3">
                        <label class="form-label">Start Date</label>
                        <input type="date"
                               class="form-control"
                               name="startDate"
                               required>
                    </div>

                    <!-- Probation -->
                    <div class="mb-3">
                        <label class="form-label">Probation Period</label>
                        <input type="text"
                               class="form-control"
                               name="probation"
                               placeholder="Example: 2 months"
                               required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            Save Offer
                        </button>

                        <a th:href="@{/offer/list}" class="btn btn-secondary">
                            Cancel
                        </a>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>
</body>
</html>

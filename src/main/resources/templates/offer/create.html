<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      th:with="sidebar='sidebar-hr.html'">

<head>
    <title>Create Job Offer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .offer-container { max-width: 800px; }
        .candidate-mini-card {
            background: #f8fafc;
            border-left: 4px solid #2563eb;
            border-radius: 8px;
            padding: 15px 20px;
        }
        .form-label { font-weight: 600; color: #475569; font-size: 0.9rem; }
        .input-group-text { background-color: #f1f5f9; color: #64748b; border: 1px solid #dee2e6; }
        .card { border: none; border-radius: 16px; }
        .btn-save { background: #10b981; border: none; padding: 10px 25px; font-weight: 700; }
        .btn-save:hover { background: #059669; transform: translateY(-1px); }
    </style>
</head>

<body>
<div layout:fragment="content">
    <div class="container-fluid px-4 py-4">
        <div class="offer-container mx-auto">

            <div class="d-flex align-items-center mb-4">
                <a href="javascript:history.back()" class="btn btn-link text-decoration-none p-0 me-3 text-muted">
                    <i class="bi bi-arrow-left fs-4"></i>
                </a>
                <h2 class="fw-bold mb-0">Create Job Offer</h2>
            </div>

            <div class="candidate-mini-card shadow-sm mb-4">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <small class="text-uppercase fw-bold text-primary" style="font-size: 0.7rem;">Offering for</small>
                        <h5 class="fw-bold mb-0" th:text="${candidate.fullName}">Nguyen Van A</h5>
                        <small class="text-muted" th:text="${candidate.email}">candidate@email.com</small>
                    </div>
                    <div class="col-md-4 text-md-end">
                        <span class="badge bg-success-subtle text-success border border-success px-3 py-2 rounded-pill">
                             Final Evaluation: <span th:text="${candidate.screeningScore}"></span>/100
                        </span>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/offer/create}" method="post">
                        <input type="hidden" name="candidateId" th:value="${candidate.candidateId}" />

                        <div class="row g-4">
                            <div class="col-12">
                                <label class="form-label">Monthly Gross Salary (VND)</label>
                                <div class="input-group mb-2">
                                    <span class="input-group-text">₫</span>
                                    <input type="number"
                                           class="form-control form-control-lg fw-bold text-primary"
                                           name="salary"
                                           placeholder="e.g. 20000000"
                                           id="salaryInput"
                                           required>
                                </div>
                                <div id="salaryWords" class="small text-muted italic ps-2"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Tentative Start Date</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-calendar-event"></i></span>
                                    <input type="date"
                                           class="form-control"
                                           name="startDate"
                                           required>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Probation Period</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-hourglass-split"></i></span>
                                    <select class="form-select" name="probation" required>
                                        <option value="2 months">2 Months (Standard)</option>
                                        <option value="1 month">1 Month</option>
                                        <option value="No probation">No Probation</option>
                                        <option value="Other">Other...</option>
                                    </select>
                                </div>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Internal Remarks (Optional)</label>
                                <textarea class="form-control" rows="3" name="notes" placeholder="Any special conditions..."></textarea>
                            </div>

                            <hr class="my-4">

                            <div class="col-12 d-flex justify-content-end gap-3">
                                <a th:href="@{/offer/list}" class="btn btn-light px-4 rounded-pill">Cancel</a>
                                <button type="submit" class="btn btn-success btn-save rounded-pill shadow-sm">
                                    <i class="bi bi-send-fill me-2"></i> GENERATE & SAVE OFFER
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="mt-4 text-center">
                <p class="text-muted small">
                    <i class="bi bi-info-circle me-1"></i>
                    After saving, you can download the PDF version or send it directly to the candidate via email.
                </p>
            </div>
        </div>
    </div>
</div>

<script layout:fragment="script">
    // Optional: Real-time salary formatter to words (Simple version)
    const salaryInput = document.getElementById('salaryInput');
    const salaryWords = document.getElementById('salaryWords');

    salaryInput.addEventListener('input', function(e) {
        if (this.value) {
            const val = parseInt(this.value);
            salaryWords.innerText = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(val);
        } else {
            salaryWords.innerText = "";
        }
    });
</script>

</body>
</html>

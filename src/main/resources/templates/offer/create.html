<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      th:with="sidebar='sidebar-hr.html'">

<head>
    <title>Create Job Offer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .offer-container { max-width: 800px; }
        .candidate-mini-card {
            background: #f8fafc; border-left: 4px solid #2563eb;
            border-radius: 8px; padding: 15px 20px;
        }
        .form-label { font-weight: 600; color: #475569; font-size: 0.9rem; }
        .card { border: none; border-radius: 16px; }
        .btn-save { background: #10b981; border: none; padding: 10px 25px; font-weight: 700; color: white; }
        .btn-save:hover { background: #059669; transform: translateY(-1px); color: white; }
    </style>
</head>

<body>
<div layout:fragment="content">
    <div class="container-fluid px-4 py-4">
        <div class="offer-container mx-auto">
            <div class="d-flex align-items-center mb-4">
                <a th:href="@{/offer/list}" class="btn btn-link text-decoration-none p-0 me-3 text-muted">
                    <i class="bi bi-arrow-left fs-4"></i>
                </a>
                <h2 class="fw-bold mb-0">Create Job Offer</h2>
            </div>

            <div class="candidate-mini-card shadow-sm mb-4">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <small class="text-uppercase fw-bold text-primary" style="font-size: 0.7rem;">Offering for</small>
                        <h5 class="fw-bold mb-0" th:text="${candidate.fullName}">Nguyen Van A</h5>
                        <small class="text-muted" th:text="${candidate.email}">email@example.com</small>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/offer/save}" method="post">
                        <input type="hidden" name="candidateId" th:value="${candidate.candidateId}" />

                        <div class="row g-4">
                            <div class="col-12">
                                <label class="form-label">Monthly Gross Salary (VND)</label>
                                <div class="input-group mb-2">
                                    <span class="input-group-text">₫</span>
                                    <input type="number" class="form-control form-control-lg fw-bold text-primary"
                                           name="salary" placeholder="e.g. 20000000" id="salaryInput" required>
                                </div>
                                <div id="salaryWords" class="small text-muted italic ps-2"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Tentative Start Date</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-calendar-event"></i></span>
                                    <input type="date" class="form-control" name="startDate" required>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Probation Period</label>
                                <select class="form-select" name="probation" required>
                                    <option value="2 months">6 Months </option>
                                    <option value="2 months">5 Months </option>
                                    <option value="2 months">4 Months </option>
                                    <option value="2 months">3 Months </option>
                                    <option value="2 months">2 Months (Standard)</option>
                                    <option value="1 month">1 Month</option>
                                    <option value="No probation">No Probation</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Internal Remarks (Optional)</label>
                                <textarea class="form-control" rows="3" name="notes" placeholder="Notes..."></textarea>
                            </div>

                            <hr class="my-4">

                            <div class="col-12 d-flex justify-content-end gap-3">
                                <a th:href="@{/offer/manage}" class="btn btn-light px-4 rounded-pill">Cancel</a>
                                <button type="submit" class="btn btn-success btn-save rounded-pill shadow-sm">
                                    <i class="bi bi-send-fill me-2"></i> Generate & Save Offer
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script layout:fragment="script">
    const salaryInput = document.getElementById('salaryInput');
    const salaryWords = document.getElementById('salaryWords');
    salaryInput.addEventListener('input', function() {
        if (this.value) {
            salaryWords.innerText = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(this.value);
        } else { salaryWords.innerText = ""; }
    });
</script>
</body>
</html>

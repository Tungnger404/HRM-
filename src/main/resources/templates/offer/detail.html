<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      th:with="sidebar='sidebar-hr.html'">

<head>
    <title>Offer Details - HRM System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .detail-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .info-section-title { font-size: 0.8rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
        .readonly-field { background-color: #f8fafc !important; border-color: #e2e8f0 !important; color: #64748b; font-weight: 600; }
        .form-label { font-weight: 600; color: #334155; }
        .status-pill { padding: 6px 16px; border-radius: 100px; font-weight: 700; font-size: 0.85rem; }
        .btn-update { background: #2563eb; border: none; padding: 10px 25px; border-radius: 10px; font-weight: 600; transition: 0.3s; }
        .btn-update:hover { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3); }
    </style>
</head>

<div layout:fragment="content">
    <div class="container-fluid py-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-1">
                        <li class="breadcrumb-item"><a th:href="@{/offer/manage}">Offer Management</a></li>
                        <li class="breadcrumb-item active">Detail</li>
                    </ol>
                </nav>
                <h2 class="fw-bold text-dark">Offer Reference: <span th:text="${'#' + offer.offerId}"></span></h2>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-danger rounded-pill px-4">
                    <i class="bi bi-file-earmark-pdf me-2"></i>Export PDF
                </button>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card detail-card shadow-sm">
                    <div class="card-body p-4 p-md-5">
                        <form th:action="@{/offer/update}" th:object="${offer}" method="post">
                            <input type="hidden" th:field="*{offerId}"/>

                            <div class="info-section-title">Candidate & Job Information</div>

                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label class="form-label">Full Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                        <input type="text" th:value="*{candidate.fullName}" class="form-control readonly-field" readonly>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                                        <input type="text" th:value="*{candidate.email}" class="form-control readonly-field" readonly>
                                    </div>
                                </div>
                            </div>

                            <div class="info-section-title mt-5">Offer Terms</div>

                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label class="form-label">Monthly Salary (VND)</label>
                                    <div class="input-group input-group-lg">
                                        <span class="input-group-text bg-white border-end-0 text-success fw-bold">₫</span>
                                        <input type="number" th:field="*{salaryOffered}" class="form-control border-start-0 fw-bold" placeholder="0">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Joining Date</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white"><i class="bi bi-calendar-check"></i></span>
                                        <input type="date" th:field="*{startDate}" class="form-control">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Probation Period</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white"><i class="bi bi-clock-history"></i></span>
                                        <input type="text" th:field="*{probationPeriod}" class="form-control" placeholder="e.g. 2 months">
                                    </div>
                                </div>
                            </div>

                            <hr class="my-5">

                            <div class="d-flex justify-content-end gap-3">
                                <a th:href="@{/offer/manage}" class="btn btn-light rounded-pill px-4 fw-600">Cancel</a>
                                <button type="submit" class="btn btn-primary btn-update rounded-pill shadow-sm">
                                    <i class="bi bi-save2 me-2"></i>Update Offer Details
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card detail-card border-0 bg-dark text-white p-4">
                    <h5 class="fw-bold mb-4">Offer Insight</h5>

                    <div class="mb-4">
                        <small class="text-secondary d-block mb-2">Current Status</small>
                        <span class="status-pill bg-warning text-dark">Pending Review</span>
                    </div>

                    <div class="mb-4">
                        <small class="text-secondary d-block mb-1">Created Date</small>
                        <p class="fw-bold">March 11, 2026</p>
                    </div>

                    <div class="alert alert-secondary bg-secondary-subtle border-0 text-white small">
                        <i class="bi bi-info-circle me-2"></i>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
</html>

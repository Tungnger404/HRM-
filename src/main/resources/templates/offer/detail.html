<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      th:with="sidebar='sidebar-hr.html'">

<div layout:fragment="content">

    <div class="container mt-4">

        <h2 class="mb-4">Offer Detail</h2>

        <form th:action="@{/offer/update}"
              th:object="${offer}"
              method="post">

            <!-- ID (hidden) -->
            <input type="hidden" th:field="*{offerId}"/>

            <div class="mb-3">
                <label>Candidate</label>
                <input type="text"
                       th:value="*{candidate.fullName}"
                       class="form-control"
                       readonly>
            </div>

            <div class="mb-3">
                <label>Salary</label>
                <input type="number"
                       th:field="*{salaryOffered}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Start Date</label>
                <input type="date"
                       th:field="*{startDate}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Probation Period</label>
                <input type="text"
                       th:field="*{probationPeriod}"
                       class="form-control">
            </div>

            <button class="btn btn-primary">
                Save
            </button>

            <a th:href="@{/offer/manage}"
               class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>
</div>
</html>

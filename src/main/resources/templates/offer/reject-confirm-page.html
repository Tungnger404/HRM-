<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Xác nhận từ chối Offer | HRM System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .confirm-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 500px;
            text-align: center;
        }
        .icon-warning {
            width: 80px;
            height: 80px;
            background: #fff7ed;
            color: #f97316;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 24px;
            font-size: 40px;
        }
        .btn-confirm {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 30px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-confirm:hover {
            background: #dc2626;
            color: white;
        }
        .btn-cancel {
            background: #f1f5f9;
            color: #475569;
            border-radius: 12px;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="confirm-card">
    <div class="icon-warning">
        <i class="bi bi-exclamation-circle-fill"></i>
    </div>
    <h2 class="fw-bold mb-3">Xác nhận từ chối</h2>
    <p class="text-muted mb-4">
        Chào <strong th:text="${offer.candidate.fullName}">Ứng viên</strong>, <br>
        Bạn có chắc chắn muốn từ chối lời mời làm việc cho vị trí
        <strong class="text-dark" th:text="${offer.candidate.jobPosting.title}">Developer</strong>?
    </p>

    <div class="d-grid gap-2">
        <a th:href="@{'/offer/reject/' + ${offer.offerId} + '?confirmed=true'}" class="btn btn-confirm">
            Đúng, tôi muốn từ chối lời mời
        </a>
        <a href="/careers" class="btn btn-cancel">Tôi muốn suy nghĩ thêm</a>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông báo | HRM System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .info-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 450px;
            text-align: center;
        }
        .icon-info {
            width: 70px;
            height: 70px;
            background: #e0f2fe;
            color: #0ea5e9;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 20px;
            font-size: 32px;
        }
    </style>
</head>
<body>

<div class="info-card">
    <div class="icon-info">
        <i class="bi bi-info-circle-fill"></i>
    </div>
    <h3 class="fw-bold mb-3">Thông báo</h3>
    <p class="text-muted mb-4" th:text="${message}">
        Thao tác này đã được thực hiện trước đó.
    </p>
    <a href="/careers" class="btn btn-primary w-100 py-2" style="border-radius: 12px;">Quay lại trang chủ</a>
</div>

</body>
</html>

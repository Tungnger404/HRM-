<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      th:with="sidebar='sidebar-hr.html'">

<head>
    <title>Offer Management - HRM Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .page-header { background: #fff; padding: 1.5rem; border-radius: 16px; margin-bottom: 2rem; border: 1px solid #e2e8f0; }
        .table-card { border: none; border-radius: 16px; background-color: #fff; overflow: hidden; }
        .table thead th {
            background-color: #f8fafc;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.8px;
            font-weight: 700;
            color: #64748b;
            padding: 1rem;
            border-top: none;
        }
        .candidate-name { font-weight: 700; color: #1e293b; }
        .salary-text { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: #0f172a; }

        /* Status Badges Custom */
        .badge-status { padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 0.75rem; }
        .status-draft { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
        .status-sent { background: #e0f2fe; color: #075985; border: 1px solid #bae6fd; }
        .status-accepted { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-rejected { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        .btn-action { border-radius: 8px; font-weight: 600; font-size: 0.85rem; padding: 6px 12px; transition: 0.2s; }
        .search-input { border-radius: 10px 0 0 10px; border-right: none; }
        .search-btn { border-radius: 0 10px 10px 0; }
    </style>
</head>

<body>
<div layout:fragment="content">
    <div class="container-fluid px-4 py-4">

        <div class="page-header shadow-sm">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h2 class="fw-bold text-dark mb-1">Offer Management</h2>
                    <p class="text-muted mb-0 small">Monitor, send, and track candidate job offers.</p>
                </div>
                <div class="col-md-6 mt-3 mt-md-0">
                    <form th:action="@{/offer/manage}" method="get">
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-search"></i></span>
                            <input type="text" name="keyword" th:value="${keyword}"
                                   class="form-control border-start-0 ps-0"
                                   placeholder="Search by candidate name...">
                            <button class="btn btn-primary px-4 fw-bold">Search</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="card table-card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="text-center">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th class="text-start">Candidate</th>
                            <th>Position</th>
                            <th>Salary Offered</th>
                            <th>Current Status</th>
                            <th class="pe-4">Actions</th>
                        </tr>
                        </thead>
                        <tbody class="text-center">
                        <tr th:each="offer : ${offers}">
                            <td class="ps-4">
                                <span class="text-muted fw-bold" th:text="${'#' + offer.offerId}"></span>
                            </td>

                            <td class="text-start">
                                <div class="candidate-name" th:text="${offer.candidate.fullName}">Full Name</div>
                                <small class="text-muted" th:text="${offer.candidate.email}"></small>
                            </td>

                            <td>
                                <div class="small fw-500 text-dark"><i class="bi bi-briefcase me-1"></i> <span th:text="${offer.candidate.jobPosting.title}"></span></div>
                            </td>

                            <td>
                                <span class="salary-text" th:text="${#numbers.formatDecimal(offer.salaryOffered, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></span>
                            </td>

                            <td>
                                    <span class="badge-status"
                                          th:classappend="${'status-' + #strings.toLowerCase(offer.status.name())}"
                                          th:text="${offer.status}">
                                    </span>
                            </td>

                            <td class="pe-4">
                                <div class="d-flex justify-content-center align-items-center gap-2">

                                    <a th:href="@{/offer/detail/{id}(id=${offer.offerId})}"
                                       class="btn btn-outline-primary btn-action" title="View/Edit Detail">
                                        <i class="bi bi-pencil-square"></i>
                                    </a>

                                    <form th:if="${offer.status.name() == 'DRAFT'}"
                                          th:action="@{/offer/send/{id}(id=${offer.offerId})}"
                                          method="post" class="m-0">
                                        <button class="btn btn-warning btn-action">
                                            <i class="bi bi-send-fill me-1"></i> Send
                                        </button>
                                    </form>

                                    <div th:if="${offer.status.name() == 'SENT'}" class="text-info fw-bold small">
                                        <i class="bi bi-envelope-check-fill"></i> Sent
                                    </div>

                                    <div th:if="${offer.status.name() == 'OFFER_ACCEPTED'}" class="text-success fw-bold small">
                                        <i class="bi bi-check-circle-fill"></i> Accepted
                                    </div>

                                    <div th:if="${offer.status.name() == 'OFFER_REJECTED'}" class="text-danger fw-bold small">
                                        <i class="bi bi-x-circle-fill"></i> Rejected
                                    </div>

                                </div>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(offers)}">
                            <td colspan="6" class="py-5 text-center">
                                <i class="bi bi-file-earmark-x fs-1 text-muted opacity-25"></i>
                                <h6 class="mt-3 text-muted">No candidate offers found.</h6>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>

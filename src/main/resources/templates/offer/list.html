<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      th:with="sidebar='sidebar-hr.html'">

<head>
    <title>Offer Pipeline - HRM System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .pipeline-card { border: none; border-radius: 16px; background-color: #fff; }
        .table thead th {
            background-color: #f8fafc;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.8px;
            font-weight: 700;
            color: #64748b;
            padding: 1.2rem 1rem;
            border-top: none;
        }
        .candidate-name { font-weight: 700; color: #1e293b; font-size: 0.95rem; }
        .job-title { font-size: 0.85rem; color: #64748b; }
        .id-badge { background: #f1f5f9; color: #475569; font-family: monospace; padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; }

        /* Custom Success Badge */
        .status-passed {
            background-color: #dcfce7;
            color: #15803d;
            font-weight: 700;
            font-size: 0.75rem;
            padding: 6px 12px;
            border-radius: 100px;
            border: 1px solid #bbf7d0;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-create-offer {
            background-color: #2563eb;
            border: none;
            border-radius: 8px;
            padding: 8px 20px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-create-offer:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        .empty-state { padding: 5rem 0; }
    </style>
</head>

<body>
<div layout:fragment="content">
    <div class="container-fluid px-4 py-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark mb-1">Offer Pipeline</h2>
            </div>
            <div class="d-flex gap-2">
                <span class="badge bg-primary rounded-pill px-3 py-2" th:text="${interviews.size() + ' candidates ready'}"></span>
            </div>
        </div>

        <div class="card pipeline-card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive rounded-3">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                        <tr>
                            <th class="ps-4">Candidate ID</th>
                            <th>Candidate Info</th>
                            <th>Target Position</th>
                            <th>Current Progress</th>
                            <th class="text-end pe-4">Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="interview : ${interviews}">
                            <td class="ps-4">
                                <span class="id-badge" th:text="${'#' + interview.candidate.candidateId}"></span>
                            </td>

                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="rounded-circle bg-primary-subtle text-primary d-flex align-items-center justify-content-center me-3"
                                         style="width: 40px; height: 40px; font-weight: 700;">
                                        <span th:text="${#strings.substring(interview.candidate.fullName, 0, 1)}"></span>
                                    </div>
                                    <div class="candidate-name" th:text="${interview.candidate.fullName}">Full Name</div>
                                </div>
                            </td>

                            <td>
                                <div class="job-title fw-500">
                                    <i class="bi bi-briefcase me-1"></i>
                                    <span th:text="${interview.candidate.jobPosting.title}">Position</span>
                                </div>
                            </td>

                            <td>
                                    <span class="status-passed">
                                        <i class="bi bi-patch-check-fill"></i> Passed Round 2
                                    </span>
                            </td>

                            <td class="text-end pe-4">
                                <a class="btn btn-primary btn-create-offer btn-sm"
                                   th:href="@{/offer/create/{id}(id=${interview.candidate.candidateId})}">
                                    <i class="bi bi-file-earmark-plus me-1"></i> Create Offer
                                </a>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(interviews)}">
                            <td colspan="5" class="text-center py-5">
                                <div class="empty-state">
                                    <i class="bi bi-clipboard-check fs-1 text-muted opacity-25"></i>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>

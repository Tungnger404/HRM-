<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      th:with="sidebar='sidebar-hr'">

<head>
    <title>Candidate Detail</title>
</head>

<body>

<div layout:fragment="content">

    <h2>Candidate Detail</h2>

    <div class="card mt-3">
        <div class="card-body">

            <p><b>Name:</b>
                <span th:text="${candidate.fullName}"></span>
            </p>

            <p><b>Email:</b>
                <span th:text="${candidate.email}"></span>
            </p>

            <p><b>Phone:</b>
                <span th:text="${candidate.phone}"></span>
            </p>

            <p><b>Status:</b>
                <span th:text="${candidate.status}"></span>
            </p>

            <p><b>Score:</b>
                <span th:if="${candidate.screeningScore != null}"
                      th:text="${candidate.screeningScore}"></span>

                <span th:if="${candidate.screeningScore == null}">
                    Not evaluated
                </span>
            </p>

            <p><b>CV:</b>
                <a th:href="${candidate.cvUrl}"
                   target="_blank"
                   class="btn btn-sm btn-outline-primary">
                    View CV
                </a>
            </p>

        </div>
    </div>

    <div class="mt-3">

        <!-- 🔥 Fix enum comparison -->
        <a th:href="@{/hr/candidates/evaluate/{id}(id=${candidate.candidateId})}"
           class="btn btn-primary"
           th:if="${candidate.status.name() == 'APPLIED'}">
            Evaluate
        </a>

        <a th:href="@{/hr/candidates(postingId=${postingId})}"
           class="btn btn-secondary">
            Back
        </a>

    </div>

</div>

</body>
</html>

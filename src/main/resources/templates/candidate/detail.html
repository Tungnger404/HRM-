<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      th:with="sidebar='sidebar-hr'">

<head>
    <title>Candidate Profile - HRM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .profile-header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            border-radius: 15px 15px 0 0;
            padding: 30px;
        }
        .profile-card { border: none; border-radius: 15px; overflow: hidden; }
        .info-label { color: #64748b; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
        .info-value { color: #1e293b; font-weight: 600; font-size: 1rem; }

        /* Cấu hình khung chứa CV hiển thị Full chiều dài */
        .cv-preview-box {
            background: #f1f5f9;
            border-radius: 12px;
            min-height: 500px;
            height: auto;
            width: 100%;
            border: 1px solid #cbd5e1;
            overflow: hidden;
            display: block;
        }

        /* CSS cho ảnh CV */
        .cv-img-fluid {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            cursor: zoom-in;
            transition: opacity 0.3s;
        }
        .cv-img-fluid:hover {
            opacity: 0.9;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .score-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            border: 4px solid #e2e8f0;
        }
        .modal-eval-icon {
            width: 70px;
            height: 70px;
            background-color: #f0f7ff;
            color: #0d6efd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
    </style>
</head>

<body>

<div layout:fragment="content">
    <div class="container-fluid py-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/hr/job-posting}">Job Postings</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/hr/candidates(postingId=${postingId})}">Candidates</a></li>
                    <li class="breadcrumb-item active">Detail</li>
                </ol>
            </nav>
            <div class="d-flex gap-2">
                <a th:href="@{/hr/candidates(postingId=${postingId})}" class="btn btn-outline-secondary rounded-pill px-4">
                    <i class="bi bi-arrow-left me-1"></i> Back
                </a>

                <button type="button"
                        class="btn btn-primary rounded-pill px-4 shadow-sm"
                        th:if="${candidate.status.name() == 'APPLIED'}"
                        th:data-id="${candidate.candidateId}"
                        th:data-name="${candidate.fullName}"
                        th:data-posting="${postingId}"
                        onclick="prepareModal(this)">
                    <i class="bi bi-check2-circle me-1"></i> Start Screening
                </button>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card profile-card shadow-sm">
                    <div class="profile-header text-center">
                        <div class="avatar-placeholder bg-white text-primary rounded-circle mx-auto mb-3 d-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
                            <i class="bi bi-person-fill fs-1"></i>
                        </div>
                        <h4 class="fw-bold mb-1" th:text="${candidate.fullName}">Full Name</h4>
                        <span class="badge bg-info status-badge" th:text="${candidate.status}">Applied</span>
                    </div>
                    <div class="card-body p-4">
                        <div class="mb-4">
                            <label class="info-label d-block mb-1">Email Address</label>
                            <div class="info-value"><i class="bi bi-envelope me-2 text-primary"></i> <span th:text="${candidate.email}"></span></div>
                        </div>
                        <div class="mb-4">
                            <label class="info-label d-block mb-1">Phone Number</label>
                            <div class="info-value"><i class="bi bi-telephone me-2 text-primary"></i> <span th:text="${candidate.phone}"></span></div>
                        </div>
                        <div class="mb-4">
                            <label class="info-label d-block mb-1">Screening Score</label>
                            <div class="d-flex align-items-center gap-3">
                                <div class="score-circle"
                                     th:classappend="${candidate.screeningScore != null ? (candidate.screeningScore >= 70 ? 'text-success border-success' : 'text-warning border-warning') : 'text-muted'}"
                                     th:text="${candidate.screeningScore != null ? candidate.screeningScore : 'N/A'}">
                                </div>
                                <small class="text-muted" th:if="${candidate.screeningScore == null}">Pending evaluation</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card profile-card shadow-sm h-100">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold"><i class="bi bi-file-earmark-pdf me-2 text-danger"></i>Curriculum Vitae</h5>
                        <a th:href="${candidate.cvUrl}" target="_blank" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-box-arrow-up-right me-1"></i> Open Original
                        </a>
                    </div>
                    <div class="card-body p-0"> <div class="cv-preview-box">

                        <img th:if="${candidate.cvUrl != null and (candidate.cvUrl.contains('.jpg') or candidate.cvUrl.contains('.png') or candidate.cvUrl.contains('.jpeg') or candidate.cvUrl.contains('/image/'))}"
                             th:src="${candidate.cvUrl}"
                             class="cv-img-fluid"
                             title="Click to view full size"
                             onclick="window.open(this.src, '_blank')">

                        <iframe th:if="${candidate.cvUrl != null and !candidate.cvUrl.contains('.jpg') and !candidate.cvUrl.contains('.png') and !candidate.cvUrl.contains('.jpeg') and !candidate.cvUrl.contains('/image/')}"
                                th:src="${candidate.cvUrl}"
                                width="100%" height="800px"
                                style="border: none;">
                        </iframe>

                        <div th:if="${candidate.cvUrl == null}" class="p-5 text-center text-muted">
                            <i class="bi bi-file-earmark-x fs-1"></i>
                            <p class="mt-2">No CV file uploaded.</p>
                        </div>

                    </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="modal fade" id="screeningModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0 pt-4 px-4">
                    <h5 class="fw-bold mb-0">Screening Evaluation</h5>
                    <button type="button" class="btn-close" data-coreui-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="text-center mb-4">
                        <div class="modal-eval-icon">
                            <i class="bi bi-person-badge fs-2"></i>
                        </div>
                        <h4 class="fw-bold mb-1" id="modalCandidateName">Candidate Name</h4>
                        <p class="text-muted small">Assessing for Job Posting #<span id="modalPostingId"></span></p>
                    </div>

                    <form th:action="@{/hr/candidates/evaluate}" method="post" id="evaluationForm">
                        <input type="hidden" name="id" id="modalInputId" />
                        <input type="hidden" name="postingId" id="modalInputPostingId" />

                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark small mb-2 text-uppercase">Screening Score (0-100)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-speedometer2"></i></span>
                                <input type="number" name="score" id="scoreInput"
                                       class="form-control bg-light border-start-0 fw-bold"
                                       min="0" max="100" placeholder="Ví dụ: 75" required
                                       style="height: 55px; font-size: 1.25rem;">
                            </div>
                            <div id="scoreError" class="text-danger small mt-2" style="display: none;"></div>
                        </div>

                        <div class="d-flex gap-3 mt-4">
                            <button type="button" onclick="handleEvaluate('reject')" class="btn btn-outline-danger w-100 py-3 fw-bold" style="border-radius: 12px;">
                                <i class="bi bi-x-lg me-1"></i> Reject
                            </button>
                            <button type="button" onclick="handleEvaluate('pass')" class="btn btn-success w-100 py-3 fw-bold" style="border-radius: 12px;">
                                <i class="bi bi-check-lg me-1"></i> Pass
                            </button>
                        </div>
                        <input type="hidden" name="action" id="actionInput">
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script th:inline="javascript">
        function prepareModal(button) {
            var id = button.getAttribute('data-id');
            var fullName = button.getAttribute('data-name');
            var postingId = button.getAttribute('data-posting');

            document.getElementById('modalCandidateName').innerText = fullName;
            document.getElementById('modalPostingId').innerText = postingId;
            document.getElementById('modalInputId').value = id;
            document.getElementById('modalInputPostingId').value = postingId;

            var screeningModal = new coreui.Modal(document.getElementById('screeningModal'));
            screeningModal.show();
        }
        function handleEvaluate(action) {
            const score = parseInt(document.getElementById('scoreInput').value);
            const errorDiv = document.getElementById('scoreError');
            const form = document.getElementById('evaluationForm');
            const actionInput = document.getElementById('actionInput');
            errorDiv.style.display = 'none';
            errorDiv.innerText = '';
            if (isNaN(score)) {
                errorDiv.innerText = 'Vui lòng nhập điểm trước khi đánh giá.';
                errorDiv.style.display = 'block';
                return;
            }
            if (action === 'pass' && score < 50) {
                errorDiv.innerText = 'Điểm phải từ 50 trở lên mới có thể PASS.';
                errorDiv.style.display = 'block';
                return;
            }
            if (action === 'reject' && score >= 50) {
                errorDiv.innerText = 'Điểm từ 50 trở lên không được phép REJECT.';
                errorDiv.style.display = 'block';
                return;
            }
            actionInput.value = action;
            form.submit();
        }
    </script>
</th:block>

</body>
</html>

<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      th:with="sidebar='sidebar-hr'">

<head>
    <title>Job Posting Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .card { border: none; border-radius: 12px; }
        .table thead th {
            background-color: #f8fafc;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            font-weight: 700;
            color: #64748b;
            border-top: none;
            padding: 15px;
        }
        .candidate-badge {
            background-color: #eef2ff;
            color: #4f46e5;
            font-weight: 700;
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.2s;
        }
        .candidate-badge:hover {
            background-color: #4f46e5;
            color: white;
        }
        .action-btn {
            width: 35px;
            height: 35px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            margin: 0 2px;
            transition: all 0.2s;
        }
        .status-dot {
            height: 8px;
            width: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>

<body>
<main layout:fragment="content">

    <div class="container-fluid py-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold mb-1">Job Posting Management</h3>
            </div>
            <a th:href="@{/hr/job-posting/create}" class="btn btn-primary px-4 shadow-sm rounded-pill">
                <i class="bi bi-plus-lg me-1"></i> Create Posting
            </a>
        </div>

        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card shadow-sm p-3 text-center">
                    <small class="text-muted text-uppercase fw-bold">Total Postings</small>
                    <h4 class="fw-bold mb-0" th:text="${list.size()}">0</h4>
                </div>
            </div>
        </div>

        <div class="card shadow-sm overflow-hidden">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Job Title</th>
                            <th>Request</th>
                            <th>Status</th>
                            <th>Schedule</th>
                            <th class="text-center">Candidates</th>
                            <th class="text-end pe-4">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="jp : ${list}">
                            <td class="ps-4 text-muted fw-bold" th:text="${'#' + jp.postingId}"></td>

                            <td>
                                <div class="fw-bold text-dark" th:text="${jp.title}"></div>
                                <small class="text-muted">Linked to Request #<span th:text="${jp.recruitmentRequest.reqId}"></span></small>
                            </td>

                            <td th:text="${'REQ-' + jp.recruitmentRequest.reqId}"></td>

                            <td>
                                <div th:switch="${jp.status}">
                                        <span th:case="'OPEN'" class="badge rounded-pill bg-success-subtle text-success border border-success-subtle px-3 py-2">
                                            <span class="status-dot bg-success"></span> OPEN
                                        </span>
                                    <span th:case="'CLOSED'" class="badge rounded-pill bg-danger-subtle text-danger border border-danger-subtle px-3 py-2">
                                            <span class="status-dot bg-danger"></span> CLOSED
                                        </span>
                                    <span th:case="'EXPIRED'" class="badge rounded-pill bg-warning-subtle text-warning border border-warning-subtle px-3 py-2">
                                            <span class="status-dot bg-warning"></span> EXPIRED
                                        </span>
                                </div>
                            </td>

                            <td>
                                <div class="small">
                                    <div class="text-muted"><i class="bi bi-calendar-check me-1"></i> <span th:text="${jp.publishDate}"></span></div>
                                    <div class="text-danger"><i class="bi bi-calendar-x me-1"></i> <span th:text="${jp.expiryDate}"></span></div>
                                </div>
                            </td>

                            <td class="text-center">
                                <a th:href="@{'/hr/candidates?postingId=' + ${jp.postingId}}" class="candidate-badge">
                                    <i class="bi bi-people-fill me-1"></i>
                                    <span th:text="${jp.candidateCount}">0</span>
                                </a>
                            </td>

                            <td class="text-end pe-4">
                                <a th:href="@{'/hr/job-posting/edit/' + ${jp.postingId}}"
                                   class="btn btn-outline-primary action-btn" title="Edit Posting">
                                    <i class="bi bi-pencil-square"></i>
                                </a>

                                <a th:if="${jp.status == 'OPEN'}"
                                   th:href="@{'/hr/job-posting/status/' + ${jp.postingId} + '/CLOSED'}"
                                   class="btn btn-outline-warning action-btn" title="Close Posting">
                                    <i class="bi bi-slash-circle"></i>
                                </a>

                                <a th:href="@{'/hr/job-posting/delete/' + ${jp.postingId}}"
                                   class="btn btn-outline-danger action-btn"
                                   onclick="return confirm('Are you sure you want to delete this posting?')"
                                   title="Delete">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(list)}">
                            <td colspan="7" class="text-center py-5 text-muted">
                                <i class="bi bi-inbox fs-1 d-block mb-3 opacity-25"></i>
                                No job postings available.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</main>
</body>
</html>

<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      th:with="sidebar='sidebar-hr'">

<head>
    <title>Create Job Posting</title>
    <script th:inline="javascript">
        function forceAutofill(selectElement) {
            const id = selectElement.value;
            console.log("Triggered JD ID:", id);
            if (!id) return;

            // Hiệu ứng vô hiệu hóa tạm thời để tránh bấm liên tục
            selectElement.disabled = true;

            fetch('/api/jd/' + id)
                .then(response => {
                    if (!response.ok) throw new Error("Network response was not ok");
                    return response.json();
                })
                .then(data => {
                    console.log("Dữ liệu nhận được:", data);

                    // Điền dữ liệu - Các ID này phải trùng khớp với ID trong Form bên dưới
                    const mapping = {
                        "titleInput": data.title,
                        "descriptionInput": data.responsibilities,
                        "requirementsInput": data.requirements,
                        "benefitsInput": data.benefits
                    };

                    for (let fieldId in mapping) {
                        const el = document.getElementById(fieldId);
                        if (el) {
                            el.value = mapping[fieldId] || "";
                            // Thêm hiệu ứng highlight để biết đã điền thành công
                            el.style.backgroundColor = "#eef2ff";
                            el.style.border = "2px solid #3b82f6";
                            setTimeout(() => {
                                el.style.backgroundColor = "";
                                el.style.border = "";
                            }, 1000);
                        }
                    }
                })
                .catch(error => console.error("Error fetching JD:", error))
                .finally(() => {
                    selectElement.disabled = false;
                });
            document.addEventListener('DOMContentLoaded', function() {
                const publishInput = document.querySelector('input[name="publishDate"]');
                const expiryInput = document.querySelector('input[name="expiryDate"]');

                function checkDateLogic() {
                    if (publishInput.value && expiryInput.value) {
                        const d1 = new Date(publishInput.value);
                        const d2 = new Date(expiryInput.value);

                        if (d2 < d1) {
                            // Hiển thị Toast lỗi (nếu layout của bạn có hỗ trợ toast)
                            // Ở đây mình dùng alert cho chắc chắn, bạn có thể thay bằng Toast của CoreUI
                            alert("Chú ý: Ngày hết hạn phải sau ngày đăng tin!");
                            expiryInput.value = ""; // Xóa giá trị sai
                        }
                    }
                }

                publishInput.addEventListener('change', checkDateLogic);
                expiryInput.addEventListener('change', checkDateLogic);
            });
        }
    </script>
</head>

<body>
<main layout:fragment="content">
    <div class="container py-4">
        <div class="mb-4">
            <h2 class="fw-bold text-dark">Create Job Posting</h2>
        </div>

        <form th:action="@{/hr/job-posting/create}" th:object="${dto}" method="post">
            <div class="row g-4">
                <div class="col-lg-4">
                    <div class="card p-4 shadow-sm border-0" style="border-radius: 15px;">
                        <h5 class="fw-bold text-primary mb-4"><i class="fas fa-link me-2"></i>Source Mapping</h5>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Recruitment Request</label>
                            <select class="form-select border-primary" th:field="*{reqId}" required>
                                <option value="">-- Select Request --</option>
                                <option th:each="r : ${requests}" th:value="${r.reqId}"
                                        th:text="'Request #' + ${r.reqId} + ' (' + ${r.jobPosition.title} + ')'">
                                </option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Job Description Template</label>
                            <select id="jdSelect" class="form-select border-primary" th:field="*{jdId}"
                                    onchange="forceAutofill(this)" required>
                                <option value="">-- Select JD Template --</option>
                                <option th:each="jd : ${descriptions}" th:value="${jd.id}"
                                        th:text="'JD #' + ${jd.id} + ' - ' + ${jd.job.title}">
                                </option>
                            </select>
                        </div>

                        <hr>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Publish Date</label>
                            <input type="date" class="form-control" th:field="*{publishDate}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Expiry Date</label>
                            <input type="date" class="form-control" th:field="*{expiryDate}" required>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="card p-4 shadow-sm border-0" style="border-radius: 15px;">
                        <h5 class="fw-bold text-primary mb-4"><i class="fas fa-file-alt me-2"></i>Posting Content</h5>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Posting Title</label>
                            <input type="text" id="titleInput" class="form-control form-control-lg fw-bold" th:field="*{title}" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Job Description</label>
                            <textarea id="descriptionInput" class="form-control" rows="5" th:field="*{description}"></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Requirements</label>
                            <textarea id="requirementsInput" class="form-control" rows="5" th:field="*{requirements}"></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Benefits</label>
                            <textarea id="benefitsInput" class="form-control" rows="4" th:field="*{benefits}"></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <button type="submit" class="btn btn-success px-5 rounded-pill fw-bold shadow-sm">
                                <i class="fas fa-paper-plane me-2"></i>Create & Publish
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</main>
</body>
</html>

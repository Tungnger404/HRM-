<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      th:with="sidebar='sidebar-hr'">

<head>
    <title>Create Job Posting</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .form-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .source-section { background-color: #f0f7ff; border-radius: 12px; padding: 20px; border: 1px dashed #3b82f6; }
        .form-label { font-weight: 600; color: #334155; margin-bottom: 0.5rem; }
        .section-title { font-size: 1.1rem; font-weight: 700; color: #1e3a8a; margin-bottom: 1.5rem; display: flex; align-items: center; }
        .section-title i { margin-right: 10px; }
        .sticky-summary { position: sticky; top: 20px; }
        /* Hiệu ứng highlight khi auto-fill */
        .highlight-fill { animation: flash-blue 1s; }
        @keyframes flash-blue {
            0% { background-color: #dbeafe; }
            100% { background-color: white; }
        }
    </style>
</head>

<body>
<main layout:fragment="content">
    <div class="container py-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark">Create Job Posting</h2>
                <p class="text-muted">Combine recruitment request and job description to publish a new post.</p>
            </div>
        </div>

        <form th:action="@{/hr/job-posting/create}" th:object="${dto}" method="post">
            <div class="row g-4">

                <div class="col-lg-4">
                    <div class="card form-card p-4 h-100">
                        <div class="section-title"><i class="bi bi-link-45deg"></i> Source Mapping</div>

                        <div class="mb-4">
                            <label class="form-label text-primary">Recruitment Request</label>
                            <select class="form-select border-primary" th:field="*{reqId}" required>
                                <option value="">-- Select Request --</option>
                                <option th:each="r : ${requests}" th:value="${r.reqId}"
                                        th:text="'Request #' + ${r.reqId} + ' (' + ${r.jobPosition.title} + ')'">
                                </option>
                            </select>
                            <div class="form-text small">Linked to specific hiring needs.</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-primary">Job Description Template</label>
                            <select id="jdSelect" class="form-select border-primary" th:field="*{jdId}" required>
                                <option value="">-- Select JD Template --</option>
                                <option th:each="jd : ${descriptions}" th:value="${jd.id}"
                                        th:text="'JD #' + ${jd.id} + ' - ' + ${jd.jobTitle}">
                                </option>
                            </select>
                            <div class="form-text small">Selecting a JD will auto-populate the fields.</div>
                        </div>

                        <hr class="my-4">
                        <div class="section-title"><i class="bi bi-calendar-check"></i> Timeline</div>

                        <div class="mb-3">
                            <label class="form-label">Publish Date</label>
                            <input type="date" class="form-control" th:field="*{publishDate}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Expiry Date</label>
                            <input type="date" class="form-control" th:field="*{expiryDate}" required>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="card form-card p-4">
                        <div class="section-title"><i class="bi bi-file-earmark-post"></i> Posting Content</div>

                        <div class="mb-4">
                            <label class="form-label">Posting Title</label>
                            <input type="text" id="titleInput" class="form-control form-control-lg fw-bold"
                                   th:field="*{title}" placeholder="Enter catchy job title..." required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Job Description</label>
                            <textarea id="descriptionInput" class="form-control" rows="5"
                                      th:field="*{description}" placeholder="Key responsibilities..."></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Requirements</label>
                            <textarea id="requirementsInput" class="form-control" rows="5"
                                      th:field="*{requirements}" placeholder="Skills and qualifications..."></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Benefits</label>
                            <textarea id="benefitsInput" class="form-control" rows="4"
                                      th:field="*{benefits}" placeholder="What we offer..."></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a th:href="@{/hr/job-posting}" class="btn btn-light border px-4 rounded-pill">Cancel</a>
                            <button type="submit" class="btn btn-success px-5 rounded-pill fw-bold shadow-sm">
                                <i class="bi bi-send me-2"></i> Create & Publish
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</main>

<div layout:fragment="scripts">
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const jdSelect = document.getElementById("jdSelect");
            const inputs = ["titleInput", "descriptionInput", "requirementsInput", "benefitsInput"];

            if (!jdSelect) return;

            jdSelect.addEventListener("change", function () {
                const id = this.value;
                if (!id) return;

                // Thêm hiệu ứng chờ đợi (loading)
                jdSelect.disabled = true;

                fetch('/api/jd/' + id)
                    .then(response => {
                        if (!response.ok) throw new Error("API error");
                        return response.json();
                    })
                    .then(data => {
                        // Cập nhật dữ liệu và thêm hiệu ứng highlight
                        const mapping = {
                            "titleInput": data.jobTitle,
                            "descriptionInput": data.responsibilities,
                            "requirementsInput": data.requirements,
                            "benefitsInput": data.benefits
                        };

                        Object.keys(mapping).forEach(key => {
                            const el = document.getElementById(key);
                            if (el) {
                                el.value = mapping[key] || "";
                                el.classList.add('highlight-fill');
                                setTimeout(() => el.classList.remove('highlight-fill'), 1000);
                            }
                        });
                    })
                    .catch(error => console.error("Error:", error))
                    .finally(() => jdSelect.disabled = false);
            });
        });
    </script>
</div>
</body>
</html>

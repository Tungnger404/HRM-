<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      th:with="sidebar='sidebar-hr'">

<head>
    <title>Create Job Description | HRM System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --cms-border: #eaecf0;
            --cms-label: #344054;
            --cms-bg-section: #f9fafb;
        }
        .form-card { border: 1px solid var(--cms-border); border-radius: 8px; box-shadow: none !important; }

        .section-header {
            background-color: var(--cms-bg-section);
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--cms-border);
            font-weight: 600;
            color: #101828;
            font-size: 0.95rem;
        }

        .form-label {
            font-weight: 500;
            color: var(--cms-label);
            font-size: 0.875rem;
            margin-bottom: 0.4rem;
        }

        .form-control, .form-select {
            border: 1px solid var(--cms-border);
            border-radius: 8px;
            padding: 0.6rem 0.75rem;
            font-size: 0.9rem;
        }

        .form-control:focus {
            border-color: #4361ee;
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
        }

        .form-control[readonly] { background-color: #f2f4f7; opacity: 1; color: #667085; }

        .btn-save {
            background-color: #4361ee;
            border: none;
            padding: 8px 24px;
            font-weight: 600;
            border-radius: 8px;
        }

        .btn-cancel {
            background: #fff;
            border: 1px solid var(--cms-border);
            color: #344054;
            padding: 8px 24px;
            font-weight: 600;
            border-radius: 8px;
        }
    </style>
</head>

<body>
<main layout:fragment="content">
    <div class="container-fluid py-4 px-4">

        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <div>
                <h4 class="fw-bold text-dark mb-1">Thiết lập bản mô tả công việc (JD)</h4>

            </div>
        </div>

        <form th:action="@{/hr/job-description/create}" th:object="${dto}" method="post">
            <input type="hidden" th:field="*{requestId}" />
            <input type="hidden" th:field="*{jobId}" />

            <div class="row g-4">
                <div class="col-lg-4">
                    <div class="card form-card mb-4">
                        <div class="section-header">Thông tin chung</div>
                        <div class="card-body p-3">
                            <div class="mb-3">
                                <label class="form-label">Vị trí công việc</label>
                                <input type="text" class="form-control" th:field="*{jobTitle}" readonly>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Mức lương dự kiến <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{salaryRange}"
                                       placeholder="VD: 15.000.000 - 25.000.000 VNĐ" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Địa điểm làm việc <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{workingLocation}" required>
                            </div>

                            <div class="p-2 mt-4 border rounded bg-light">
                                <div class="small text-secondary" th:text="${dto.description}"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="card form-card">
                        <div class="section-header">Nội dung chi tiết</div>
                        <div class="card-body p-4">

                            <div class="mb-4">
                                <label class="form-label">Trách nhiệm công việc (Responsibilities)</label>
                                <textarea class="form-control" rows="8" th:field="*{responsibilities}"></textarea>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Yêu cầu ứng viên (Requirements)</label>
                                <textarea class="form-control" rows="8" th:field="*{requirements}"></textarea>
                            </div>

                            <div class="mb-0">
                                <label class="form-label">Chế độ đãi ngộ (Benefits)</label>
                                <textarea class="form-control" rows="6" th:field="*{benefits}"></textarea>
                            </div>
                        </div>

                        <div class="card-footer bg-white p-3 border-top d-flex justify-content-between align-items-center">
                            <a th:href="@{/hr/job-description}" class="btn btn-link text-decoration-none text-muted small fw-bold">
                                <i class="bi bi-chevron-left"></i> DANH SÁCH JD
                            </a>
                            <div class="d-flex gap-2">

                                <button type="submit" class="btn btn-primary btn-save">
                                    Xác nhận & Đăng tuyển
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</main>
</body>
</html>

<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      th:with="sidebar='sidebar-hr'">

<head>
    <title>JD Detail | Enterprise HRM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .detail-card { border: none; border-radius: 16px; overflow: hidden; background: #fff; }

        /* Header vùng xanh chuyên nghiệp */
        .job-header-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            padding: 40px 30px;
        }

        .info-pill {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 6px 16px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
        }

        /* Tiêu đề các mục */
        .section-title {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
        }

        .section-title i {
            color: #3b82f6;
            background: #eff6ff;
            padding: 8px;
            border-radius: 8px;
        }

        /* Khối nội dung chỉ xem */
        .content-box {
            white-space: pre-line; /* Quan trọng: Giữ định dạng xuống dòng từ DB */
            color: #475569;
            line-height: 1.7;
            background-color: #f8fafc;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #f1f5f9;
            min-height: 100px;
        }

        .metadata-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>
<main layout:fragment="content">
    <div class="container py-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/hr/job-description}" class="text-decoration-none">Job Descriptions</a></li>
                    <li class="breadcrumb-item active">View Detail</li>
                </ol>
            </nav>
            <div class="d-flex gap-2">
                <a th:href="@{/hr/job-description}" class="btn btn-outline-secondary px-4 rounded-pill">
                    <i class="bi bi-arrow-left me-1"></i> Back
                </a>
                <a th:href="@{'/hr/job-description/edit/' + ${jd.id}}" class="btn btn-warning px-4 rounded-pill fw-bold">
                    <i class="bi bi-pencil-square me-1"></i> Edit JD
                </a>
            </div>
        </div>

        <div class="card detail-card shadow-sm">
            <div class="job-header-bg">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <span class="text-info fw-bold mb-2 d-block" th:text="'JD ID: #' + ${jd.id}"></span>
                        <h1 class="fw-bold mb-3" th:text="${jd.jobTitle}">Job Title</h1>
                        <div class="d-flex flex-wrap gap-3">
                            <span class="info-pill"><i class="bi bi-geo-alt me-2"></i> <span th:text="${jd.workingLocation}">Location</span></span>
                            <span class="info-pill"><i class="bi bi-cash-stack me-2"></i> <span th:text="${jd.salaryRange}">Salary</span></span>

                            <div th:switch="${#strings.toString(jd.status)}">
                                <span th:case="'ACTIVE'" class="badge bg-success px-3 py-2 rounded-pill">
                                    <i class="bi bi-check-circle me-1"></i> ACTIVE
                                </span>
                                <span th:case="'INACTIVE'" class="badge bg-secondary px-3 py-2 rounded-pill">
                                    <i class="bi bi-pause-circle me-1"></i> INACTIVE
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-body p-4 p-lg-5">
                <div class="row">
                    <div class="col-lg-12">

                        <div class="mb-5">
                            <h5 class="section-title">
                                <i class="bi bi-briefcase"></i> Key Responsibilities
                            </h5>
                            <div class="content-box shadow-sm" th:text="${jd.responsibilities}">
                                Loading responsibilities...
                            </div>
                        </div>

                        <div class="mb-5">
                            <h5 class="section-title">
                                <i class="bi bi-person-badge"></i> Candidate Requirements
                            </h5>
                            <div class="content-box shadow-sm" th:text="${jd.requirements}">
                                Loading requirements...
                            </div>
                        </div>

                        <div class="mb-0">
                            <h5 class="section-title">
                                <i class="bi bi-gift"></i> Perks & Benefits
                            </h5>
                            <div class="content-box shadow-sm" th:text="${jd.benefits}">
                                Loading benefits...
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>

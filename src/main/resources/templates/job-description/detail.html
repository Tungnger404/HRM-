<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      th:with="sidebar='sidebar-hr'">

<head>
    <title>Job Description Detail</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .detail-card { border: none; border-radius: 16px; overflow: hidden; }
        .job-header-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            padding: 40px 30px;
        }
        .info-pill {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 6px 16px;
            margin-right: 10px;
            font-size: 0.9rem;
        }
        .section-title {
            position: relative;
            padding-left: 15px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 1.25rem;
        }
        .section-title::before {
            content: "";
            position: absolute;
            left: 0;
            top: 4px;
            height: 20px;
            width: 4px;
            background: #3b82f6;
            border-radius: 2px;
        }
        .content-box {
            white-space: pre-line; /* Giữ nguyên xuống dòng từ database */
            color: #475569;
            line-height: 1.6;
            background-color: #f8fafc;
            padding: 20px;
            border-radius: 12px;
        }
    </style>
</head>

<body>
<main layout:fragment="content">
    <div class="container py-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/hr/job-description}" class="text-decoration-none text-muted">Job Descriptions</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Details</li>
                </ol>
            </nav>
            <a th:href="@{'/hr/job-description/edit/' + ${jd.id}}" class="btn btn-warning px-4 rounded-pill fw-bold">
                <i class="bi bi-pencil-square me-1"></i> Edit JD
            </a>
        </div>

        <div class="card detail-card shadow-sm">
            <div class="job-header-bg">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h1 class="fw-bold mb-3" th:text="${jd.jobTitle}">Job Title</h1>
                        <div class="d-flex flex-wrap gap-2">
                            <span class="info-pill"><i class="bi bi-geo-alt me-1"></i> <span th:text="${jd.workingLocation}">Location</span></span>
                            <span class="info-pill"><i class="bi bi-cash me-1"></i> <span th:text="${jd.salaryRange}">Salary</span></span>
                            <span th:if="${jd.status == 'ACTIVE'}" class="badge bg-success rounded-pill px-3 pt-2">ACTIVE</span>
                            <span th:unless="${jd.status == 'ACTIVE'}" class="badge bg-secondary rounded-pill px-3 pt-2">INACTIVE</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-body p-4 p-lg-5">
                <div class="row g-5">

                    <div class="col-lg-12">

                        <div class="mb-5">
                            <h5 class="section-title"><i class="bi bi-list-check me-2 text-primary"></i>Responsibilities</h5>
                            <div class="content-box" th:text="${jd.responsibilities}">Nội dung công việc...</div>
                        </div>

                        <div class="mb-5">
                            <h5 class="section-title"><i class="bi bi-person-check me-2 text-primary"></i>Requirements</h5>
                            <div class="content-box" th:text="${jd.requirements}">Yêu cầu ứng viên...</div>
                        </div>

                        <div class="mb-4">
                            <h5 class="section-title"><i class="bi bi-gift me-2 text-primary"></i>Benefits</h5>
                            <div class="content-box" th:text="${jd.benefits}">Chế độ đãi ngộ...</div>
                        </div>

                    </div>
                </div>

                <div class="mt-5 pt-4 border-top">
                    <a th:href="@{/hr/job-description}" class="btn btn-light border px-4 rounded-pill">
                        <i class="bi bi-arrow-left me-1"></i> Back to List
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>

<!doctype html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HR - Employee Documents</title>

  <style>
    .wrap{max-width:1200px;margin:24px auto;padding:0 16px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px}
    .title{font-size:20px;font-weight:800}
    .sub{margin-top:6px;color:#6b7280;font-size:14px}
    input,select{height:38px;padding:0 12px;border:1px solid #e5e7eb;border-radius:10px;outline:none}
    input:focus,select:focus{border-color:#f5b400;box-shadow:0 0 0 4px rgba(245,180,0,.2)}
    .btn{height:38px;padding:0 12px;border:1px solid #e5e7eb;border-radius:10px;background:#fff;cursor:pointer;font-weight:700;display:inline-flex;align-items:center}
    .btn-primary{background:#f5b400;border-color:#f5b400}
    .table{width:100%;border-collapse:collapse;margin-top:12px}
    .table th,.table td{padding:10px;border-bottom:1px solid #eee;text-align:left;font-size:14px;vertical-align:top}
    .table th{color:#6b7280;font-weight:800}

    .badge{
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      border:1px solid #e5e7eb;
      background:#f9fafb;
      min-width:84px;
      text-align:center;
    }

    /* TYPE */
    .badge-type-document{
      background:#dbeafe;
      color:#1d4ed8;
      border-color:#bfdbfe;
    }
    .badge-type-contract{
      background:#ede9fe;
      color:#6d28d9;
      border-color:#ddd6fe;
    }
    .badge-type-other{
      background:#f3f4f6;
      color:#4b5563;
      border-color:#e5e7eb;
    }

    /* STATUS */
    .badge-status-draft{
      background:#fef3c7;
      color:#b45309;
      border-color:#fde68a;
    }
    .badge-status-active{
      background:#dcfce7;
      color:#15803d;
      border-color:#bbf7d0;
    }
    .badge-status-expired{
      background:#fee2e2;
      color:#dc2626;
      border-color:#fecaca;
    }
    .badge-status-archived{
      background:#e5e7eb;
      color:#4b5563;
      border-color:#d1d5db;
    }
    .badge-status-other{
      background:#f3f4f6;
      color:#4b5563;
      border-color:#e5e7eb;
    }

    .msg{margin:12px 0;padding:10px 12px;border-radius:10px;border:1px solid #bbf7d0;background:#ecfdf5;color:#065f46}
    .msg-err{border:1px solid #fecaca;background:#fef2f2;color:#991b1b}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .small{font-size:12px;color:#6b7280}
    .panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
    .panel{border:1px solid #e5e7eb;border-radius:12px;padding:12px;background:#fafafa}
    .panel h3{margin:0 0 10px 0;font-size:14px;color:#6b7280;font-weight:900;text-transform:uppercase}
    .full{flex:1 1 220px;min-width:220px}
    .back{margin-bottom:12px;display:inline-flex}
    @media (max-width: 900px){.panel-grid{grid-template-columns:1fr}}
  </style>
</head>

<body>
<div layout:fragment="content">

  <div class="wrap">
    <div class="card">

      <a class="btn back" th:href="@{/hr/documents}">← Back to employee list</a>

      <div class="title">Employee Contract &amp; Document Management</div>
      <div class="sub">
        Employee:
        <strong th:text="${employee.fullName}"></strong>
        -
        Emp ID: <strong th:text="${employee.empId}"></strong>
        -
        Status: <strong th:text="${employee.status}"></strong>
      </div>

      <div class="msg" th:if="${msg != null and msg != ''}" th:text="${msg}"></div>
      <div class="msg msg-err" th:if="${err != null and err != ''}" th:text="${err}"></div>

      <div class="panel-grid">

        <div class="panel">
          <h3>Filter documents</h3>

          <form method="get" th:action="@{'/hr/documents/' + ${empId}}" class="row">
            <input class="full" type="text" name="q" placeholder="Search title/file..." th:value="${q}">

            <select name="docType">
              <option value="" th:selected="${docType == null or docType == ''}">All type</option>
              <option value="CONTRACT" th:selected="${docType == 'CONTRACT'}">CONTRACT</option>
              <option value="DOCUMENT" th:selected="${docType == 'DOCUMENT'}">DOCUMENT</option>
            </select>

            <select name="status">
              <option value="" th:selected="${status == null or status == ''}">All status</option>
              <option value="DRAFT" th:selected="${status == 'DRAFT'}">DRAFT</option>
              <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">ACTIVE</option>
              <option value="EXPIRED" th:selected="${status == 'EXPIRED'}">EXPIRED</option>
              <option value="ARCHIVED" th:selected="${status == 'ARCHIVED'}">ARCHIVED</option>
            </select>

            <button class="btn" type="submit">Filter</button>
            <a class="btn" th:href="@{'/hr/documents/' + ${empId}}">Reset</a>
          </form>
        </div>

        <div class="panel">
          <h3>Upload document</h3>

          <form method="post"
                th:action="@{'/hr/documents/' + ${empId} + '/upload'}"
                enctype="multipart/form-data"
                class="row">

            <input class="full" type="text" name="title" placeholder="Title (optional)">

            <select name="docType">
              <option value="DOCUMENT" selected>DOCUMENT</option>
              <option value="CONTRACT">CONTRACT</option>
            </select>

            <select name="status">
              <option value="DRAFT" selected>DRAFT</option>
              <option value="ACTIVE">ACTIVE</option>
              <option value="ARCHIVED">ARCHIVED</option>
            </select>

            <input class="full" type="file" name="file" required
                   style="height:38px;padding:6px;border-radius:10px;border:1px solid #e5e7eb;background:#fff;">

            <button class="btn btn-primary" type="submit">Upload</button>
          </form>

          <div class="small" style="margin-top:8px">
            File upload sẽ tự gắn cho employee hiện tại.
          </div>
        </div>

      </div>

      <table class="table">
        <thead>
        <tr>
          <th>Doc ID</th>
          <th>Title</th>
          <th>Type</th>
          <th>Status</th>
          <th>File</th>
          <th style="width:320px">Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${docs == null or #lists.isEmpty(docs)}">
          <td colspan="6" style="color:#6b7280;padding:14px;">No documents found for this employee.</td>
        </tr>

        <tr th:each="d : ${docs}">
          <td th:text="${d.id}"></td>

          <td>
            <form method="post" th:action="@{'/hr/documents/' + ${d.id} + '/update'}"
                  class="row" style="gap:6px">
              <input type="text" name="title" th:value="${d.title}" style="min-width:220px">
              <select name="docType">
                <option value="DOCUMENT" th:selected="${d.docType == 'DOCUMENT'}">DOCUMENT</option>
                <option value="CONTRACT" th:selected="${d.docType == 'CONTRACT'}">CONTRACT</option>
              </select>
              <select name="status">
                <option value="DRAFT" th:selected="${d.status == 'DRAFT'}">DRAFT</option>
                <option value="ACTIVE" th:selected="${d.status == 'ACTIVE'}">ACTIVE</option>
                <option value="EXPIRED" th:selected="${d.status == 'EXPIRED'}">EXPIRED</option>
                <option value="ARCHIVED" th:selected="${d.status == 'ARCHIVED'}">ARCHIVED</option>
              </select>
              <button class="btn" type="submit">Save</button>
            </form>
          </td>

          <td>
            <span class="badge"
                  th:text="${d.docType}"
                  th:classappend="${
                    d.docType == 'DOCUMENT' ? ' badge-type-document' :
                    (d.docType == 'CONTRACT' ? ' badge-type-contract' : ' badge-type-other')
                  }">
            </span>
          </td>

          <td>
            <span class="badge"
                  th:text="${d.status}"
                  th:classappend="${
                    d.status == 'DRAFT' ? ' badge-status-draft' :
                    (d.status == 'ACTIVE' ? ' badge-status-active' :
                    (d.status == 'EXPIRED' ? ' badge-status-expired' :
                    (d.status == 'ARCHIVED' ? ' badge-status-archived' : ' badge-status-other')))
                  }">
            </span>
          </td>

          <td>
            <div th:text="${d.fileName}"></div>
            <div class="small" th:text="${d.contentType}"></div>
          </td>

          <td>
            <a class="btn" th:href="@{'/hr/documents/' + ${d.id} + '/download'}">Download</a>
            <form method="post" th:action="@{'/hr/documents/' + ${d.id} + '/delete'}" style="display:inline">
              <button class="btn" type="submit" onclick="return confirm('Delete this document?')">Delete</button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>

    </div>
  </div>

</div>
</body>
</html>

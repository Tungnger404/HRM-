<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contract Detail</title>

  <style>
    .wrap{
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .card{
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .title{
      font-size: 24px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 6px;
    }

    .sub{
      color: #6b7280;
      margin-bottom: 18px;
    }

    .grid{
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field{
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label{
      font-size: 14px;
      font-weight: 700;
      color: #374151;
    }

    input, select{
      height: 42px;
      padding: 0 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
      background: #fff;
    }

    input:focus, select:focus{
      border-color: #f5b400;
      box-shadow: 0 0 0 3px rgba(245, 180, 0, 0.12);
    }

    .full{
      grid-column: 1 / -1;
    }

    .msg{
      margin: 12px 0 16px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #bbf7d0;
      background: #ecfdf5;
      color: #065f46;
    }

    .msg-err{
      border: 1px solid #fecaca;
      background: #fef2f2;
      color: #991b1b;
    }

    .meta{
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .meta-box{
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      background: #fafafa;
    }

    .meta-label{
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .meta-value{
      font-size: 16px;
      font-weight: 800;
      color: #111827;
    }

    .actions{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .btn{
      height: 42px;
      padding: 0 16px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #111827;
    }

    .btn-primary{
      background: #f5b400;
      border-color: #f5b400;
    }

    .btn-secondary{
      background: #f9fafb;
    }

    @media (max-width: 768px){
      .grid, .meta{
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
<main layout:fragment="content">
  <div class="wrap">
    <div class="card">
      <div class="title">Contract Detail</div>
      <div class="sub">Edit contract type, status, duration, and salary for this employee.</div>

      <div class="msg" th:if="${msg != null and msg != ''}" th:text="${msg}"></div>
      <div class="msg msg-err" th:if="${err != null and err != ''}" th:text="${err}"></div>

      <div class="meta">
        <div class="meta-box">
          <div class="meta-label">Employee</div>
          <div class="meta-value" th:text="${contract.employee.fullName}">Employee Name</div>
        </div>
        <div class="meta-box">
          <div class="meta-label">Employee ID</div>
          <div class="meta-value" th:text="${contract.employee.empId}">1</div>
        </div>
        <div class="meta-box">
          <div class="meta-label">Contract Number</div>
          <div class="meta-value" th:text="${contract.contractNumber}">CT00001</div>
        </div>
      </div>

      <form method="post" th:action="@{'/hr/contracts/' + ${contract.id} + '/detail-update'}" class="grid">
        <div class="field">
          <label>Start Date</label>
          <input type="date" name="startDate" th:value="${contract.startDate}" required>
        </div>

        <div class="field">
          <label>End Date</label>
          <input type="date" name="endDate" th:value="${contract.endDate}">
        </div>

        <div class="field">
          <label>Base Salary</label>
          <input type="number" step="0.01" name="baseSalary" th:value="${contract.baseSalary}" required>
        </div>

        <div class="field">
          <label>Contract Status</label>
          <select name="status" required>
            <option value="ACTIVE" th:selected="${contract.status == 'ACTIVE'}">ACTIVE</option>
            <option value="EXPIRED" th:selected="${contract.status == 'EXPIRED'}">EXPIRED</option>
            <option value="TERMINATED" th:selected="${contract.status == 'TERMINATED'}">TERMINATED</option>
          </select>
        </div>

        <div class="field full">
          <label>Contract Type</label>
          <select name="contractType" required id="contractTypeSelect">
            <option value="PROBATION" th:selected="${contract.contractType == 'PROBATION'}">PROBATION</option>
            <option value="OFFICIAL_1_YEAR" th:selected="${contract.contractType == 'OFFICIAL_1_YEAR'}">OFFICIAL_1_YEAR</option>
            <option value="OFFICIAL_INDEFINITE" th:selected="${contract.contractType == 'OFFICIAL_INDEFINITE'}">OFFICIAL_INDEFINITE</option>
            <option value="INTERN" th:selected="${contract.contractType == 'INTERN'}">INTERN</option>
          </select>
        </div>

        <div class="actions full">
          <button class="btn btn-primary" type="submit">Save Changes</button>
          <a class="btn btn-secondary" th:href="@{/hr/contracts}">Back to Contracts</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const contractTypeSelect = document.getElementById('contractTypeSelect');
    const endDateInput = document.querySelector('input[name="endDate"]');

    function toggleEndDateByType() {
      const type = contractTypeSelect.value;
      if (type === 'OFFICIAL_INDEFINITE') {
        endDateInput.value = '';
        endDateInput.disabled = true;
      } else {
        endDateInput.disabled = false;
      }
    }

    contractTypeSelect.addEventListener('change', toggleEndDateByType);
    toggleEndDateByType();
  </script>
</main>
</body>
</html>

<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>Payroll Periods</title>

    <style>
        .period-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .toast-notification {
            position: fixed;
            top: 70px;
            right: 20px;
            z-index: 9999;
            min-width: 280px;
            max-width: 420px;
            padding: 14px 20px;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            font-size: 15px;
            font-weight: 500;
            color: #fff;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .toast-notification.show {
            transform: translateX(0);
        }

        .toast-success { background-color: #28a745; }
        .toast-danger { background-color: #dc3545; }
        .toast-warning { background-color: #ffc107; color: #212529; }

        .action-wrap {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
    </style>
</head>

<body>
<div layout:fragment="content">

    <div th:if="${msg != null}"
         id="serverToastMsg"
         class="toast-notification"
         th:classappend="'toast-' + (${msgType} != null ? ${msgType} : 'success')">
        <span th:text="${msg}"></span>
    </div>

    <div class="period-header">
        <h2 class="mb-0">Payroll Periods</h2>

        <form method="post" th:action="@{/hr/payroll/periods/create-current}">
            <div th:if="${_csrf != null}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            </div>
            <button type="submit" class="btn btn-primary">
                + Create Current Period
            </button>
        </form>
    </div>

    <div class="card">
        <div class="card-body table-responsive">
            <table class="table table-bordered table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th>Period</th>
                    <th>Status</th>
                    <th>Locked</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="p : ${periods}">
                    <td>
                        <span th:text="${p.month}"></span>/<span th:text="${p.year}"></span>
                    </td>
                    <td th:text="${p.status}"></td>
                    <td th:text="${p.locked}"></td>
                    <td>
                        <div class="action-wrap">
                            <a class="btn btn-sm btn-outline-primary"
                               th:href="@{/hr/payroll/periods/{id}/batches(id=${p.id})}">
                                View Batches
                            </a>

                            <span th:if="${!p.locked}">
                                <form method="post"
                                      th:action="@{/hr/payroll/periods/{id}/generate(id=${p.id})}"
                                      style="display:inline;">
                                    <div th:if="${_csrf != null}">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    </div>
                                    <button class="btn btn-sm btn-primary" type="submit">
                                        Generate Draft
                                    </button>
                                </form>
                            </span>

                            <span th:if="${p.locked}">
                                <form method="post"
                                      th:action="@{/hr/payroll/periods/{id}/unlock(id=${p.id})}"
                                      style="display:inline;">
                                    <div th:if="${_csrf != null}">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    </div>
                                    <button class="btn btn-sm btn-outline-warning" type="submit">
                                        🔓 Unlock
                                    </button>
                                </form>
                            </span>
                        </div>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(periods)}">
                    <td colspan="4" class="text-center text-body-secondary">
                        Chưa có kỳ lương nào
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const sToast = document.getElementById("serverToastMsg");
            if (sToast) {
                setTimeout(() => sToast.classList.add("show"), 50);
                setTimeout(() => sToast.classList.remove("show"), 4000);
            }
        });
    </script>

</div>
</body>
</html>

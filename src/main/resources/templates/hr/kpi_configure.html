<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
  <title>HR - KPI Configuration</title>
</head>
<body>
<div layout:fragment="content">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h3 class="mb-1">KPI Configuration</h3>
      <div class="text-body-secondary">Send KPI template to employees</div>
    </div>
  </div>

  <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>
  <div th:if="${err}" class="alert alert-danger" th:text="${err}"></div>

  <div class="card mb-4">
    <div class="card-header">
      <strong>Send KPI Template</strong>
    </div>
    <div class="card-body">
      <form method="post" th:action="@{/hr/kpi/configure/upload}" enctype="multipart/form-data">
        
        <div class="mb-3">
          <label class="form-label">Evaluation Cycle <span class="text-danger">*</span></label>
          <select name="cycleId" class="form-select" required>
            <option value="">-- Select Cycle --</option>
            <option value="1">Q1 2026</option>
            <option value="2">Q2 2026</option>
            <option value="3">H1 2026</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Employee ID <span class="text-danger">*</span></label>
          <input type="number" name="empId" class="form-control" placeholder="Enter employee ID" required>
          <small class="text-muted">Send to one employee at a time (bulk assign coming later)</small>
        </div>

        <div class="mb-3">
          <label class="form-label">Upload Excel KPI Template <span class="text-danger">*</span></label>
          <input type="file" name="excelFile" class="form-control" accept=".xlsx,.xls" required>
          <small class="text-muted">Accepted: .xlsx, .xls | Max: 10MB</small>
        </div>

        <div class="mb-3">
          <label class="form-label">Comment for Employee <span class="text-danger">*</span></label>
          <textarea name="hrComment" class="form-control" rows="4" placeholder="Example: Please complete KPI before March 31, 2026..." required></textarea>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="cil-check"></i> Send KPI
          </button>
          <a th:href="@{/hr/kpi/pending-verification}" class="btn btn-outline-secondary">
            View Pending Verification
          </a>
        </div>
      </form>
    </div>
  </div>

</div>
</body>
</html>

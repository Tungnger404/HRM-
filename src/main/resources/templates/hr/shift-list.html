<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<body>
<div layout:fragment="content">
    <style>
        .page-header {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 24px;
        }

        .card-custom {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.02);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .card-header-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title-custom {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-label-custom {
            font-weight: 600;
            font-size: 0.85rem;
            color: #475569;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control-glass {
            background-color: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 0.95rem;
            color: #1e293b;
            transition: all 0.3s ease;
        }
        .form-control-glass:focus {
            background-color: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .btn-premium {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #ffffff;
            font-weight: 600;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3);
            transition: all 0.3s ease;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 10px -1px rgba(37, 99, 235, 0.4);
            color: #ffffff;
        }

        .table-custom {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        .table-custom th {
            background: #f8fafc;
            padding: 16px 20px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #64748b;
            border-bottom: 2px solid #e2e8f0;
            text-transform: uppercase;
        }
        .table-custom td {
            padding: 20px;
            font-size: 0.95rem;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        .table-custom tr:last-child td {
            border-bottom: none;
        }
        .table-custom tbody tr {
            transition: background-color 0.2s ease;
        }
        .table-custom tbody tr:hover {
            background-color: #f8fafc;
        }

        .badge-pill-custom {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .badge-active {
            background: #dcfce7;
            color: #166534;
        }
        .badge-active::before {
            content: "";
            width: 6px; height: 6px; border-radius: 50%; background: #16a34a;
        }
        .badge-inactive {
            background: #ffe4e6;
            color: #9f1239;
        }
        .badge-inactive::before {
            content: "";
            width: 6px; height: 6px; border-radius: 50%; background: #e11d48;
        }
        .badge-overnight {
            background: #e0e7ff;
            color: #3730a3;
        }

        .time-box {
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-weight: 600;
            color: #0f172a;
            border: 1px solid #e2e8f0;
        }

        .action-container {
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #e2e8f0;
        }
    </style>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="page-header m-0">Attendance Scheduling</h1>
            <div class="text-muted"><i class="fas fa-calendar-alt me-2"></i> Shift Management</div>
        </div>
        <button class="btn btn-premium" data-coreui-toggle="modal" data-coreui-target="#createShiftModal">
            <i class="fas fa-plus me-2"></i> Create New Shift
        </button>
    </div>

    <!-- CREATE SHIFT MODAL -->
    <div class="modal fade" id="createShiftModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 shadow" style="border-radius: 16px;">
                <div class="modal-header bg-light border-0" style="border-top-left-radius: 16px; border-top-right-radius: 16px;">
                    <h5 class="modal-title fw-bold text-dark d-flex align-items-center gap-2">
                        <i class="fas fa-plus-circle text-primary"></i> Create New Shift
                    </h5>
                    <button type="button" class="btn-close" data-coreui-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/hr/shifts/create}" method="post">
                    <div class="modal-body p-4 row g-3">
                        <div class="col-md-6">
                            <label class="form-label form-label-custom">Code</label>
                            <input name="shiftCode" class="form-control form-control-glass" placeholder="e.g. DAY" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label form-label-custom">Name</label>
                            <input name="shiftName" class="form-control form-control-glass" placeholder="Day Shift" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label form-label-custom">Start Time</label>
                            <input type="time" name="startTime" class="form-control form-control-glass" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label form-label-custom">End Time</label>
                            <input type="time" name="endTime" class="form-control form-control-glass" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label form-label-custom" title="Wait Time Before Late (Mins)">Late Threshold (Mins)</label>
                            <input type="number" name="lateThresholdMinutes" class="form-control form-control-glass" value="15" min="0" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label form-label-custom">Overnight</label>
                            <select name="isOvernight" class="form-select form-control-glass">
                                <option value="false">No</option>
                                <option value="true">Yes</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer border-0 pb-4 pe-4">
                        <button type="button" class="btn btn-light rounded-3 px-4" data-coreui-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-premium px-4"><i class="fas fa-save me-2"></i> Create</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- SHIFT LIST CARD -->
    <div class="card-custom">
        <div class="card-header-glass">
            <h5 class="card-title-custom">
                <div class="d-flex align-items-center justify-content-center bg-success text-white rounded-circle p-2" style="width: 36px; height: 36px;">
                    <i class="fas fa-list"></i>
                </div>
                Active Schedules
            </h5>
            <span class="badge bg-light text-dark border px-3 py-2 rounded-pill shadow-sm" th:text="${shifts.size()} + ' Total Shifts'">0</span>
        </div>
        <div class="table-responsive">
            <table class="table-custom">
                <thead>
                <tr>
                    <th width="10%">ID</th>
                    <th width="30%">Shift Information</th>
                    <th width="40%">Configuration</th>
                    <th width="20%" class="text-center">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${shifts}">
                    <td class="fw-bold text-muted">#<span th:text="${s.shiftId}"></span></td>
                    
                    <!-- CURRENT INFO -->
                    <td>
                        <div class="d-flex flex-column gap-2">
                            <div class="d-flex align-items-center gap-2">
                                <span class="badge bg-dark px-2 py-1" th:text="${s.shiftCode}">DAY</span>
                                <h6 class="m-0 fw-bold fs-5 text-dark" th:text="${s.shiftName}">Day Shift</h6>
                            </div>
                        </div>
                    </td>
                    
                    <!-- CONFIGURATION (Read Only) -->
                    <td>
                        <div class="d-flex flex-column gap-2">
                            <div class="d-flex align-items-center gap-3 mt-2">
                                <div class="d-flex align-items-center gap-2">
                                    <i class="far fa-clock text-primary"></i>
                                    <span class="time-box" th:text="${#temporals.format(s.startTime, 'HH:mm')}">08:00</span>
                                    <i class="fas fa-arrow-right text-muted small"></i>
                                    <span class="time-box" th:text="${#temporals.format(s.endTime, 'HH:mm')}">17:00</span>
                                </div>
                                <span th:if="${s.isOvernight}" class="badge-pill-custom badge-overnight"><i class="fas fa-moon"></i> Overnight</span>
                            </div>
                            <div class="text-muted small fw-semibold mt-1">
                                <i class="fas fa-stopwatch me-1"></i> Late Threshold: <span class="text-danger fw-bold" th:text="${ruleMap.get(s.shiftId) + ' mins'}">15 mins</span>
                            </div>
                        </div>
                    </td>
                    
                    <!-- ACTIONS -->
                    <td class="text-center">
                        <div class="d-flex align-items-center justify-content-center gap-2">
                            <!-- Edit Button triggers modal -->
                            <button class="btn btn-sm btn-light text-primary border shadow-sm" data-coreui-toggle="modal" th:data-coreui-target="'#editShiftModal-' + ${s.shiftId}" title="Edit Shift">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <!-- Delete form -->
                            <form th:action="@{/hr/shifts/{id}/delete(id=${s.shiftId})}" method="post" class="m-0" onsubmit="return confirm('Are you sure you want to delete this shift?');">
                                <button class="btn btn-sm btn-light text-danger border shadow-sm" type="submit" title="Delete Shift">
                                    <i class="fas fa-trash-alt"></i> Delete
                                </button>
                            </form>
                        </div>
                        
                        <!-- EDIT SHIFT MODAL -->
                        <div class="modal fade text-start" th:id="'editShiftModal-' + ${s.shiftId}" tabindex="-1" aria-hidden="true">
                            <div class="modal-dialog modal-lg">
                                <div class="modal-content border-0 shadow" style="border-radius: 16px;">
                                    <div class="modal-header bg-light border-0" style="border-top-left-radius: 16px; border-top-right-radius: 16px;">
                                        <h5 class="modal-title fw-bold text-dark d-flex align-items-center gap-2">
                                            <i class="fas fa-edit text-primary"></i> Edit Shift <span th:text="${s.shiftCode} + ' - ' + ${s.shiftName}"></span>
                                        </h5>
                                        <button type="button" class="btn-close" data-coreui-dismiss="modal" aria-label="Close"></button>
                                    </div>
                                    <form th:action="@{/hr/shifts/{id}/update(id=${s.shiftId})}" method="post">
                                        <!-- Hidden active field to maintain status -->
                                        <input type="hidden" name="isActive" th:value="${s.isActive}">
                                        <div class="modal-body p-4 row g-3">
                                            <div class="col-md-6">
                                                <label class="form-label form-label-custom">Name</label>
                                                <input name="shiftName" class="form-control form-control-glass" th:value="${s.shiftName}" required>
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label form-label-custom">Late Threshold (Mins)</label>
                                                <input type="number" name="lateThresholdMinutes" class="form-control form-control-glass text-center fw-bold text-danger" th:value="${ruleMap.get(s.shiftId)}" min="0" required>
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label form-label-custom">Start Time</label>
                                                <input type="time" name="startTime" class="form-control form-control-glass" th:value="${s.startTime}" required>
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label form-label-custom">End Time</label>
                                                <input type="time" name="endTime" class="form-control form-control-glass" th:value="${s.endTime}" required>
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label form-label-custom">Overnight</label>
                                                <select name="isOvernight" class="form-select form-control-glass">
                                                    <option value="false" th:selected="${!s.isOvernight}">No</option>
                                                    <option value="true" th:selected="${s.isOvernight}">Yes</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="modal-footer border-0 pb-4 pe-4">
                                            <button type="button" class="btn btn-light rounded-3 px-4" data-coreui-dismiss="modal">Cancel</button>
                                            <button type="submit" class="btn btn-primary px-4"><i class="fas fa-save me-2"></i> Save</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
                
                <tr th:if="${#lists.isEmpty(shifts)}">
                    <td colspan="4" class="text-center py-5">
                        <div class="text-muted d-flex flex-column align-items-center gap-3">
                            <i class="fas fa-calendar-times fs-1 opacity-25"></i>
                            <div>No shift schedules found. Create one above to get started.</div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>

<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>Holidays Management</title>
</head>
<body>
<div layout:fragment="content">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-1">Holidays</h4>
            <div class="text-muted small">
                <span>Employee</span> / <span>Holidays</span>
            </div>
        </div>
        <div>
            <button type="button" class="btn btn-primary" data-coreui-toggle="modal" data-coreui-target="#addHolidayModal" style="background-color: #f26522; border-color: #f26522;">
                <i class="bi bi-plus-circle me-1"></i> Add Holiday
            </button>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light text-muted">
                    <tr>
                        <th>Title</th>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Status</th>
                        <th class="text-end">Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="h : ${holidays}">
                        <td class="fw-semibold" th:text="${h.title}"></td>
                        <td th:text="${#temporals.format(h.holidayDate, 'dd MMM yyyy')}"></td>
                        <td th:text="${h.description}"></td>
                        <td>
                            <span class="badge rounded-pill" 
                                  th:classappend="${h.status == 'ACTIVE'} ? 'bg-success' : 'bg-danger'"
                                  th:text="${h.status == 'ACTIVE'} ? '• Active' : '• Inactive'">
                            </span>
                        </td>
                        <td class="text-end text-nowrap">
                            <button type="button" class="btn btn-sm btn-outline-info me-1" 
                                    data-coreui-toggle="modal" th:data-coreui-target="'#editModal' + ${h.id}" title="Edit Holiday">
                                <i class="fas fa-pencil-alt"></i>
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-primary me-1" 
                                    data-coreui-toggle="modal" th:data-coreui-target="'#viewModal' + ${h.id}" title="View Details">
                                <i class="fas fa-eye"></i>
                            </button>
                            <form th:action="@{/hr/holidays/delete/{id}(id=${h.id})}" method="post" class="d-inline" onsubmit="return confirm('Are you sure you want to delete this holiday?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete Holiday">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(holidays)}">
                        <td colspan="5" class="text-center py-4 text-muted">No holidays found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add Holiday Modal -->
    <div class="modal fade" id="addHolidayModal" tabindex="-1" aria-labelledby="addHolidayModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{/hr/holidays/save}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold" id="addHolidayModalLabel">Add Holiday</h5>
                        <button type="button" class="btn-close" data-coreui-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Date <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="date" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea class="form-control" name="description" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Status <span class="text-danger">*</span></label>
                            <div class="form-check form-switch mt-1">
                                <input type="hidden" name="status" value="INACTIVE">
                                <input class="form-check-input" type="checkbox" role="switch" name="status" value="ACTIVE" checked onchange="this.previousElementSibling.disabled = this.checked" style="width: 2.5em; height: 1.25em; cursor: pointer;">
                                <label class="form-check-label ms-2 fw-medium" style="padding-top: 2px;">Active</label>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-coreui-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary" style="background-color: #f26522; border-color: #f26522;">Add Holiday</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- View Modals -->
    <th:block th:each="h : ${holidays}">
        <div class="modal fade" th:id="'viewModal' + ${h.id}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header bg-light">
                        <h5 class="modal-title fw-bold" th:text="${h.title}">Holiday Details</h5>
                        <button type="button" class="btn-close" data-coreui-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body p-4">
                        <div class="mb-3 border-bottom pb-2">
                            <div class="text-muted small text-uppercase fw-bold mb-1">Date</div>
                            <div class="fs-5" th:text="${#temporals.format(h.holidayDate, 'EEEE, dd MMM yyyy')}">Monday, 01 Jan 2026</div>
                        </div>
                        <div class="mb-3 border-bottom pb-2">
                            <div class="text-muted small text-uppercase fw-bold mb-1">Description</div>
                            <div th:text="${h.description != null and !h.description.isEmpty() ? h.description : 'No description provided.'}">Holiday description</div>
                        </div>
                        <div>
                            <div class="text-muted small text-uppercase fw-bold mb-1">Status</div>
                            <span class="badge rounded-pill" th:classappend="${h.status == 'ACTIVE'} ? 'bg-success' : 'bg-danger'" th:text="${h.status == 'ACTIVE' ? '• Active' : '• Inactive'}"></span>
                        </div>
                    </div>
                    <div class="modal-footer bg-light border-0">
                        <button type="button" class="btn btn-secondary" data-coreui-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Modal -->
        <div class="modal fade" th:id="'editModal' + ${h.id}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <form th:action="@{/hr/holidays/edit/{id}(id=${h.id})}" method="post">
                        <div class="modal-header bg-light">
                            <h5 class="modal-title fw-bold">Edit Holiday</h5>
                            <button type="button" class="btn-close" data-coreui-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body p-4">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="title" th:value="${h.title}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Date <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" name="date" th:value="${h.holidayDate}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Description</label>
                                <textarea class="form-control" name="description" rows="3" th:text="${h.description}"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Status <span class="text-danger">*</span></label>
                                <div class="form-check form-switch mt-1">
                                    <input type="hidden" name="status" value="INACTIVE">
                                    <input class="form-check-input" type="checkbox" role="switch" name="status" value="ACTIVE" 
                                           th:checked="${h.status == 'ACTIVE'}" 
                                           onchange="this.previousElementSibling.disabled = this.checked" 
                                           style="width: 2.5em; height: 1.25em; cursor: pointer;">
                                    <label class="form-check-label ms-2 fw-medium" style="padding-top: 2px;">Active</label>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer bg-light border-0">
                            <button type="button" class="btn btn-secondary" data-coreui-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary" style="background-color: #f26522; border-color: #f26522;">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </th:block>

</div>
</body>
</html>

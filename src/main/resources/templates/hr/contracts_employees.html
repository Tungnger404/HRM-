<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HR - Contract Management</title>

  <style>
    .wrap{
      max-width:1100px;
      margin:24px auto;
      padding:0 16px;
    }

    .card{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:16px;
      box-shadow:0 8px 24px rgba(15,23,42,.06);
    }

    .top{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .title{
      font-size:20px;
      font-weight:800;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    input, select{
      height:38px;
      padding:0 12px;
      border:1px solid #e5e7eb;
      border-radius:10px;
      outline:none;
    }

    input:focus, select:focus{
      border-color:#f5b400;
      box-shadow:0 0 0 4px rgba(245,180,0,.2);
    }

    .btn{
      height:38px;
      padding:0 12px;
      border:1px solid #d1d5db;
      border-radius:10px;
      background:#fff;
      cursor:pointer;
      font-weight:700;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      color:#111827;
    }

    .btn:hover{
      text-decoration:none;
      box-shadow:0 6px 16px rgba(15,23,42,.08);
    }

    .btn-icon{
      width:36px;
      height:36px;
      padding:0;
      border:1px solid #dbeafe;
      background:#eff6ff;
    }

    .table{
      width:100%;
      border-collapse:collapse;
      margin-top:12px;
    }

    .table th,
    .table td{
      padding:10px;
      border-bottom:1px solid #eee;
      text-align:left;
      font-size:14px;
      vertical-align:middle;
    }

    .table th{
      color:#6b7280;
      font-weight:800;
    }

    .badge{
      display:inline-block;
      padding:4px 12px;
      border-radius:999px;
      font-size:12px;
      border:1px solid #e5e7eb;
      background:#f9fafb;
      color:#6b7280;
      font-weight:700;
      min-width:90px;
      text-align:center;
    }

    .badge-active{
      background:#dcfce7;
      color:#166534;
      border-color:#bbf7d0;
    }

    .badge-probation{
      background:#fef9c3;
      color:#854d0e;
      border-color:#fde68a;
    }

    .badge-resigned{
      background:#fee2e2;
      color:#b91c1c;
      border-color:#fecaca;
    }

    .badge-terminated{
      background:#f3f4f6;
      color:#4b5563;
      border-color:#d1d5db;
    }

    .msg{
      margin:12px 0;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #bbf7d0;
      background:#ecfdf5;
      color:#065f46;
    }

    .msg-err{
      border:1px solid #fecaca;
      background:#fef2f2;
      color:#991b1b;
    }

    .action-icon{
      color:#2563eb;
      font-size:16px;
      line-height:1;
    }
  </style>
</head>

<body>
<div layout:fragment="content">
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div class="title">HR - Contract Management By Employee</div>

        <div class="actions">
          <form method="get" th:action="@{/hr/contracts}" style="display:flex;gap:10px;flex-wrap:wrap;">
            <input type="text" name="q" placeholder="Search employee name..." th:value="${q}">

            <select name="status">
              <option value="" th:selected="${status == null or status == ''}">All status</option>
              <option value="PROBATION" th:selected="${status == 'PROBATION'}">PROBATION</option>
              <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">ACTIVE</option>
              <option value="RESIGNED" th:selected="${status == 'RESIGNED'}">RESIGNED</option>
              <option value="TERMINATED" th:selected="${status == 'TERMINATED'}">TERMINATED</option>
            </select>

            <button class="btn" type="submit">Filter</button>
            <a class="btn" th:href="@{/hr/contracts}">Reset</a>
          </form>
        </div>
      </div>

      <div class="msg" th:if="${msg != null and msg != ''}" th:text="${msg}"></div>
      <div class="msg msg-err" th:if="${err != null and err != ''}" th:text="${err}"></div>

      <table class="table">
        <thead>
        <tr>
          <th>Emp ID</th>
          <th>Full Name</th>
          <th>Phone</th>
          <th>Department</th>
          <th>Job Position</th>
          <th>Status</th>
          <th style="width:120px">Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${employees == null or #lists.isEmpty(employees)}">
          <td colspan="7" style="color:#6b7280;padding:14px;">No employees found.</td>
        </tr>

        <tr th:each="e : ${employees}">
          <td th:text="${e.empId}"></td>
          <td th:text="${e.fullName}"></td>
          <td th:text="${e.phone}"></td>
          <td th:text="${e.department != null ? e.department.deptName : ''}"></td>
          <td th:text="${e.jobPosition != null ? e.jobPosition.title : ''}"></td>
          <td>
            <span class="badge"
                  th:text="${e.status}"
                  th:classappend="${
                    #strings.equalsIgnoreCase(e.status, 'ACTIVE') ? ' badge-active' :
                    (#strings.equalsIgnoreCase(e.status, 'PROBATION') ? ' badge-probation' :
                    (#strings.equalsIgnoreCase(e.status, 'RESIGNED') ? ' badge-resigned' :
                    (#strings.equalsIgnoreCase(e.status, 'TERMINATED') ? ' badge-terminated' : '')))
                  }">
            </span>
          </td>
          <td>
            <a class="btn btn-icon"
               th:href="@{'/hr/contracts/' + ${e.empId} + '/list'}"
               title="Manage contracts">
              <i class="fa-solid fa-pen action-icon"></i>
            </a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>

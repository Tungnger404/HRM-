<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      th:with="sidebar='sidebar-hr'">

<head>
    <title>Review Request | Enterprise HRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        /* Enterprise Theme Variables */
        :root {
            --primary-blue: #4361ee;
            --bg-light: #f8f9fc;
            --border-color: #eaecf0;
            --text-main: #101828;
            --text-muted: #667085;
        }

        body { background-color: var(--bg-light); }

        .detail-card {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            background: #fff;
        }

        .header-section {
            padding: 2rem;
            border-bottom: 1px solid var(--border-color);
            background: #ffffff;
        }

        .priority-badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .priority-HIGH { background: #fef3f2; color: #b42318; border: 1px solid #fee4e2; }
        .priority-MEDIUM { background: #fffaeb; color: #b54708; border: 1px solid #fef0c7; }
        .priority-LOW { background: #ecfdf3; color: #027a48; border: 1px solid #d1fadf; }

        .info-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .info-value {
            color: var(--text-main);
            font-weight: 600;
            font-size: 1rem;
        }

        .content-box {
            background: #fcfcfd;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .reason-quote {
            font-style: italic;
            color: #344054;
            line-height: 1.6;
            padding-left: 1rem;
            border-left: 3px solid var(--primary-blue);
        }

        .deadline-widget {
            background: #fff1f0;
            border: 1px solid #ffa39e;
            border-radius: 12px;
            padding: 1.25rem;
        }

        .action-bar {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .btn-approve {
            background: #12b76a;
            border: none;
            color: white;
            font-weight: 700;
            padding: 12px 32px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn-approve:hover { background: #0e9658; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(18, 183, 106, 0.2); }

        .btn-reject-toggle {
            color: #d92d20;
            background: #fff;
            border: 1px solid #fecdca;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 8px;
        }
        .btn-reject-toggle:hover { background: #fef3f2; }

        .reject-form-area {
            background: #fef3f2;
            border: 1px solid #fee4e2;
            border-radius: 12px;
            padding: 2rem;
        }
    </style>
</head>

<body>

<div layout:fragment="content">
    <div class="container py-5">

        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/hr/recruitment-request/list}" class="text-decoration-none text-muted">Requests</a></li>
                <li class="breadcrumb-item active fw-semibold text-dark">Review Detail</li>
            </ol>
        </nav>

        <div class="card detail-card overflow-hidden">
            <div class="header-section">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <div class="d-flex align-items-center gap-3 mb-2">
                            <span class="text-muted small fw-bold" th:text="'#' + ${request.reqId}"></span>
                            <span th:class="'priority-badge priority-' + ${request.priority}" th:text="${request.priority}"></span>
                        </div>
                        <h2 class="fw-bold text-dark mb-0" th:text="${request.jobPosition.title}">Position</h2>
                    </div>
                    <div class="col-md-4 text-md-end mt-3 mt-md-0">
                        <span class="badge rounded-pill px-4 py-2 fw-bold shadow-sm"
                              th:classappend="${request.status.name() == 'SUBMITTED' ? 'bg-warning text-dark' :
                                                request.status.name() == 'APPROVED' ? 'bg-success text-white' :
                                                request.status.name() == 'REJECTED' ? 'bg-danger text-white' : 'bg-secondary'}"
                              th:text="${request.status}">
                        </span>
                    </div>
                </div>
            </div>

            <div class="card-body p-4 p-md-5" th:with="isSubmitted=${request.status.name() == 'SUBMITTED'}">
                <div class="row g-5">

                    <div class="col-lg-7">
                        <div class="section-group mb-4">
                            <h6 class="info-label"><i class="bi bi-file-earmark-text me-2"></i>Position Specification</h6>
                            <div class="content-box">
                                <div class="row g-4">
                                    <div class="col-sm-6">
                                        <label class="info-label d-block">Department</label>
                                        <div class="info-value"><i class="bi bi-building me-2 opacity-50"></i><span th:text="${request.department.deptName}"></span></div>
                                    </div>
                                    <div class="col-sm-6">
                                        <label class="info-label d-block">Positions Needed</label>
                                        <div class="info-value"><i class="bi bi-people me-2 opacity-50"></i><span th:text="${request.quantity + ' Persons'}"></span></div>
                                    </div>
                                    <div class="col-12 border-top pt-3">
                                        <label class="info-label d-block">Proposed Salary</label>
                                        <div class="info-value text-success font-monospace" th:text="${request.proposedSalary ?: 'Negotiable'}"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="section-group mb-4">
                            <h6 class="info-label"><i class="bi bi-gear-wide-connected me-2"></i>Tech Stack & Skills</h6>
                            <div class="content-box">
                                <p class="mb-0 text-dark" th:text="${request.technicalRequirements ?: 'No specific tech stack defined.'}"></p>
                            </div>
                        </div>

                        <div class="section-group">
                            <h6 class="info-label"><i class="bi bi-chat-quote me-2"></i>Justification</h6>
                            <div class="content-box bg-white">
                                <div class="reason-quote" th:text="${request.reason}">Detailed reason...</div>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-5">
                        <div class="deadline-widget mb-4 shadow-sm text-center">
                            <div class="text-danger fw-bold small mb-1 uppercase">Target Hiring Date</div>
                            <div class="display-6 fw-bold text-dark" th:text="${#temporals.format(request.deadline, 'dd MMM, yyyy')}"></div>
                        </div>

                        <div class="card border-light-subtle rounded-4 p-4 mb-4">
                            <h6 class="info-label mb-3">Submission Info</h6>
                            <div class="d-flex align-items-center mb-4">
                                <div class="bg-primary bg-opacity-10 text-primary rounded-circle p-2 me-3" style="width: 40px; height: 40px; display: flex; align-items:center; justify-content:center;">
                                    <i class="bi bi-person"></i>
                                </div>
                                <div>
                                    <div class="text-muted smaller">Requested By</div>
                                    <div class="fw-bold" th:text="${request.createdBy != null ? request.createdBy.fullName : 'Hiring Manager'}"></div>
                                </div>
                            </div>
                            <div class="d-flex align-items-center">
                                <div class="bg-primary bg-opacity-10 text-primary rounded-circle p-2 me-3" style="width: 40px; height: 40px; display: flex; align-items:center; justify-content:center;">
                                    <i class="bi bi-calendar-check"></i>
                                </div>
                                <div>
                                    <div class="text-muted smaller">Submission Date</div>
                                    <div class="fw-bold" th:text="${#temporals.format(request.createdAt, 'dd/MM/yyyy HH:mm')}"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:if="${isSubmitted}" class="action-bar d-flex flex-column flex-md-row align-items-center justify-content-between gap-3 shadow-sm">
                    <div>
                        <h6 class="fw-bold text-dark mb-1">Process this request</h6>
                    </div>
                    <div class="d-flex gap-3 w-100 w-md-auto">
                        <form th:action="@{'/hr/recruitment-request/' + ${request.reqId} + '/approve'}" method="post" class="flex-grow-1">
                            <button type="submit" class="btn btn-approve w-100">
                                <i class="bi bi-check2-circle me-2"></i> APPROVE
                            </button>
                        </form>
                        <button type="button" class="btn btn-reject-toggle flex-grow-1" onclick="toggleRejectForm()">
                            <i class="bi bi-x-lg me-2"></i> REJECT
                        </button>
                    </div>
                </div>

                <div id="rejectForm" style="display:none;" class="reject-form-area mt-4 animate__animated animate__fadeIn">
                    <form th:action="@{'/hr/recruitment-request/' + ${request.reqId} + '/reject'}" method="post">
                        <div class="mb-4">
                            <textarea name="reason" class="form-control border-danger-subtle" rows="4"
                                      placeholder="Explain why this request is being declined..." required></textarea>
                        </div>
                        <div class="d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-link text-muted text-decoration-none" onclick="toggleRejectForm()">Cancel</button>
                            <button type="submit" class="btn btn-danger px-5 rounded-3 fw-bold">Confirm Reject</button>
                        </div>
                    </form>
                </div>

                <div class="mt-5 text-center p-5 bg-primary bg-opacity-10 rounded-4"
                     th:if="${request.status.name() == 'APPROVED' && request.jobDescription == null}">
                    <h5 class="fw-bold text-primary mb-3">Request Approved!</h5>
                    <a th:href="@{/hr/job-description/create(requestId=${request.reqId})}" class="btn btn-primary px-5 py-3 rounded-3 fw-bold shadow">
                        <i class="bi bi-file-earmark-plus me-2"></i> CREATE JOB DESCRIPTION
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div layout:fragment="script">
    <script th:inline="javascript">
        function toggleRejectForm() {
            const form = document.getElementById('rejectForm');
            if (form) {
                const isHidden = (form.style.display === 'none' || form.style.display === '');

                if (isHidden) {
                    form.style.display = 'block';
                    // Cuộn mượt xuống khu vực form
                    setTimeout(() => {
                        form.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 50);
                } else {
                    form.style.display = 'none';
                }
            }
        }
    </script>
</div>

</body>
</html>

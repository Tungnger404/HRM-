<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      th:with="sidebar='sidebar-hr'">
<head>
    <title>Recruitment Management | HRM System</title>
    <style>
        /* Modern Enterprise UI Root */
        :root {
            --primary-blue: #4361ee;
            --border-color: #eaecf0;
            --bg-light: #fcfcfd;
            --text-main: #101828;
            --text-muted: #667085;
            --success-green: #12b76a;
        }

        body { background-color: #f8f9fc; }

        /* Filter Section */
        .filter-container {
            background: #ffffff;
            border-bottom: 1px solid var(--border-color);
            padding: 1.25rem;
        }

        .form-select-custom {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.875rem;
            color: var(--text-main);
            padding: 0.5rem 0.75rem;
            background-color: #fff;
        }

        /* Table Styling */
        .card-table {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: #fff;
            overflow: hidden;
            box-shadow: 0 1px 3px rgba(16, 24, 40, 0.1);
        }

        .req-table thead th {
            background-color: var(--bg-light);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .req-table tbody td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
            color: var(--text-main);
        }

        .table-row-hover:hover {
            background-color: #f9fafb;
            cursor: pointer;
        }

        /* --- NEW ACTION UI STYLES --- */
        .action-wrapper {
            display: flex;
            justify-content: center; /* Đổi từ flex-end sang center */
            align-items: center;
            gap: 8px;
            /* Loại bỏ hoặc giảm min-width nếu cần thiết để cân đối hơn */
            min-width: 180px;
        }

        /* Nút View dạng Ghost (tinh tế hơn) */
        .btn-view-custom {
            color: var(--text-muted);
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.813rem;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-view-custom:hover {
            background-color: #f1f5f9;
            color: var(--primary-blue);
            border-color: var(--primary-blue);
        }

        /* Nút Thiết lập JD dạng Solid (nổi bật) */
        .btn-establish-jd {
            background-color: var(--success-green) !important;
            color: white !important;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.813rem;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 1px 2px rgba(16, 24, 40, 0.05);
        }
        .btn-establish-jd:hover {
            background-color: #0e9657 !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px rgba(16, 24, 40, 0.1);
        }

        /* Status Badges */
        .badge-subtle {
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .status-approved { background-color: #ecfdf3; color: #027a48; }
        .status-rejected { background-color: #fef3f2; color: #b42318; }
        .status-submitted { background-color: #fffaeb; color: #b54708; }

        /* Priority Indicators */
        .priority-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .bg-high { background-color: #f04438; }
        .bg-medium { background-color: #f79009; }
        .bg-low { background-color: #12b76a; }

        .search-wrapper { position: relative; }
        .search-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .search-wrapper input {
            padding-left: 36px !important;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
    </style>
</head>

<body>

<div layout:fragment="content">
    <div class="container-fluid py-4 px-4">

        <div class="d-flex justify-content-between align-items-end mb-4">
            <div>
                <h3 class="fw-bold text-dark mb-1">Recruitment Requests</h3>
            </div>
            <div class="text-end">
                <span class="badge bg-white text-dark border shadow-sm py-2 px-3">
                    Total: <span class="fw-bold" th:text="${requests.size()}">0</span> Requests
                </span>
            </div>
        </div>

        <div th:if="${param.approved}" class="alert alert-success border-0 shadow-sm d-flex align-items-center rounded-3">
            <i class="bi bi-check-circle-fill me-2"></i> Request approved successfully.
        </div>

        <div class="card-table">
            <div class="filter-container">
                <form method="get" th:action="@{/hr/recruitment-request/list}" class="row g-3">
                    <div class="col-lg-4">
                        <div class="search-wrapper">
                            <i class="bi bi-search"></i>
                            <input type="text" name="keyword" th:value="${keyword}"
                                   class="form-control form-control-sm shadow-none"
                                   placeholder="Search by ID or Position...">
                        </div>
                    </div>

                    <div class="col-lg-2">
                        <select name="status" class="form-select-custom w-100" onchange="this.form.submit()">
                            <option value="">All Statuses</option>
                            <option value="SUBMITTED" th:selected="${status == 'SUBMITTED'}">Submitted</option>
                            <option value="APPROVED" th:selected="${status == 'APPROVED'}">Approved</option>
                            <option value="REJECTED" th:selected="${status == 'REJECTED'}">Rejected</option>
                        </select>
                    </div>

                    <div class="col-lg-2">
                        <select name="priority" class="form-select-custom w-100" onchange="this.form.submit()">
                            <option value="">All Priorities</option>
                            <option value="HIGH" th:selected="${priority == 'HIGH'}">High Priority</option>
                            <option value="MEDIUM" th:selected="${priority == 'MEDIUM'}">Medium</option>
                            <option value="LOW" th:selected="${priority == 'LOW'}">Low Priority</option>
                        </select>
                    </div>

                    <div class="col-lg-2 ms-auto">
                        <button class="btn btn-sm btn-primary w-100 fw-bold py-2 shadow-sm" type="submit">
                            <i class="bi bi-funnel me-1"></i> Filter
                        </button>
                    </div>
                </form>
            </div>

            <div class="table-responsive">
                <table class="table req-table mb-0">
                    <thead>
                    <tr>
                        <th style="width: 100px;">Req ID</th>
                        <th>Job Information</th>
                        <th>Priority</th>
                        <th class="text-center">Quantity</th>
                        <th class="text-center">Status</th>
                        <th>Date Created</th>
                        <th class="text-center">Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="req : ${requests}" class="table-row-hover"
                        th:onclick="|window.location.href='@{/hr/recruitment-request/detail/{id}(id=${req.reqId})}'|">

                        <td class="fw-semibold text-primary" th:text="${'#' + req.reqId}"></td>

                        <td>
                            <div class="fw-bold mb-1" th:text="${req.jobPosition.title}">Position</div>
                            <div class="text-muted smaller">
                                <i class="bi bi-building me-1"></i><span th:text="${req.department.deptName}">Dept</span>
                            </div>
                        </td>

                        <td>
                            <div class="priority-label">
                                <span th:class="'dot bg-' + ${#strings.toLowerCase(req.priority)}"></span>
                                <span th:text="${req.priority}"></span>
                            </div>
                        </td>

                        <td class="text-center">
                            <span class="fw-bold" th:text="${req.quantity}">1</span>
                        </td>

                        <td class="text-center">
                            <span th:if="${req.status.name() == 'APPROVED'}" class="badge-subtle status-approved">
                                <i class="bi bi-check2"></i> Approved
                            </span>
                            <span th:if="${req.status.name() == 'REJECTED'}" class="badge-subtle status-rejected">
                                <i class="bi bi-x"></i> Rejected
                            </span>
                            <span th:if="${req.status.name() == 'SUBMITTED'}" class="badge-subtle status-submitted">
                                <i class="bi bi-clock-history"></i> Submitted
                            </span>
                        </td>

                        <td>
                            <div class="small fw-medium" th:text="${#temporals.format(req.createdAt,'dd MMM, yyyy')}"></div>
                            <div class="text-muted smaller" th:text="${#temporals.format(req.createdAt,'HH:mm')}"></div>
                        </td>

                        <td class="text-center">
                            <div class="action-wrapper">
                                <a th:href="@{/hr/recruitment-request/detail/{id}(id=${req.reqId})}"
                                   class="btn-view-custom" onclick="event.stopPropagation();">
                                    <i class="bi bi-eye"></i> View
                                </a>
                                <a th:if="${req.status.name() == 'APPROVED'}"
                                   th:href="@{/hr/job-description/create(requestId=${req.reqId})}"
                                   class="btn-establish-jd" onclick="event.stopPropagation();">
                                    <i class="bi bi-file-earmark-plus"></i> Thiết lập JD
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(requests)}">
                        <td colspan="7" class="text-center py-5 text-muted">
                            <i class="bi bi-folder2-open d-block fs-2 mb-2 opacity-50"></i>
                            No recruitment requests found.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>

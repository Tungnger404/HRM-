<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Software House HRM - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="/sbadmin/vendor/fontawesome-free/css/all.min.css" th:href="@{/sbadmin/vendor/fontawesome-free/css/all.min.css}" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,700,800,900" rel="stylesheet">
    <link href="/sbadmin/css/sb-admin-2.min.css" th:href="@{/sbadmin/css/sb-admin-2.min.css}" rel="stylesheet">

    <style>
        .bg-login-image {
            background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
                        url('/sbadmin/img/login-side.jpg.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        .system-title {
            font-weight: 700;
            color: #4e73df;
        }

        .login-card {
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .alert {
            text-align: left;
        }
    </style>
</head>

<body class="bg-gradient-primary">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-xl-10 col-lg-12 col-md-9">

            <div class="card o-hidden border-0 shadow-lg my-5 login-card">
                <div class="card-body p-0">
                    <div class="row">
                        <!-- Left image panel -->
                        <div class="col-lg-6 d-none d-lg-block bg-login-image"></div>

                        <!-- Right login form -->
                        <div class="col-lg-6">
                            <div class="p-5">
                                <div class="text-center mb-4">
                                    <h1 class="h4 text-gray-900 mb-2">Welcome Back!</h1>
                                    <p class="small text-muted mb-0">Sign in to access the HRM system</p>
                                </div>

                                <div class="text-center mb-4">
                                    <h5 class="system-title">Software House HRM System</h5>
                                </div>

                                <div class="alert alert-success" th:if="${param.registered}">
                                    Registration successful. Please sign in.
                                </div>

                                <div class="alert alert-success" th:if="${param.resetSuccess}">
                                    Password changed successfully. Please sign in again.
                                </div>

                                <div class="alert alert-info" th:if="${param.logout}">
                                    You have been logged out.
                                </div>

                                <div class="alert alert-danger" th:if="${param.error}">
                                    Invalid username, password.
                                </div>

                                <form class="user" action="/login" th:action="@{/login}" method="post">
                                    <div class="form-group">
                                        <input type="text"
                                               class="form-control form-control-user"
                                               name="username"
                                               placeholder="Enter username or email"
                                               required>
                                    </div>

                                    <div class="form-group">
                                        <input type="password"
                                               class="form-control form-control-user"
                                               name="password"
                                               placeholder="Password"
                                               required>
                                    </div>

                                    <div class="form-group">
                                        <div class="custom-control custom-checkbox small">
                                            <input type="checkbox" class="custom-control-input" id="rememberMe">
                                            <label class="custom-control-label" for="rememberMe">
                                                Remember Me
                                            </label>
                                        </div>
                                    </div>

                                    <button type="submit" class="btn btn-primary btn-user btn-block">
                                        Login
                                    </button>

                                    <hr>
                                </form>

                                <hr>

                                <div class="text-center">
                                    <a class="small" href="/forgot-password" th:href="@{/forgot-password}">Forgot Password?</a>
                                </div>

                                <div class="text-center">
                                    <a class="small" href="/register" th:href="@{/register}">Create an Account!</a>
                                </div>
                            </div>
                        </div>
                        <!-- End right login form -->
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="/sbadmin/vendor/jquery/jquery.min.js" th:src="@{/sbadmin/vendor/jquery/jquery.min.js}"></script>
<script src="/sbadmin/vendor/bootstrap/js/bootstrap.bundle.min.js" th:src="@{/sbadmin/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script src="/sbadmin/vendor/jquery-easing/jquery.easing.min.js" th:src="@{/sbadmin/vendor/jquery-easing/jquery.easing.min.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

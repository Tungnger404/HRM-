<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">
    <h2>Reset Password</h2>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/forgot-password/reset}" th:object="${resetPasswordRequest}" method="post">
        <input type="hidden" th:field="*{email}">

        <div class="mb-3">
            <label>New Password</label>
            <input type="password" th:field="*{newPassword}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Confirm Password</label>
            <input type="password" th:field="*{confirmPassword}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">Change Password</button>
    </form>
</div>
</body>
</html>

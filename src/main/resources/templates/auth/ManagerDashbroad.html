<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<head>
    <title>Manager Dashboard</title>
</head>

<body>
<main layout:fragment="content">

    <div class="mb-3">
        <h3 class="mb-1">Manager Dashboard</h3>
        <div class="text-body-secondary">Team overview & approvals</div>
    </div>

    <div class="row g-3 mb-4"></div>

    <div class="card">
        <div class="card-header fw-semibold">Quick actions</div>
        <div class="card-body">
            <div class="d-flex flex-wrap gap-2">
                <a class="btn btn-outline-secondary" th:href="@{/manager/change-requests}">Change Requests</a>
                <a class="btn btn-outline-danger ms-auto" th:href="@{/logout}">Logout</a>
            </div>
        </div>
    </div>

</main>
</body>
</html>

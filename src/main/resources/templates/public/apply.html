<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Apply Job - HRM Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-color: #2563eb;
            --bg-body: #f1f5f9;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: #1e293b;
        }

        .apply-container {
            max-width: 700px;
            margin: 60px auto;
        }

        .apply-card {
            background: white;
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        .apply-header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 40px;
            color: white;
        }

        .job-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.85rem;
            backdrop-filter: blur(4px);
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #475569;
            margin-bottom: 8px;
        }

        .form-control {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* Custom File Upload */
        .cv-upload-box {
            border: 2px dashed #cbd5e1;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            background: #f8fafc;
            cursor: pointer;
            transition: 0.3s;
        }

        .cv-upload-box:hover {
            border-color: var(--primary-color);
            background: #eff6ff;
        }

        .submit-btn {
            background: var(--primary-color);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .cancel-link {
            text-decoration: none;
            color: #64748b;
            font-weight: 500;
            display: block;
            text-align: center;
            margin-top: 20px;
            transition: 0.2s;
        }

        .cancel-link:hover { color: #1e293b; }
    </style>
</head>

<body>

<div class="container">
    <div class="apply-container">

        <a th:href="@{'/careers/' + ${job.slug}}" class="text-decoration-none text-muted mb-4 d-inline-block">
            <i class="bi bi-arrow-left me-1"></i> Quay lại chi tiết công việc
        </a>

        <div class="apply-card">
            <div class="apply-header text-center">
                <span class="job-badge mb-3 d-inline-block">Ứng tuyển vị trí</span>
                <h2 class="fw-bold mb-0" th:text="${job.title}">Job Title</h2>
            </div>

            <div class="card-body p-4 p-md-5">

                <div th:if="${error}" class="alert alert-danger d-flex align-items-center rounded-3" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <div th:text="${error}"></div>
                </div>

                <form th:action="@{/careers/apply}" method="post" enctype="multipart/form-data">
                    <input type="hidden" name="postingId" th:value="${job.postingId}"/>

                    <div class="row g-4">
                        <div class="col-12">
                            <label class="form-label">Họ và tên <span class="text-danger">*</span></label>
                            <input type="text" name="fullName" class="form-control"
                                   placeholder="Nguyễn Văn A" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Email <span class="text-danger">*</span></label>
                            <input type="email" name="email" class="form-control"
                                   placeholder="email@example.com" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                            <input type="text" name="phone" class="form-control"
                                   placeholder="09xx xxx xxx" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Tải lên CV (PDF) <span class="text-danger">*</span></label>
                            <div class="cv-upload-box" onclick="document.getElementById('cvInput').click()">
                                <i class="bi bi-cloud-arrow-up fs-1 text-primary"></i>
                                <p class="mb-1 mt-2 fw-bold">Nhấn để tải lên hoặc kéo thả</p>
                                <p class="text-muted small mb-0">Hỗ trợ định dạng .pdf, .doc, .docx (Max 5MB)</p>
                                <input type="file" id="cvInput" name="cvFile" class="d-none"
                                       onchange="updateFileName(this)" required>
                                <div id="fileNameDisplay" class="mt-2 fw-bold text-success small"></div>
                            </div>
                        </div>

                        <div class="col-12 mt-5">
                            <button type="submit" class="btn btn-primary submit-btn">
                                GỬI HỒ SƠ ỨNG TUYỂN
                            </button>
                            <a th:href="@{'/careers/' + ${job.slug}}" class="cancel-link">Hủy bỏ</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="text-center mt-4">
            <p class="small text-muted">Bằng việc gửi hồ sơ, bạn đồng ý với Điều khoản và Chính sách bảo mật của HRM System.</p>
        </div>
    </div>
</div>

<script>
    // Hàm hiển thị tên file sau khi chọn
    function updateFileName(input) {
        const display = document.getElementById('fileNameDisplay');
        if (input.files && input.files[0]) {
            display.innerHTML = `<i class="bi bi-check-circle-fill me-1"></i> Đã chọn: ${input.files[0].name}`;
        } else {
            display.innerHTML = "";
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thành công | HRM System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .success-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease-out; /* Hiệu ứng hiện hình */
        }
        .check-icon {
            font-size: 80px;
            color: #28a745;
            margin-bottom: 25px;
            display: block;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s both;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        .alert-info {
            border: none;
            background-color: #e7f1ff;
            color: #0d6efd;
            border-radius: 10px;
            padding: 15px 25px;
        }
        .btn-home {
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="success-card text-center">
        <i class="fas fa-check-circle check-icon"></i>

        <h2 class="fw-bold mb-3">Chúc mừng thành viên mới!</h2>
        <p class="lead text-muted mb-4">
            Thủ tục Onboarding đã hoàn tất. Chào mừng bạn chính thức gia nhập đội ngũ <strong>Software House</strong>.
        </p>

        <div class="alert alert-info d-inline-block mb-4">
            <i class="fas fa-envelope-open-text me-2"></i>
            Thông tin hướng dẫn nhận việc vào ngày
            <strong th:text="${joinDate}">2026-03-20</strong> đã được gửi tới email của bạn.
        </div>

        <div class="d-block mt-2">
            <a href="/" class="btn btn-primary btn-home">
                <i class="fas fa-home me-2"></i>Quay lại trang chủ
            </a>
        </div>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="content">

    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Attendance</h5>
        </div>

        <div class="card-body">

            <div th:if="${message}" class="alert alert-success">
                <span th:text="${message}"></span>
            </div>

            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <div class="mb-3">
                <h6 class="fw-bold">Current Time</h6>
                <div id="clock" class="fs-4 text-primary fw-bold"></div>
            </div>

            <div class="mb-4 d-flex gap-2">
                <form th:action="@{/employee/attendance/check-in}" method="post">
                    <button type="submit" class="btn btn-success">Check In</button>
                </form>

                <form th:action="@{/employee/attendance/check-out}" method="post">
                    <button type="submit" class="btn btn-danger">Check Out</button>
                </form>
            </div>

            <hr>

            <h6 class="fw-bold mb-3">Attendance History</h6>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Date</th>
                        <th>Check In</th>
                        <th>Check Out</th>
                        <th>Status</th>
                        <th>Late (min)</th>
                        <th>Early Leave (min)</th>
                        <th>Work Type</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="log : ${logs}">
                        <td th:text="${#temporals.format(log.workDate, 'dd/MM/yyyy')}"></td>
                        <td th:text="${log.checkIn != null ? #temporals.format(log.checkIn, 'dd/MM/yyyy HH:mm:ss') : '-'}"></td>
                        <td th:text="${log.checkOut != null ? #temporals.format(log.checkOut, 'dd/MM/yyyy HH:mm:ss') : '-'}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="
                                    ${log.status == 'ON_TIME' ? ' bg-success' :
                                    (log.status == 'LATE' ? ' bg-warning text-dark' :
                                    (log.status == 'EARLY_LEAVE' ? ' bg-info text-dark' :
                                    (log.status == 'LATE_EARLY_LEAVE' ? ' bg-danger' :
                                    (log.status == 'ABSENT' ? ' bg-dark' : ' bg-secondary'))))}"
                                  th:text="${log.status}">
                            </span>
                        </td>
                        <td th:text="${log.lateMinutes != null ? log.lateMinutes : 0}"></td>
                        <td th:text="${log.earlyLeaveMinutes != null ? log.earlyLeaveMinutes : 0}"></td>
                        <td>
                            <span class="badge bg-secondary"
                                  th:text="${log.workType != null ? log.workType : '-'}">
                            </span>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(logs)}">
                        <td colspan="7" class="text-center text-muted">
                            No attendance records found.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');

            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            const timeString = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
            document.getElementById("clock").innerText = timeString;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</div>

</html>

<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee - My Documents</title>

  <style>
    .wrap{max-width:1200px;margin:24px auto;padding:0 16px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px}
    .top{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .title{font-size:20px;font-weight:800}
    input,select{height:38px;padding:0 12px;border:1px solid #e5e7eb;border-radius:10px;outline:none}
    input:focus,select:focus{border-color:#f5b400;box-shadow:0 0 0 4px rgba(245,180,0,.2)}
    .btn{height:38px;padding:0 12px;border:1px solid #e5e7eb;border-radius:10px;background:#fff;cursor:pointer;font-weight:700;display:inline-flex;align-items:center}
    .btn-primary{background:#f5b400;border-color:#f5b400}
    .table{width:100%;border-collapse:collapse;margin-top:12px}
    .table th,.table td{padding:10px;border-bottom:1px solid #eee;text-align:left;font-size:14px;vertical-align:top}
    .table th{color:#6b7280;font-weight:800}
    .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;border:1px solid #e5e7eb;background: #1435a1
    }
    .msg{margin:12px 0;padding:10px 12px;border-radius:10px;border:1px solid #bbf7d0;background:#ecfdf5;color:#065f46}
    .msg-err{border:1px solid #fecaca;background:#fef2f2;color:#991b1b}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    a{color:#111;text-decoration:none}
    a:hover{text-decoration:underline}
    .small{font-size:12px;color:#6b7280}
    .sp{flex:1}

    /* ✅ chia đôi FILTER / UPLOAD */
    .panel-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      margin-top:12px;
    }
    .panel{
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:12px;
      background:#fafafa;
    }
    .panel h3{
      margin:0 0 10px 0;
      font-size:14px;
      color:#6b7280;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.02em;
    }
    @media (max-width: 900px){
      .panel-grid{grid-template-columns: 1fr;}
    }
  </style>
</head>

<body>
<div layout:fragment="content">

  <div class="wrap">
    <div class="card">

      <div class="top">
        <div>
          <div class="title">My Documents</div>
          <div class="small">Chỉ hiển thị tài liệu của bạn</div>
        </div>

        <div class="row">
          <a class="btn" th:href="@{/dashboard/employee}">← Back to Home</a>
        </div>
      </div>

      <div class="msg" th:if="${msg != null and msg != ''}" th:text="${msg}"></div>
      <div class="msg msg-err" th:if="${err != null and err != ''}" th:text="${err}"></div>

      <!-- ✅ 2 khu vực: LEFT FILTER | RIGHT UPLOAD -->
      <div class="panel-grid">

        <!-- LEFT: FILTER -->
        <div class="panel">
          <h3>Filter / Search</h3>

          <form method="get" th:action="@{/employee/documents}" class="row">
            <input type="text" name="q" placeholder="Search title/file..." th:value="${q}">

            <select name="docType">
              <option value="" th:selected="${docType == null or docType == ''}">All type</option>
              <option value="CONTRACT" th:selected="${docType == 'CONTRACT'}">CONTRACT</option>
              <option value="DOCUMENT" th:selected="${docType == 'DOCUMENT'}">DOCUMENT</option>
            </select>

            <select name="status">
              <option value="" th:selected="${status == null or status == ''}">All status</option>
              <option value="DRAFT" th:selected="${status == 'DRAFT'}">DRAFT</option>
              <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">ACTIVE</option>
              <option value="EXPIRED" th:selected="${status == 'EXPIRED'}">EXPIRED</option>
              <option value="ARCHIVED" th:selected="${status == 'ARCHIVED'}">ARCHIVED</option>
            </select>

            <button class="btn" type="submit">Filter</button>
          </form>

          <div class="small" style="margin-top:8px">
            EmpID: <b th:text="${employeeId}">-</b>
          </div>
        </div>

        <!-- RIGHT: UPLOAD -->
        <div class="panel">
          <h3>Upload Document</h3>

          <form method="post" th:action="@{/employee/documents/upload}" enctype="multipart/form-data" class="row">
            <input type="hidden" name="employeeId" th:value="${employeeId}">

            <input type="text" name="title" placeholder="Title (optional)" style="min-width:240px">

            <select name="docType">
              <option value="DOCUMENT" selected>DOCUMENT</option>
              <option value="CONTRACT">CONTRACT</option>
            </select>

            <select name="status">
              <option value="DRAFT" selected>DRAFT</option>
              <option value="ACTIVE">ACTIVE</option>
              <option value="ARCHIVED">ARCHIVED</option>
            </select>

            <input type="file" name="file" required placeholder="Choose file"
                   style="height:38px;padding:6px;border-radius:10px;border:1px solid #e5e7eb;background:#fff;">

            <button class="btn btn-primary" type="submit">Upload</button>
          </form>

          <div class="small" style="margin-top:8px">
            Tip: HR sẽ nhìn thấy tất cả tài liệu của bạn trong trang HR Documents.
          </div>
        </div>

      </div>

      <hr style="border:none;border-top:1px solid #eee;margin:18px 0">

      <!-- LIST -->
      <table class="table">
        <thead>
        <tr>
          <th>Doc ID</th>
          <th>Title</th>
          <th>Type</th>
          <th>Status</th>
          <th>File</th>
          <th>Uploaded</th>
          <th style="width:200px">Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${#lists.isEmpty(docs)}">
          <td colspan="7" style="color:#6b7280;padding:14px;">No documents found.</td>
        </tr>

        <tr th:each="d : ${docs}">
          <td th:text="${d.id}"></td>
          <td th:text="${d.title}"></td>
          <td><span class="badge" th:text="${d.docType}"></span></td>
          <td><span class="badge" th:text="${d.status}"></span></td>

          <td>
            <div th:text="${d.fileName}"></div>
            <div class="small" th:text="${d.contentType}"></div>
            <div class="small">v<span th:text="${d.version}"></span></div>
          </td>

          <td class="small" th:text="${d.uploadedAt}"></td>

          <td>
            <a class="btn" th:href="@{'/employee/documents/' + ${d.id} + '/download'}">Download</a>

            <form method="post" th:action="@{'/employee/documents/' + ${d.id} + '/delete'}" style="display:inline">
              <button class="btn" type="submit" onclick="return confirm('Delete this document?')">Delete</button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>

    </div>
  </div>

</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="content">

    <div class="d-flex justify-content-center align-items-center py-4">
        <div class="card border-0 shadow-sm rounded-4 w-100" style="max-width: 850px; overflow: hidden;">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-2 px-4 d-flex justify-content-between align-items-center">
                <h4 class="fw-bold mb-0 text-dark">Leave Request</h4>
            </div>

            <div class="card-body p-4 pt-2">



                <form th:action="@{/employee/requests/create}"
                      th:object="${request}"
                      method="post"
                      enctype="multipart/form-data">
                    
                    <div class="row g-4">
                        <!-- Left Column (Form Inputs) -->
                        <div class="col-md-7 pe-md-4">
                            
                            <!-- Leave Type -->
                            <div class="mb-3">
                                <label class="form-label fw-bold small text-dark mb-1">Leave Type <span class="text-danger">*</span></label>
                                <select class="form-select fs-6 p-2 rounded-3 border-secondary-subtle" th:field="*{requestType}" id="requestType" required>
                                    <option value="">-- Select Type --</option>
                                    <option value="LEAVE">Annual Leave</option>
                                    <option value="OVERTIME">Overtime</option>
                                    <option value="OTHER">Other Request</option>
                                </select>
                            </div>

                            <!-- Target Date -->
                            <div class="mb-3">
                                <label class="form-label fw-bold small text-dark mb-1" id="dateLabel">Date <span class="text-danger">*</span></label>
                                
                                <div class="d-flex align-items-center gap-3 mb-2" id="leaveToggles" style="display: none !important;">
                                    <div class="form-check form-switch mb-0">
                                        <input class="form-check-input mt-1" type="checkbox" role="switch" id="multiDayToggle" style="cursor: pointer;">
                                        <label class="form-check-label small fw-medium text-secondary" for="multiDayToggle" style="cursor: pointer;">Multi-day Leave</label>
                                    </div>
                                    <div class="form-check form-switch mb-0">
                                        <input class="form-check-input mt-1" type="checkbox" role="switch" id="specificTimeToggle" style="cursor: pointer;">
                                        <label class="form-check-label small fw-medium text-secondary" for="specificTimeToggle" style="cursor: pointer;">Specific Hours</label>
                                    </div>
                                </div>

                                <div class="row g-2 align-items-center">
                                    <div class="col" id="fromDateCol">
                                        <input type="date" class="form-control fs-6 p-2 rounded-3 border-secondary-subtle" th:field="*{targetWorkDate}" id="targetDate" required onclick="this.showPicker()">
                                    </div>
                                    <div class="col-auto text-muted fw-bold" id="dashSeparator" style="display: none;">-</div>
                                    <div class="col" id="toDateCol" style="display: none;">
                                        <input type="date" class="form-control fs-6 p-2 rounded-3 border-secondary-subtle" id="toDateUi" onclick="this.showPicker()">
                                    </div>
                                </div>
                            </div>

                            <!-- Hidden backing fields for Spring form binding -->
                            <input type="datetime-local" class="d-none" th:field="*{startTime}" id="startTime">
                            <input type="datetime-local" class="d-none" th:field="*{endTime}" id="endTime">

                            <!-- Specific Times (Overrides full day) -->
                            <div class="row g-3 mb-3" id="timeFields" style="display: none;">
                                <div class="col-6">
                                    <label class="form-label fw-bold small text-dark mb-1">Start Time</label>
                                    <input type="time" class="form-control fs-6 p-2 rounded-3 border-secondary-subtle" id="startTimeUi" value="08:00" onclick="this.showPicker()">
                                </div>
                                <div class="col-6">
                                    <label class="form-label fw-bold small text-dark mb-1">End Time</label>
                                    <input type="time" class="form-control fs-6 p-2 rounded-3 border-secondary-subtle" id="endTimeUi" value="17:30" onclick="this.showPicker()">
                                </div>
                            </div>

                            <!-- Reason -->
                            <div class="mb-3">
                                <label class="form-label fw-bold small text-dark mb-1">About</label>
                                <textarea class="form-control fs-6 p-3 rounded-3 border-secondary-subtle bg-light" 
                                          th:field="*{reason}" 
                                          rows="3" 
                                          placeholder="Include comments for your approver"
                                          style="resize: none;"></textarea>
                            </div>

                            <!-- Attachment Drag & Drop -->
                            <div class="mb-2">
                                <label class="form-label fw-bold small text-dark mb-1">Attachments</label>
                                <div class="file-drop-area rounded-4 p-4 text-center position-relative transition-all" 
                                     id="dropArea" 
                                     style="border: 2px dashed #cbd5e1; background-color: #f8fafc;">
                                    <input type="file" 
                                           name="attachment" 
                                           id="attachment" 
                                           class="position-absolute w-100 h-100 opacity-0" 
                                           style="top:0; left:0; z-index: 2; cursor: pointer;" 
                                           accept=".pdf,.jpg,.png,.doc,.docx,.gif">
                                    <div class="file-msg position-relative z-index-1">
                                        <div class="icon-circle bg-white shadow-sm d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 48px; height: 48px;">
                                            <i class="fas fa-image fs-5" style="color: #3b82f6;"></i>
                                        </div>
                                        <div class="mb-1">
                                            <span class="fw-bold" style="color: #3b82f6;">Upload a file</span> 
                                            <span class="text-secondary">or drag and drop</span>
                                        </div>
                                        <div class="small fw-medium" style="color: #94a3b8;">PNG, JPG, GIF up to 10MB</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Right Column (Summary Box) -->
                        <div class="col-md-5">
                            <div class="rounded-4 p-4 h-100 d-flex flex-column border" style="background-color: #f8faff; border-color: #e2e8f0 !important;">
                                <h6 class="fw-bold mb-3 text-dark fs-6">Your Request Includes</h6>
                                
                                <div id="summaryItems" class="flex-grow-1">
                                    <div class="d-flex justify-content-between align-items-center mb-2 pb-3 border-bottom border-light-subtle" id="summaryDateRow" style="display:none !important;">
                                        <span id="summaryDateText" class="text-secondary fw-medium">Select date</span>
                                        <span class="text-primary fw-bold bg-white px-2 py-1 rounded shadow-sm small" id="summaryDurationText">All Day</span>
                                    </div>
                                    <div class="text-center text-muted small mt-5" id="emptySummaryMsg">
                                        <i class="far fa-calendar-alt fs-2 text-light mb-2"></i><br>
                                        Please select dates<br>to see your breakdown.
                                    </div>
                                </div>

                                <div class="mt-auto pt-4 border-top border-light-subtle">
                                    <div class="fw-bold text-dark fs-6" id="totalDaysText">0 days of Leave</div>
                                    <div class="small fw-medium mt-1" style="color: #64748b;" id="remainingDaysText">Calculated based on times</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Footer Buttons -->
                    <div class="d-flex justify-content-end mt-4 pt-4 border-top border-secondary-subtle">
                        <button type="submit" class="btn btn-primary fw-bold px-5 py-2 shadow-sm rounded-3" style="background-color: #3b82f6; border-color: #3b82f6;">Request Now</button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <!-- Additional Custom CSS for Drag and Drop -->
    <style>
        .file-drop-area:hover {
            background-color: #f1f5f9 !important;
            border-color: #94a3b8 !important;
        }
        .file-drop-area.dragover {
            background-color: #e0f2fe !important;
            border-color: #3b82f6 !important;
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Field elements
            const requestType = document.getElementById("requestType");
            const timeFields = document.getElementById("timeFields");
            
            const targetDateInput = document.getElementById('targetDate');
            const toDateUi = document.getElementById('toDateUi');
            const toDateCol = document.getElementById('toDateCol');
            const dashSeparator = document.getElementById('dashSeparator');
            
            const leaveToggles = document.getElementById('leaveToggles');
            const multiDayToggle = document.getElementById('multiDayToggle');
            const specificTimeToggle = document.getElementById('specificTimeToggle');
            const dateLabel = document.getElementById('dateLabel');

            const startTimeUi = document.getElementById('startTimeUi');
            const endTimeUi = document.getElementById('endTimeUi');
            const startTimeHidden = document.getElementById('startTime');
            const endTimeHidden = document.getElementById('endTime');

            // Summary elements
            const summaryDateRow = document.getElementById('summaryDateRow');
            const summaryDateText = document.getElementById('summaryDateText');
            const summaryDurationText = document.getElementById('summaryDurationText');
            const emptySummaryMsg = document.getElementById('emptySummaryMsg');
            const totalDaysText = document.getElementById('totalDaysText');

            function updateVisibility() {
                const type = requestType.value;
                if (type === "LEAVE") {
                    leaveToggles.style.setProperty('display', 'flex', 'important');
                    if (multiDayToggle.checked) {
                        toDateCol.style.display = 'block';
                        dashSeparator.style.display = 'block';
                        specificTimeToggle.checked = false; 
                        specificTimeToggle.disabled = true;
                        timeFields.style.display = "none";
                        dateLabel.innerHTML = 'Dates <span class="text-danger">*</span>';
                    } else {
                        toDateCol.style.display = 'none';
                        dashSeparator.style.display = 'none';
                        specificTimeToggle.disabled = false;
                        if (specificTimeToggle.checked) {
                            timeFields.style.display = "flex";
                        } else {
                            timeFields.style.display = "none";
                        }
                        dateLabel.innerHTML = 'Date <span class="text-danger">*</span>';
                    }
                } else if (type === "OVERTIME") {
                    leaveToggles.style.setProperty('display', 'none', 'important');
                    toDateCol.style.display = 'none';
                    dashSeparator.style.display = 'none';
                    timeFields.style.display = "flex";
                    dateLabel.innerHTML = 'Date <span class="text-danger">*</span>';
                } else {
                    leaveToggles.style.setProperty('display', 'none', 'important');
                    toDateCol.style.display = 'none';
                    dashSeparator.style.display = 'none';
                    timeFields.style.display = "none";
                    dateLabel.innerHTML = 'Date <span class="text-danger">*</span>';
                }
                syncValues();
                calculateDuration();
            }

            function syncValues() {
                const type = requestType.value;
                if (!targetDateInput.value) return;

                let sDate = targetDateInput.value;
                let eDate = targetDateInput.value;

                if (type === "LEAVE" && multiDayToggle.checked && toDateUi.value) {
                    eDate = toDateUi.value;
                }

                let sTimeStr = "08:00";
                let eTimeStr = "17:30";

                if (type === "OVERTIME" || (type === "LEAVE" && !multiDayToggle.checked && specificTimeToggle.checked)) {
                    sTimeStr = startTimeUi.value || "08:00";
                    eTimeStr = endTimeUi.value || "17:30";
                }

                startTimeHidden.value = sDate + "T" + sTimeStr;
                endTimeHidden.value = eDate + "T" + eTimeStr;
            }

            function calculateDuration() {
                const dVal = targetDateInput.value;
                if (!dVal || (requestType.value === "LEAVE" && multiDayToggle.checked && !toDateUi.value)) {
                    summaryDateRow.style.setProperty('display', 'none', 'important');
                    emptySummaryMsg.style.display = 'block';
                    totalDaysText.textContent = '0 days of Request';
                    return;
                }
                
                emptySummaryMsg.style.display = 'none';
                summaryDateRow.style.setProperty('display', 'flex', 'important');
                
                let durationLabel = 'All Day';
                let totalText = '1 day';
                const sDateObj = new Date(dVal);

                if (requestType.value === "LEAVE" && multiDayToggle.checked) {
                    const options = { month: 'short', day: '2-digit' };
                    let s = sDateObj.toLocaleDateString('en-US', options);
                    let e = new Date(toDateUi.value).toLocaleDateString('en-US', options);
                    summaryDateText.textContent = s + ' - ' + e;

                    const diffMs = new Date(toDateUi.value) - sDateObj;
                    const diffDays = Math.max(1, Math.floor(diffMs / (1000 * 60 * 60 * 24)) + 1);
                    durationLabel = diffDays + ' Days';
                    totalText = diffDays + ' days';
                } else {
                    const options = { month: 'short', day: '2-digit' };
                    summaryDateText.textContent = sDateObj.toLocaleDateString('en-US', options);
                    
                    if (requestType.value === "OVERTIME" || (requestType.value === "LEAVE" && specificTimeToggle.checked)) {
                         if (startTimeUi.value && endTimeUi.value) {
                             const sTime = new Date(dVal + "T" + startTimeUi.value);
                             const eTime = new Date(dVal + "T" + endTimeUi.value);
                             if (eTime > sTime) {
                                 const diffHrs = ((eTime - sTime) / (1000 * 60 * 60)).toFixed(1);
                                 durationLabel = diffHrs + ' hrs';
                                 totalText = diffHrs + ' hours';
                             } else {
                                 durationLabel = '0 hrs';
                                 totalText = '0 hours';
                             }
                         }
                    }
                }
                
                const typeLabel = requestType.options[requestType.selectedIndex].text || 'Request';
                summaryDurationText.textContent = durationLabel;
                totalDaysText.textContent = totalText + ' of ' + typeLabel.replace(/--|Select Type/g, 'Request').trim();
            }

            const inputsToListen = [requestType, targetDateInput, toDateUi, multiDayToggle, specificTimeToggle, startTimeUi, endTimeUi];
            inputsToListen.forEach(inp => {
                if (inp) {
                    inp.addEventListener('change', function() {
                        if (this === multiDayToggle && this.checked && !toDateUi.value) {
                            toDateUi.value = targetDateInput.value;
                        }
                        updateVisibility();
                    });
                }
            });

            // 3. Drag and Drop File Input Logic
            const fileInput = document.getElementById('attachment');
            const dropArea = document.getElementById('dropArea');
            const fileMsg = dropArea.querySelector('.file-msg');
            const originalMsgHTML = fileMsg.innerHTML;

            fileInput.addEventListener('change', function() {
                if(this.files && this.files.length > 0) {
                    fileMsg.innerHTML = `
                        <div class="icon-circle bg-success shadow-sm d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 48px; height: 48px;">
                            <i class="fas fa-check text-white fs-5"></i>
                        </div>
                        <div class="mb-1">
                            <span class="fw-bold text-success text-truncate d-inline-block" style="max-width: 200px;">${this.files[0].name}</span>
                        </div>
                        <div class="small fw-medium text-success">Ready to upload</div>
                    `;
                    dropArea.style.borderColor = '#10b981';
                    dropArea.style.backgroundColor = '#ecfdf5';
                } else {
                    fileMsg.innerHTML = originalMsgHTML;
                    dropArea.style.borderColor = '#cbd5e1';
                    dropArea.style.backgroundColor = '#f8fafc';
                }
            });

            fileInput.addEventListener('dragenter', function() {
                dropArea.classList.add('dragover');
            });
            fileInput.addEventListener('dragleave', function() {
                dropArea.classList.remove('dragover');
            });
            fileInput.addEventListener('drop', function() {
                dropArea.classList.remove('dragover');
            });

            function handleOvertimeConstraints() {
                const type = requestType.value;
                const todayStr = new Date().toLocaleDateString('en-CA'); 
                
                if (type === "OVERTIME") {
                    targetDateInput.setAttribute('min', todayStr);
                    targetDateInput.removeAttribute('max');
                    
                    if (targetDateInput.value && targetDateInput.value < todayStr) {
                         targetDateInput.value = todayStr;
                         updateVisibility();
                    }
                } else {
                    targetDateInput.removeAttribute('min');
                    targetDateInput.removeAttribute('max');
                }
            }
            requestType.addEventListener("change", handleOvertimeConstraints);

            // Fail-safe Form Submit sync
            const requestForm = document.querySelector('form');
            if(requestForm) {
                requestForm.addEventListener('submit', function(e) {
                    syncValues();
                    if (!startTimeHidden.value || !endTimeHidden.value) {
                        e.preventDefault();
                        alert("Please select a valid date range.");
                        return false;
                    }
                });
            }

            // Init
            updateVisibility();
            requestType.dispatchEvent(new Event('change'));
        });
    </script>
</div>

</html>

<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="content">

    <div class="card">
        <div class="card-header">
            <h5>Create Leave / Overtime Request</h5>
        </div>

        <div class="card-body">

            <!-- Thông báo thành công -->
            <div th:if="${param.success}"
                 class="alert alert-success">
                Request submitted successfully!
            </div>

            <form th:action="@{/employee/requests/create}"
                  th:object="${request}"
                  method="post"
                  enctype="multipart/form-data">

                <!-- Request Type -->
                <div class="mb-3">
                    <label class="form-label">Request Type</label>
                    <select class="form-select"
                            th:field="*{requestType}" required>
                        <option value="">-- Select Type --</option>
                        <option value="LEAVE">Leave</option>
                        <option value="OVERTIME">Overtime</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>

                <!-- Start Time -->
                <div class="mb-3">
                    <label class="form-label">Start Time</label>
                    <input type="datetime-local"
                           class="form-control"
                           th:field="*{startTime}"
                           required>
                </div>

                <!-- End Time -->
                <div class="mb-3">
                    <label class="form-label">End Time</label>
                    <input type="datetime-local"
                           class="form-control"
                           th:field="*{endTime}"
                           required>
                </div>
                <!-- LEAVE OPTIONS -->
                <div id="leaveFields" style="display:none;">

                    <div class="mb-3">
                        <label class="form-label">Leave Type</label>
                        <select class="form-select" name="leaveType">
                            <option value="">-- Select Leave Type --</option>
                            <option value="SICK">Sick Leave</option>
                            <option value="ANNUAL">Annual Leave</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Upload Medical / Leave Document</label>
                        <input type="file"
                               class="form-control"
                               name="leaveFile"
                               accept=".pdf,.jpg,.png,.doc,.docx"
                               placeholder="Choose file">
                    </div>

                </div>


                <!-- OVERTIME OPTIONS -->
                <div id="overtimeFields" style="display:none;">

                    <div class="mb-3">
                        <label class="form-label">Overtime Hours</label>
                        <input type="number"
                               class="form-control"
                               name="overtimeHours"
                               min="1"
                               placeholder="Enter overtime hours">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Project / Task</label>
                        <input type="text"
                               class="form-control"
                               name="projectTask"
                               placeholder="Enter project or task name">
                    </div>

                </div>
                <div class="mb-3">
                    <label class="form-label">Reason</label>
                    <textarea class="form-control"
                              th:field="*{reason}"
                              rows="3"
                              placeholder="Enter reason"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">
                    Submit Request
                </button>

                <a th:href="@{/employee/dashboard}"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>
    </div>
    <script>

        document.addEventListener("DOMContentLoaded", function () {

            const requestType = document.getElementById("requestType");
            const leaveFields = document.getElementById("leaveFields");
            const overtimeFields = document.getElementById("overtimeFields");

            function updateForm() {

                let type = requestType.value;

                // reset
                leaveFields.style.display = "none";
                overtimeFields.style.display = "none";

                if (type === "LEAVE") {
                    leaveFields.style.display = "block";
                }

                if (type === "OVERTIME") {
                    overtimeFields.style.display = "block";
                }
            }

            requestType.addEventListener("change", updateForm);

            updateForm();
        });

    </script>
</div>

</html>

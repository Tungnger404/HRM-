<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="content">

    <div class="card">
        <div class="card-header">
            <h5>Create Attendance Request</h5>
        </div>

        <div class="card-body">

            <div th:if="${param.success}" class="alert alert-success">
                Request submitted successfully!
            </div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/employee/requests/create}"
                  th:object="${request}"
                  method="post"
                  enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label">Request Type</label>
                    <select class="form-select" th:field="*{requestType}" id="requestType" required>
                        <option value="">-- Select Type --</option>
                        <option value="LEAVE">Leave</option>
                        <option value="OVERTIME">Overtime</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Target Work Date</label>
                    <input type="date" class="form-control" th:field="*{targetWorkDate}" required>
                </div>

                <div id="leaveFields">
                    <div class="mb-3">
                        <label class="form-label">Start Time (for Leave/Overtime)</label>
                        <input type="datetime-local" class="form-control" th:field="*{startTime}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">End Time (for Leave/Overtime)</label>
                        <input type="datetime-local" class="form-control" th:field="*{endTime}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Upload Attachment (optional)</label>
                        <input type="file"
                               class="form-control"
                               name="attachment"
                               accept=".pdf,.jpg,.png,.doc,.docx">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Reason</label>
                    <textarea class="form-control"
                              th:field="*{reason}"
                              rows="3"
                              placeholder="Enter reason"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">
                    Submit Request
                </button>
            </form>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const requestType = document.getElementById("requestType");
            const leaveFields = document.getElementById("leaveFields");

            function updateForm() {
                const type = requestType.value;
                leaveFields.style.display = (type === "LEAVE" || type === "OVERTIME") ? "block" : "none";
            }

            requestType.addEventListener("change", updateForm);
            updateForm();
        });
    </script>
</div>

</html>

<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>My Payslips</title>
</head>

<body>
<div layout:fragment="content">

    <div class="d-flex flex-wrap align-items-center justify-content-between mb-3">
        <div>
            <h2 class="mb-1">My Payslips</h2>

            <div class="text-body-secondary small"
                 th:if="${payslips != null and !#lists.isEmpty(payslips)}">
                Employee:
                <b th:text="${payslips[0].employeeName}"></b>
                <span class="ms-2">| Code:</span>
                <b th:text="${'NV' + payslips[0].empId}"></b>
            </div>

            <div class="text-body-secondary small"
                 th:if="${payslips == null or #lists.isEmpty(payslips)}">
                No payslips available
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body table-responsive">

            <table class="table table-hover table-bordered align-middle mb-0">
                <thead>
                <tr>
                    <th>Period</th>
                    <th class="text-end" style="width:160px;">Gross</th>
                    <th class="text-end" style="width:160px;">Deduction</th>
                    <th class="text-end" style="width:160px;">Net</th>
                    <th style="width:150px;">Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="p : ${payslips}"
                    th:classappend="${(p.totalIncome == null or p.totalIncome == 0) and (p.netSalary == null or p.netSalary == 0)} ? 'text-muted' : ''">

                    <td th:text="${p.period}"></td>

                    <td class="text-end"
                        th:text="${p.totalIncome == null ? '0' : #numbers.formatDecimal(p.totalIncome, 1, 'COMMA', 0, 'POINT')}"></td>

                    <td class="text-end"
                        th:text="${p.totalDeduction == null ? '0' : #numbers.formatDecimal(p.totalDeduction, 1, 'COMMA', 0, 'POINT')}"></td>

                    <td class="text-end fw-semibold"
                        th:text="${p.netSalary == null ? '0' : #numbers.formatDecimal(p.netSalary, 1, 'COMMA', 0, 'POINT')}"></td>

                    <td class="d-flex gap-2">
                        <a class="btn btn-sm btn-outline-primary d-inline-flex align-items-center justify-content-center"
                           th:href="@{/employee/payslips/{id}(id=${p.payslipId})}"
                           title="View">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                 viewBox="0 0 16 16">
                                <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.12 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                                <path d="M8 5.5A2.5 2.5 0 1 0 8 10.5A2.5 2.5 0 0 0 8 5.5zm0 1A1.5 1.5 0 1 1 8 9.5A1.5 1.5 0 0 1 8 6.5z"/>
                            </svg>
                        </a>

                        <a class="btn btn-sm btn-primary"
                           th:href="@{/employee/payslips/{id}/download(id=${p.payslipId})}">
                            PDF
                        </a>
                    </td>
                </tr>

                <tr th:if="${payslips == null || #lists.isEmpty(payslips)}">
                    <td colspan="5" class="text-center text-body-secondary">No data</td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>
</body>
</html>

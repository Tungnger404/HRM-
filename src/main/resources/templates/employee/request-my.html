<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<div layout:fragment="content">
    <div class="card">
        <div class="card-header">
            <h5>My Attendance Requests</h5>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Type</th>
                        <th>Target Date</th>
                        <th>Reason</th>
                        <th>Status</th>
                        <th>Manager Note</th>
                        <th>Manager Decided</th>
                        <th>HR Processed At</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="r : ${requests}">
                        <td th:text="${r.requestId}"></td>
                        <td th:text="${r.requestType}"></td>
                        <td th:text="${r.targetWorkDate != null ? #temporals.format(r.targetWorkDate, 'dd/MM/yyyy') : '-'}"></td>
                        <td th:text="${r.reason}"></td>
                        <td th:text="${r.status}"></td>
                        <td th:text="${r.approverNote != null ? r.approverNote : '-'}"></td>
                        <td th:text="${r.managerDecidedAt != null ? #temporals.format(r.managerDecidedAt, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                        <td th:text="${r.processedAt != null ? #temporals.format(r.processedAt, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(requests)}">
                        <td colspan="8" class="text-center text-muted">No requests found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</html>

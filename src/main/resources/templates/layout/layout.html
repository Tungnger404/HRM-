<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <title>HRM System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/vendors/simplebar/css/simplebar.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/examples.css}" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script th:src="@{/js/config.js}"></script>

    <style>
        :root {
            --bg-body: #f4f6fb;
            --bg-surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --cui-sidebar-width: 260px;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            margin: 0;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .sidebar {
            width: var(--cui-sidebar-width);
            background: linear-gradient(180deg, #0f2a5a, #123c85);
            flex-shrink: 0;
            box-shadow: 4px 0 20px rgba(0,0,0,0.2);
            transition: left 0.3s ease;
            border-right: none !important;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Custom scrollbar for sidebar - subtle and elegant */
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            transition: background 0.3s ease;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        /* For Firefox */
        .sidebar {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) rgba(255, 255, 255, 0.05);
        }

        .sidebar-brand {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-logo {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar .nav-title {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            letter-spacing: 1px;
            margin-top: 25px;
        }

        .sidebar .nav-link {
            color: #e6edf7 !important;
            font-weight: 500;
            border-radius: 8px;
            margin: 6px 12px;
            padding: 10px 14px;
            transition: all 0.2s ease;
        }

        .sidebar .nav-link:hover {
            background: rgba(255,255,255,0.08);
            transform: translateX(3px);
        }

        .sidebar .nav-link.active {
            background: rgba(255,255,255,0.12) !important;
            border-left: 4px solid #4facfe;
            color: #ffffff !important;
            font-weight: 600;
        }

        .sidebar svg,
        .sidebar .nav-icon {
            color: rgba(255,255,255,0.85);
            fill: rgba(255,255,255,0.85);
        }

        .sidebar .nav-group-toggle {
            pointer-events: auto !important;
        }

        @media (min-width: 992px) {
            .sidebar {
                display: block !important;
            }
        }

        .body {
            background-color: var(--bg-body);
            padding: 30px;
        }

        .card {
            background-color: var(--bg-surface);
            border-radius: 14px;
            border: none;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
        }

        .header {
            height: 72px;
            background: linear-gradient(90deg, #0f2a5a, #123c85);
            display: flex;
            align-items: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            position: relative;
            z-index: 1100;
        }

        .header::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.1);
        }

        .header .nav-link,
        .header svg {
            color: #ffffff !important;
            fill: #ffffff !important;
        }

        .header .nav-link:hover {
            opacity: 0.85;
            transform: translateY(-1px);
            transition: 0.2s ease;
        }

        .footer {
            padding: 15px 30px;
            color: var(--text-secondary);
        }

        .dropdown-menu {
            z-index: 2000 !important;
        }

        .sidebar {
            width: var(--cui-sidebar-width) !important;
        }

        .sidebar.sidebar-narrow,
        .sidebar.sidebar-minimize {
            width: var(--cui-sidebar-width) !important;
        }

        /* ===== USER HEADER ===== */
        .header-user-trigger {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 10px;
            border-radius: 999px;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .header-user-trigger:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .header-user-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            line-height: 1.1;
        }

        .header-user-name {
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-user-role {
            color: rgba(255,255,255,0.75);
            font-size: 12px;
            font-weight: 500;
        }

        .header-avatar-wrap {
            width: 46px;
            height: 46px;
            min-width: 46px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.35);
            box-shadow: 0 6px 14px rgba(0,0,0,0.18);
            background: rgba(255,255,255,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .header-avatar-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 800;
            color: #ffffff;
            background: linear-gradient(135deg, #60a5fa, #2563eb);
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .header-user-info {
                display: none;
            }

            .header-user-trigger {
                padding: 4px;
            }

            .header-avatar-wrap {
                width: 42px;
                height: 42px;
                min-width: 42px;
            }
        }
    </style>
</head>
<body>

<div class="sidebar sidebar-fixed sidebar-lg border-end" id="sidebar" data-coreui-narrow="false">
    <div class="sidebar-brand d-flex align-items-center gap-3 px-4 py-4">
        <div class="sidebar-logo">
            <svg class="icon icon-lg text-white">
                <use xlink:href="/vendors/@coreui/icons/svg/free.svg#cil-building"></use>
            </svg>
        </div>
        <div class="sidebar-title text-white fw-semibold">
            Software House <br>
            <span style="font-size:13px; opacity:0.7;">HRM System</span>
        </div>
    </div>

    <div th:replace="~{layout/sidebar/__${sidebar != null ? sidebar : 'sidebar-default'}__ :: sidebar}">
    </div>
</div>

<div class="wrapper d-flex flex-column min-vh-100">

    <header class="header header-sticky p-0">
        <div class="container-fluid px-4 d-flex align-items-center justify-content-between">

            <div class="d-flex align-items-center gap-4">
                <button class="header-toggler text-white" type="button"
                        onclick="coreui.Sidebar.getInstance(document.querySelector('#sidebar')).toggle()">
                    <svg class="icon icon-lg">
                        <use xlink:href="/vendors/@coreui/icons/svg/free.svg#cil-menu"></use>
                    </svg>
                </button>
            </div>

            <ul class="header-nav ms-auto align-items-center">

                <li class="nav-item dropdown me-4">
                    <a class="nav-link position-relative py-0" id="notificationBell" data-coreui-toggle="dropdown">
                        <svg class="icon icon-lg">
                            <use xlink:href="/vendors/@coreui/icons/svg/free.svg#cil-bell"></use>
                        </svg>
                        <span class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle"
                              id="notificationCount" style="display: none;">0</span>
                    </a>

                    <div class="dropdown-menu dropdown-menu-end pt-0"
                         style="width: 350px; max-height: 400px; overflow-y: auto;">
                        <div class="dropdown-header bg-body-tertiary fw-semibold d-flex justify-content-between">
                            <span>Notifications</span>
                            <span class="badge bg-secondary" id="totalNotifications">0</span>
                        </div>
                        <div id="notificationList">
                            <div class="dropdown-item text-center text-muted py-3">
                                No new notifications
                            </div>
                        </div>
                    </div>
                </li>

                <!-- USER AVATAR + NAME -->
                <li class="nav-item dropdown">
                    <a class="nav-link py-0 pe-0 header-user-trigger" data-coreui-toggle="dropdown" href="javascript:void(0)">
                        <div class="header-user-info">
                            <div class="header-user-name"
                                 th:text="${currentDisplayName != null and !#strings.isEmpty(currentDisplayName) ? currentDisplayName : 'User'}">
                                User
                            </div>
                            <div class="header-user-role"
                                 th:text="${currentRoleName != null and !#strings.isEmpty(currentRoleName) ? currentRoleName : 'Account'}">
                                Account
                            </div>
                        </div>

                        <div class="header-avatar-wrap">
                            <img th:if="${currentAvatarPath != null and !#strings.isEmpty(currentAvatarPath)}"
                                 th:src="@{${currentAvatarPath}}"
                                 alt="avatar"
                                 class="header-avatar-img">

                            <div th:if="${currentAvatarPath == null or #strings.isEmpty(currentAvatarPath)}"
                                 class="header-avatar-fallback"
                                 th:text="${currentAvatarInitial != null and !#strings.isEmpty(currentAvatarInitial) ? currentAvatarInitial : 'U'}">
                                U
                            </div>
                        </div>
                    </a>

                    <div class="dropdown-menu dropdown-menu-end pt-0">
                        <div class="dropdown-header bg-body-tertiary fw-semibold"
                             th:text="${currentRoleName != null and !#strings.isEmpty(currentRoleName) ? currentRoleName : 'Account'}">
                            Account
                        </div>
                        <a class="dropdown-item" th:href="@{/profile}">
                            <svg class="icon me-2">
                                <use xlink:href="/vendors/@coreui/icons/svg/free.svg#cil-user"></use>
                            </svg>
                            Profile
                        </a>

                        <a class="dropdown-item" th:href="@{/logout}">
                            <svg class="icon me-2">
                                <use xlink:href="/vendors/@coreui/icons/svg/free.svg#cil-account-logout"></use>
                            </svg>
                            Logout
                        </a>
                    </div>
                </li>

            </ul>
        </div>
    </header>

    <div class="body flex-grow-1 px-4 py-3">
        <div layout:fragment="content"></div>
    </div>

    <footer class="footer px-4">
        <div>HRM System © 2025</div>
    </footer>
</div>

<script th:src="@{/vendors/@coreui/coreui/js/coreui.bundle.min.js}"></script>
<script th:src="@{/vendors/simplebar/js/simplebar.min.js}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const sidebar = document.getElementById('sidebar');
        if (sidebar) {
            sidebar.classList.remove('sidebar-narrow');

            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
                        if (sidebar.classList.contains('sidebar-narrow')) {
                            sidebar.classList.remove('sidebar-narrow');
                        }
                    }
                });
            });

            observer.observe(sidebar, { attributes: true });
        }

        document.querySelectorAll('.nav-group-toggle[href="#"]').forEach(function(el) {
            el.addEventListener('click', function(e) {
                e.preventDefault();
            });
        });

        loadNotifications();
        setInterval(loadNotifications, 30000);
    });

    function loadNotifications() {
        fetch('/api/notifications/unread')
            .then(res => res.json())
            .then(data => {
                const badge = document.getElementById('notificationCount');
                const totalBadge = document.getElementById('totalNotifications');
                const list = document.getElementById('notificationList');

                if (data.length > 0) {
                    badge.textContent = data.length;
                    badge.style.display = 'block';
                    totalBadge.textContent = data.length;

                    list.innerHTML = data.map(n => `
                        <a class="dropdown-item d-flex align-items-start py-2 border-bottom"
                           href="${n.linkUrl}"
                           onclick="markAsRead(${n.notificationId}, event)">
                            <div class="flex-shrink-0 me-2">
                                <span class="badge bg-primary rounded-circle" style="width: 8px; height: 8px;"></span>
                            </div>
                            <div class="flex-grow-1">
                                <div class="fw-semibold small">${n.title}</div>
                                <div class="small text-muted">${n.message || ''}</div>
                                <div class="tiny text-muted">${formatTime(n.createdAt)}</div>
                            </div>
                        </a>
                    `).join('');
                } else {
                    badge.style.display = 'none';
                    totalBadge.textContent = '0';
                    list.innerHTML = '<div class="dropdown-item text-center text-muted py-3">No new notifications</div>';
                }
            })
            .catch(err => console.error('Failed to load notifications:', err));
    }

    function markAsRead(notificationId, event) {
        fetch('/api/notifications/' + notificationId + '/mark-read', { method: 'POST' })
            .then(() => loadNotifications())
            .catch(err => console.error('Failed to mark as read:', err));
    }

    function formatTime(dateStr) {
        const date = new Date(dateStr);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMins / 60);
        const diffDays = Math.floor(diffHours / 24);

        if (diffMins < 1) return 'Just now';
        if (diffMins < 60) return diffMins + ' mins ago';
        if (diffHours < 24) return diffHours + ' hours ago';
        if (diffDays < 7) return diffDays + ' days ago';
        return date.toLocaleDateString('vi-VN');
    }
</script>

<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
    <div id="successToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="successToastMessage"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-coreui-dismiss="toast"></button>
        </div>
    </div>
    <div id="errorToast" class="toast align-items-center text-bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="errorToastMessage"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-coreui-dismiss="toast"></button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function () {
        const successMsg = /*[[${success}]]*/ null;
        const errorMsg = /*[[${err}]]*/ null;

        if (successMsg) {
            document.getElementById("successToastMessage").textContent = successMsg;
            const toast = new coreui.Toast(document.getElementById("successToast"));
            toast.show();
        }

        if (errorMsg) {
            document.getElementById("errorToastMessage").textContent = errorMsg;
            const toast = new coreui.Toast(document.getElementById("errorToast"));
            toast.show();
        }
    });
</script>

</body>
</html>

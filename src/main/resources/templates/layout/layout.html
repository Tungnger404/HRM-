<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <title>HRM System</title>

    <link th:href="@{/vendors/simplebar/css/simplebar.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/examples.css}" rel="stylesheet">
    <link th:href="@{/css/theme-toggle.css}" rel="stylesheet">

    <script th:src="@{/js/config.js}"></script>
    <script th:src="@{/js/color-modes.js}"></script>

    <!-- Theme CSS Variables -->
    <style>
        :root {
            /* Light mode (default) */
            --bg-body: #ffffff;
            --bg-surface: #f8f9fa;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --border-color: #dee2e6;
        }

        [data-theme="dark"] {
            /* Dark mode */
            --bg-body: #1a1d20;
            --bg-surface: #2c3034;
            --text-primary: #e4e6eb;
            --text-secondary: #b0b3b8;
            --border-color: #3e4042;
        }

        body {
            background-color: var(--bg-body) !important;
            color: var(--text-primary) !important;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .body, main.body {
            background-color: var(--bg-body) !important;
            color: var(--text-primary) !important;
        }

        .card {
            background-color: var(--bg-surface) !important;
            color: var(--text-primary) !important;
            border-color: var(--border-color) !important;
        }

        .table {
            color: var(--text-primary) !important;
        }

        .form-control, .form-select {
            background-color: var(--bg-surface) !important;
            color: var(--text-primary) !important;
            border-color: var(--border-color) !important;
        }
    </style>
</head>

<body>

<div class="sidebar sidebar-dark sidebar-fixed border-end" id="sidebar">
    <div th:replace="~{layout/sidebar/__${sidebar != null ? sidebar : 'sidebar-default'}__ :: sidebar}">
    </div>

</div>

<div class="wrapper d-flex flex-column min-vh-100">

    <header class="header header-sticky p-0 mb-4">
        <div class="container-fluid border-bottom px-4">

            <button class="header-toggler" type="button"
                    onclick="coreui.Sidebar.getInstance(document.querySelector('#sidebar')).toggle()">
                <svg class="icon icon-lg">
                    <use xlink:href="/vendors/@coreui/icons/svg/free.svg#cil-menu"></use>
                </svg>
            </button>

            <ul class="header-nav ms-auto">
                <li class="nav-item dropdown me-3">
                    <a class="nav-link position-relative py-0" id="notificationBell" data-coreui-toggle="dropdown" style="cursor: pointer;">
                        <svg class="icon icon-lg">
                            <use xlink:href="/vendors/@coreui/icons/svg/free.svg#cil-bell"></use>
                        </svg>
                        <span class="badge rounded-pill badge-pill bg-danger position-absolute top-0 start-100 translate-middle" 
                              id="notificationCount" style="display: none;">
                            0
                        </span>
                    </a>
                    <div class="dropdown-menu dropdown-menu-end pt-0" style="width: 350px; max-height: 400px; overflow-y: auto;">
                        <div class="dropdown-header bg-body-tertiary fw-semibold d-flex justify-content-between">
                            <span>Notifications</span>
                            <span class="badge bg-secondary" id="totalNotifications">0</span>
                        </div>
                        <div id="notificationList">
                            <div class="dropdown-item text-center text-muted py-3">
                                No new notifications
                            </div>
                        </div>
                    </div>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link py-0 pe-0" data-coreui-toggle="dropdown">
                        <div class="avatar avatar-md">
                            <img class="avatar-img" th:src="@{/assets/img/avatars/8.jpg}" alt="avatar">
                        </div>
                    </a>
                    <div class="dropdown-menu dropdown-menu-end pt-0">
                        <div class="dropdown-header bg-body-tertiary fw-semibold">Account</div>

                        <a class="dropdown-item" th:href="@{/profile}">
                            <svg class="icon me-2"><use xlink:href="/vendors/@coreui/icons/svg/free.svg#cil-user"></use></svg>
                            Profile
                        </a>

                        <!-- Dark Mode Toggle -->
                        <div class="dropdown-item d-flex justify-content-between align-items-center px-3">
                            <span>
                                <svg class="icon me-2"><use xlink:href="/vendors/@coreui/icons/svg/free.svg#cil-moon"></use></svg>
                                Dark Mode
                            </span>
                            <label class="theme-switch mb-0">
                                <input type="checkbox" id="themeToggle">
                                <span class="theme-slider"></span>
                            </label>
                        </div>

                        <a class="dropdown-item" th:href="@{/logout}">
                            <svg class="icon me-2"><use xlink:href="/vendors/@coreui/icons/svg/free.svg#cil-account-logout"></use></svg>
                            Logout
                        </a>
                    </div>
                </li>
            </ul>

        </div>
    </header>

    <main class="body flex-grow-1 px-4 py-3" layout:fragment="content">
    </main>

    <footer class="footer px-4">
        <div>HRM System © 2025</div>
        <div class="ms-auto">Powered by CoreUI</div>
    </footer>

</div>

<script th:src="@{/vendors/@coreui/coreui/js/coreui.bundle.min.js}"></script>
<script th:src="@{/vendors/simplebar/js/simplebar.min.js}"></script>
<script th:src="@{/js/theme-toggle.js}"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    loadNotifications();
    setInterval(loadNotifications, 30000);
});

function loadNotifications() {
    fetch('/api/notifications/unread')
        .then(res => res.json())
        .then(data => {
            const badge = document.getElementById('notificationCount');
            const totalBadge = document.getElementById('totalNotifications');
            const list = document.getElementById('notificationList');
            
            if (data.length > 0) {
                badge.textContent = data.length;
                badge.style.display = 'block';
                totalBadge.textContent = data.length;
                
                list.innerHTML = data.map(n => `
                    <a class="dropdown-item d-flex align-items-start py-2 border-bottom" 
                       href="${n.linkUrl}" 
                       onclick="markAsRead(${n.notificationId}, event)">
                        <div class="flex-shrink-0 me-2">
                            <span class="badge bg-primary rounded-circle" style="width: 8px; height: 8px;"></span>
                        </div>
                        <div class="flex-grow-1">
                            <div class="fw-semibold small">${n.title}</div>
                            <div class="small text-muted">${n.message || ''}</div>
                            <div class="tiny text-muted">${formatTime(n.createdAt)}</div>
                        </div>
                    </a>
                `).join('');
            } else {
                badge.style.display = 'none';
                totalBadge.textContent = '0';
                list.innerHTML = '<div class="dropdown-item text-center text-muted py-3">No new notifications</div>';
            }
        })
        .catch(err => console.error('Failed to load notifications:', err));
}

function markAsRead(notificationId, event) {
    fetch('/api/notifications/' + notificationId + '/mark-read', { method: 'POST' })
        .then(() => loadNotifications())
        .catch(err => console.error('Failed to mark as read:', err));
}

function formatTime(dateStr) {
    const date = new Date(dateStr);
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMins / 60);
    const diffDays = Math.floor(diffHours / 24);
    
    if (diffMins < 1) return 'Just now';
    if (diffMins < 60) return diffMins + ' mins ago';
    if (diffHours < 24) return diffHours + ' hours ago';
    if (diffDays < 7) return diffDays + ' days ago';
    return date.toLocaleDateString('vi-VN');
}
</script>

<!-- Toast Container -->
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
    <div id="successToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="successToastMessage"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-coreui-dismiss="toast"></button>
        </div>
    </div>
    <div id="errorToast" class="toast align-items-center text-bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="errorToastMessage"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-coreui-dismiss="toast"></button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // Show toast notifications from flash attributes
    /*[# th:if="${msg}"]*/
    const successMsg = /*[[${msg}]]*/ '';
    if (successMsg) {
        showToast('success', successMsg);
    }
    /*[/]*/
    
    /*[# th:if="${err}"]*/
    const errorMsg = /*[[${err}]]*/ '';
    if (errorMsg) {
        showToast('error', errorMsg);
    }
    /*[/]*/
    
    function showToast(type, message) {
        const toastEl = document.getElementById(type === 'success' ? 'successToast' : 'errorToast');
        const messageEl = document.getElementById(type === 'success' ? 'successToastMessage' : 'errorToastMessage');
        messageEl.textContent = message;
        const toast = new coreui.Toast(toastEl, { delay: 4000 });
        toast.show();
    }
</script>

</body>
</html>

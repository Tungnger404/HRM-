<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
  <title>Manager - Review Evaluation</title>
</head>
<body>
<div layout:fragment="content">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h3 class="mb-1">Review Employee Evaluation</h3>
    </div>
    <a class="btn btn-outline-secondary" th:href="@{/manager/evaluation/pending}">
      <i class="cil-arrow-left"></i> Back
    </a>
  </div>

  <div class="row">
    <div class="col-lg-8">
      
      <div class="card mb-3">
        <div class="card-header bg-info text-white">
          <strong>HR Comments</strong>
        </div>
        <div class="card-body">
          <div class="mb-2">
            <strong>Template message:</strong>
            <p style="white-space: pre-wrap;" th:text="${assignment.hrComment}"></p>
          </div>
          <div th:if="${assignment.hrVerificationNote}">
            <strong>Verification note:</strong>
            <p style="white-space: pre-wrap;" th:text="${assignment.hrVerificationNote}"></p>
          </div>
        </div>
      </div>

      <!-- NEW: Employee Self-Assessment Section -->
      <div class="card mb-3" th:if="${assignment.selfAssessment != null}">
        <div class="card-header bg-success text-white">
          <strong>Employee Self-Assessment</strong>
        </div>
        <div class="card-body">
          
          <div class="mb-3">
            <label class="fw-bold">Self Score:</label>
            <div>
              <span class="badge bg-primary fs-6" th:text="${assignment.selfScore} + '/100'"></span>
            </div>
          </div>

          <div class="mb-3">
            <label class="fw-bold">Overall Self-Assessment:</label>
            <div class="border p-3 rounded bg-light" style="white-space: pre-wrap;" th:text="${assignment.selfAssessment}"></div>
          </div>

          <div class="mb-3" th:if="${assignment.challenges != null}">
            <label class="fw-bold">Challenges Faced:</label>
            <div class="border p-3 rounded bg-light" style="white-space: pre-wrap;" th:text="${assignment.challenges}"></div>
          </div>

          <div th:if="${assignment.developmentGoals != null}">
            <label class="fw-bold">Development Goals:</label>
            <div class="border p-3 rounded bg-light" style="white-space: pre-wrap;" th:text="${assignment.developmentGoals}"></div>
          </div>

        </div>
      </div>

      <div class="card mb-3">
        <div class="card-header">
          <strong>Files from Employee</strong>
        </div>
        <div class="card-body">
          
          <div class="mb-3">
            <label class="fw-bold">KPI Excel:</label>
            <div>
              <a th:href="@{/hr/kpi/download-employee/{id}(id=${assignment.assignmentId})}" 
                 class="btn btn-sm btn-success">
                <i class="cil-cloud-download"></i> Download KPI Excel
              </a>
            </div>
          </div>

          <div class="mb-3">
            <label class="fw-bold">Evidence Files:</label>
            <div class="list-group">
              <div class="list-group-item" th:each="ev : ${evidences}">
                <div class="d-flex justify-content-between align-items-center">
                  <div>
                    <i class="cil-file"></i>
                    <span th:text="${ev.fileName}"></span>
                    <small class="text-muted">(<span th:text="${#numbers.formatDecimal(ev.fileSize / 1024 / 1024, 1, 1)}"></span> MB)</small>
                  </div>
                  <a th:href="@{/hr/kpi/download-evidence/{id}(id=${ev.evidenceId})}" 
                     class="btn btn-sm btn-outline-primary">
                    Download
                  </a>
                </div>
              </div>
            </div>
          </div>

          <div>
            <label class="fw-bold">Employee Comment:</label>
            <div class="border p-3 rounded bg-light" style="white-space: pre-wrap;" th:text="${assignment.employeeComment}"></div>
          </div>

        </div>
      </div>

    </div>

    <div class="col-lg-4">
      
      <div class="card mb-3">
        <div class="card-header bg-primary text-white">
          <strong>Manager Review</strong>
        </div>
        <div class="card-body">
          
          <form method="post" th:action="@{/manager/evaluation/review/{id}/approve(id=${assignment.assignmentId})}">
            
            <div class="mb-3">
              <label class="form-label fw-bold">
                Manager Score <span class="text-danger">*</span>
              </label>
              <input type="number" name="managerScore" class="form-control" 
                     min="0" max="100" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">
                Classification <span class="text-danger">*</span>
              </label>
              <select name="classification" class="form-select" required>
                <option value="">-- Select Classification --</option>
                <option value="OUTSTANDING">Outstanding</option>
                <option value="EXCELLENT">Excellent</option>
                <option value="GOOD">Good</option>
                <option value="AVERAGE">Average</option>
                <option value="POOR">Poor</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Manager Comment:</label>
              <textarea name="managerComment" class="form-control" rows="4"></textarea>
            </div>

            <div class="mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="recommendPromotion" id="checkPromo">
                <label class="form-check-label" for="checkPromo">
                  Recommend for Promotion
                </label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="recommendTraining" id="checkTraining" 
                       onchange="document.getElementById('trainingField').style.display = this.checked ? 'block' : 'none';">
                <label class="form-check-label" for="checkTraining">
                  Recommend for Training
                </label>
              </div>
            </div>

            <div class="mb-3" id="trainingField" style="display: none;">
              <label class="form-label">Training Program/Course:</label>
              <textarea name="trainingRecommendation" class="form-control" rows="2"></textarea>
            </div>

            <button type="submit" class="btn btn-success w-100 mb-2">
              <i class="cil-check"></i> Complete Evaluation
            </button>
          </form>

          <form method="post" th:action="@{/manager/evaluation/review/{id}/reject(id=${assignment.assignmentId})}">
            <div class="mb-3">
              <label class="form-label">Rejection Reason:</label>
              <textarea name="rejectReason" class="form-control" rows="3" required></textarea>
            </div>
            <button type="submit" class="btn btn-danger w-100">
              <i class="cil-x"></i> Return to Employee
            </button>
          </form>

        </div>
      </div>

    </div>
  </div>

</div>
</body>
</html>

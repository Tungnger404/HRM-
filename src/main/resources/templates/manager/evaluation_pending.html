<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
  <title>Manager - Pending Evaluations</title>
</head>
<body>
<div layout:fragment="content">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h3 class="mb-1">Pending Evaluations</h3>
    </div>
  </div>

  <div class="card">
    <div class="card-body table-responsive">
      <table class="table table-hover table-bordered align-middle">
        <thead>
        <tr>
          <th>Assignment ID</th>
          <th>Employee ID</th>
          <th>Cycle ID</th>
          <th>Submitted Date</th>
          <th>HR Verified At</th>
          <th>Status</th>
          <th style="width:150px;">Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="a : ${assignments}">
          <td th:text="${a.assignmentId}"></td>
          <td th:text="${a.empId}"></td>
          <td th:text="${a.cycleId}"></td>
          <td th:text="${#temporals.format(a.employeeSubmittedAt, 'dd/MM/yyyy HH:mm')}"></td>
          <td th:text="${#temporals.format(a.hrVerifiedAt, 'dd/MM/yyyy HH:mm')}"></td>
          <td>
            <span class="badge bg-success">HR Verified</span>
          </td>
          <td>
            <a class="btn btn-sm btn-primary" 
               th:href="@{/manager/evaluation/review/{id}(id=${a.assignmentId})}">
              Review
            </a>
          </td>
        </tr>

        <tr th:if="${#lists.isEmpty(assignments)}">
          <td colspan="7" class="text-center text-muted">No evaluations pending review</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
</body>
</html>

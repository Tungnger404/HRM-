<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>Promotion Recommendations - HRM System</title>
    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>
    <meta name="_csrf_parameter" th:content="${_csrf?.parameterName}"/>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid">
        <div class="row mb-4">
            <div class="col-12">
                <h2>Promotion Recommendations</h2>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                        <li class="breadcrumb-item active">Promotion Recommendations</li>
                    </ol>
                </nav>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <strong><i class="fa fa-users"></i> Promotion Review Candidates</strong>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Full Name</th>
                                        <th>Position</th>
                                        <th>Eligibility</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="emp : ${employees}">
                                        <td th:text="${emp.empId}">001</td>
                                        <td th:text="${emp.fullName}">Nguyen Van A</td>
                                        <td>
                                            <span th:text="${emp.currentPositionTitle != null ? emp.currentPositionTitle : 'N/A'}">N/A</span>
                                        </td>
                                        <td>
                                            <span class="badge"
                                                  th:classappend="${emp.isEligible} ? 'bg-success' : 'bg-secondary'"
                                                  th:text="${emp.isEligible} ? 'Eligible' : 'Not eligible'">
                                                Eligible
                                            </span>
                                        </td>
                                        <td>
                                            <button type="button" 
                                                    class="btn btn-sm btn-info"
                                                    onclick="showReviewModal(this)"
                                                    th:attr="data-emp-id=${emp.empId}, data-emp-name=${emp.fullName}, data-position=${emp.currentPosition}, data-current-level=${emp.currentPositionLevel}, data-is-eligible=${emp.isEligible}">
                                                <i class="fa fa-eye"></i> Review
                                            </button>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(employees)}">
                                        <td colspan="5" class="text-center text-muted">No employees found</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Review Employee -->
    <div class="modal fade" id="reviewModal" tabindex="-1" aria-labelledby="reviewModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="reviewModalLabel">
                        <i class="fa fa-user-check"></i> Employee Review
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-coreui-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="modalContent">
                        <div class="text-center">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-coreui-dismiss="modal">
                        <i class="fa fa-times"></i> Close
                    </button>
                    <button type="button" class="btn btn-success" id="submitPromotionBtn" onclick="showPromotionForm()">
                        <i class="fa fa-arrow-up"></i> Submit Promotion Recommendation
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Promotion Form -->
    <div class="modal fade" id="promotionFormModal" tabindex="-1" aria-labelledby="promotionFormModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="promotionFormModalLabel">
                        <i class="fa fa-arrow-up"></i> Submit Promotion Recommendation
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-coreui-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="promotionFormContent">
                </div>
            </div>
        </div>
    </div>

    <!-- Server-rendered options template to avoid JS inline serialization issues -->
    <select id="positionOptionsTemplate" class="d-none" aria-hidden="true" tabindex="-1">
        <option th:each="pos : ${positions}"
                th:value="${pos.jobId}"
                th:attr="data-level=${pos.jobLevel}"
                th:text="${pos.title != null ? pos.title : ('Position ' + pos.jobId)}">
            Position
        </option>
    </select>
</div>

<div layout:fragment="script">
<script th:inline="javascript">
    let currentEmpData = {};
    const validPositionIdsByEmpId = /*[[${validPositionIdsByEmpId}]]*/ {};
    const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content') || '';
    const csrfParamName = document.querySelector('meta[name="_csrf_parameter"]')?.getAttribute('content') || '_csrf';

    function showReviewModal(button) {
        currentEmpData = {
            empId: button.getAttribute('data-emp-id'),
            empName: button.getAttribute('data-emp-name'),
            position: button.getAttribute('data-position'),
            currentLevel: button.getAttribute('data-current-level'),
            isEligible: button.getAttribute('data-is-eligible') === 'true'
         };

        const reviewModalElement = document.getElementById('reviewModal');
        if (!reviewModalElement) {
            console.error('❌ Modal element #reviewModal not found!');
             return;
        }

        let modalInstance = coreui.Modal.getInstance(reviewModalElement);
        if (!modalInstance) {
            modalInstance = new coreui.Modal(reviewModalElement);
        }

        document.getElementById('modalContent').innerHTML = `
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2">Loading employee information...</p>
            </div>
        `;
        
        modalInstance.show();

        fetch('/manager/promotion/review/' + currentEmpData.empId)
            .then(response => {
                if (!response.ok) throw new Error('Failed to load data: ' + response.status);
                return response.json();
            })
            .then(data => {
                renderReviewContent(data);
            })
            .catch(error => {
                console.error('Error loading review:', error);
                document.getElementById('modalContent').innerHTML = `
                    <div class="alert alert-danger">
                        <i class="fa fa-exclamation-circle"></i>
                        <strong>Error:</strong> ${error.message}
                    </div>
                `;
            });
    }
    
    function renderReviewContent(data) {
        const employee = data.employee || {};
        const evaluations = data.evaluations || [];
        const emptyMessage = data.emptyMessage || 'No evaluation information available for this employee.';

        let evaluationRows = '';
        evaluations.forEach((eval) => {
            const cycleInfo = eval.cycleId ? `Cycle ${eval.cycleId}` : 'N/A';
            const score = eval.managerScore != null ? eval.managerScore + ' / 100' : 'N/A';
            const classification = eval.classification || 'N/A';
            
            evaluationRows += `
                <tr>
                    <td>${cycleInfo}</td>
                    <td><span class="badge bg-primary">${score}</span></td>
                    <td><span class="badge bg-info">${classification}</span></td>
                </tr>
            `;
        });
        
        if (!data.hasEvaluations || evaluationRows === '') {
            evaluationRows = `<tr><td colspan="3" class="text-center text-muted">${emptyMessage}</td></tr>`;
        }
        
        const html = `
            <!-- Section 1: Employee Summary -->
            <div class="card border-primary mb-3">
                <div class="card-header bg-primary text-white">
                    <strong><i class="fa fa-user"></i> Employee Summary</strong>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <p class="mb-2"><strong>ID:</strong> ${employee.empId || 'N/A'}</p>
                            <p class="mb-2"><strong>Name:</strong> ${employee.fullName || 'N/A'}</p>
                            <p class="mb-2"><strong>Department:</strong> ${employee.department || 'N/A'}</p>
                        </div>
                        <div class="col-md-6">
                            <p class="mb-2"><strong>Current Position:</strong> ${employee.jobTitle || 'N/A'}</p>
                            <p class="mb-2"><strong>Direct Manager:</strong> ${employee.directManager || 'N/A'}</p>
                            <p class="mb-2"><strong>Completed Cycles:</strong> ${data.evaluationCount || 0}</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Section 2: Evaluation History -->
            <div class="card border-info mb-3">
                <div class="card-header bg-info text-white">
                    <strong><i class="fa fa-star"></i> Completed Evaluation Cycles</strong>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-sm table-bordered mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Evaluation Period</th>
                                    <th>Final Score (Manager)</th>
                                    <th>Classification</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${evaluationRows}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('modalContent').innerHTML = html;
    }
    
    function showPromotionForm() {
        const reviewModalElement = document.getElementById('reviewModal');
        if (!reviewModalElement) {
            console.error('❌ Modal element not found');
            return;
        }

        let reviewModalInstance = coreui.Modal.getInstance(reviewModalElement);
        if (reviewModalInstance) {
            reviewModalInstance.hide();
        }

        if (!currentEmpData || !currentEmpData.empId) {
            console.error('❌ Missing current employee data for promotion form');
            return;
        }
        
        let positionOptions = '<option value="">-- Select position --</option>';
        const positionTemplate = document.getElementById('positionOptionsTemplate');
        const currentJobId = Number.parseInt(currentEmpData.position, 10);
        const validPositionIds = (validPositionIdsByEmpId && validPositionIdsByEmpId[currentEmpData.empId])
            ? validPositionIdsByEmpId[currentEmpData.empId].map(v => Number.parseInt(v, 10))
            : [];
        let validOptionCount = 0;

        if (positionTemplate && positionTemplate.options.length > 0) {
            Array.from(positionTemplate.options).forEach(option => {
                const optionJobId = Number.parseInt(option.value, 10);
                if (!Number.isNaN(currentJobId) && optionJobId === currentJobId) {
                    return;
                }
                if (!validPositionIds.includes(optionJobId)) {
                    return;
                }
                validOptionCount += 1;
                positionOptions += `<option value="${option.value}">${option.text}</option>`;
            });
        } else {
            positionOptions += '<option disabled>No positions available</option>';
        }

        if (validOptionCount === 0) {
            positionOptions += '<option disabled>No higher-level positions available</option>';
        }

        const notEligibleAlert = !currentEmpData.isEligible
            ? `<div class="alert alert-warning">This employee is not eligible for promotion under the current business rule.</div>`
            : '';
        const noHigherLevelAlert = validOptionCount === 0
            ? `<div class="alert alert-warning">No position with a higher level than the employee's current position was found.</div>`
            : '';
        const submitDisabled = (validOptionCount === 0 || !currentEmpData.isEligible) ? 'disabled' : '';

        const formHtml = `
            <form id="promotionSubmitForm" method="post" action="/manager/promotion/submit">
                <input type="hidden" name="empId" value="${currentEmpData.empId}">
                <input type="hidden" name="${csrfParamName}" value="${csrfToken}">
                
                <div class="mb-3">
                    <label class="form-label"><strong>Employee:</strong></label>
                    <p class="form-control-plaintext">${currentEmpData.empName} (ID: ${currentEmpData.empId})</p>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Proposed Position <span class="text-danger">*</span></label>
                    <select class="form-select" name="proposedPositionId" required>
                        ${positionOptions}
                    </select>
                </div>
                ${notEligibleAlert}
                ${noHigherLevelAlert}

                <div class="mb-3">
                    <label class="form-label">Promotion Reason <span class="text-danger">*</span></label>
                    <textarea class="form-control" name="reason" rows="5" placeholder="Enter the promotion reason..." required></textarea>
                </div>
                
                <div class="alert alert-info">
                    <i class="fa fa-info-circle"></i> 
                    This promotion recommendation will be sent to HR for final approval.
                </div>
                
                <div class="d-flex justify-content-end gap-2">
                    <button type="button" class="btn btn-secondary" data-coreui-dismiss="modal" onclick="closPromotionForm()">
                        <i class="fa fa-times"></i> Cancel
                    </button>
                    <button type="submit" class="btn btn-success" ${submitDisabled}>
                        <i class="fa fa-paper-plane"></i> Send to HR
                    </button>
                </div>
            </form>
        `;
        
        document.getElementById('promotionFormContent').innerHTML = formHtml;
        
        const promotionFormModalElement = document.getElementById('promotionFormModal');
        if (!promotionFormModalElement) {
            console.error('❌ Modal #promotionFormModal not found');
            return;
        }

        let promotionModalInstance = coreui.Modal.getInstance(promotionFormModalElement);
        if (!promotionModalInstance) {
            promotionModalInstance = new coreui.Modal(promotionFormModalElement);
        }

        promotionModalInstance.show();
    }

    function closPromotionForm() {
        const promotionFormModalElement = document.getElementById('promotionFormModal');
        let promotionModalInstance = coreui.Modal.getInstance(promotionFormModalElement);
        if (promotionModalInstance) {
            promotionModalInstance.hide();
        }
    }
</script>
</div>
</body>
</html>

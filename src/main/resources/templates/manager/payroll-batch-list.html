<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>Payroll Batches</title>
</head>

<body>
<div layout:fragment="content">

    <h2 class="mb-3">
        Payroll Batches (<span th:text="${periodName}"></span>)
    </h2>

    <div class="mb-3 d-flex justify-content-end">
        <form method="post"
              th:action="@{/manager/payroll/periods/{id}/generate(id=${periodId})}">
            <div th:if="${_csrf != null}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            </div>
            <button class="btn btn-primary" type="submit">
                + Generate Draft
            </button>
        </form>
    </div>

    <div class="card">
        <div class="card-body table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead>
                <tr>
                    <th>Batch</th>
                    <th>Status</th>
                    <th class="text-end">Total Gross</th>
                    <th class="text-end">Total Net</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="b : ${batches}">
                    <td th:text="${b.name}"></td>
                    <td th:text="${b.status}"></td>

                    <!-- ✅ bỏ .00 + có dấu phân cách -->
                    <td class="text-end"
                        th:text="${b.totalGross == null ? '0' : #numbers.formatDecimal(b.totalGross, 1, 'COMMA', 0, 'POINT')}"></td>

                    <td class="text-end"
                        th:text="${b.totalNet == null ? '0' : #numbers.formatDecimal(b.totalNet, 1, 'COMMA', 0, 'POINT')}"></td>

                    <td>
                        <a class="btn btn-sm btn-primary"
                           th:href="@{/manager/payroll/batches/{id}(id=${b.id})}">
                            View
                        </a>
                        <!-- Nút xóa chỉ cho DRAFT/REJECTED -->
                        <form th:if="${b.status == 'DRAFT' or b.status == 'REJECTED'}"
                              method="post"
                              th:action="@{/manager/payroll/batches/{id}/delete(id=${b.id})}"
                              style="display:inline;">
                            <div th:if="${_csrf != null}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            </div>
                            <button class="btn btn-sm btn-outline-danger" type="submit">🗑 Xóa</button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(batches)}">
                    <td colspan="5" class="text-center text-body-secondary">No data</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>

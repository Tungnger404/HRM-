<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
  <meta charset="UTF-8"/>
  <title>Manager - Managed Employees</title>
  <style>
    .wrap{max-width:1100px;margin:24px auto;padding:0 16px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .title{font-size:20px;font-weight:800}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    input,select{height:38px;padding:0 12px;border:1px solid #e5e7eb;border-radius:10px}
    .btn{height:38px;padding:0 12px;border:1px solid #e5e7eb;border-radius:10px;background:#fff;text-decoration:none;color:#111;display:inline-flex;align-items:center}
    .table{width:100%;border-collapse:collapse;margin-top:14px}
    .table th,.table td{padding:10px;border-bottom:1px solid #eee;text-align:left}
    .muted{color:#6b7280;font-size:13px}

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:92px;
      padding:4px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      border:1px solid transparent;
      line-height:1.2;
    }

    .badge-dept{
      background:#0247cf;
      color:#fff;
      border-color:#0247cf;
    }

    .badge-active{
      background:#dcfce7;
      color:#166534;
      border-color:#bbf7d0;
    }

    .badge-probation{
      background:#fef3c7;
      color:#92400e;
      border-color:#fcd34d;
    }

    .badge-onleave{
      background:#dbeafe;
      color:#1d4ed8;
      border-color:#93c5fd;
    }

    .badge-resigned{
      background:#fee2e2;
      color:#b91c1c;
      border-color:#fecaca;
    }

    .badge-default{
      background:#f3f4f6;
      color:#374151;
      border-color:#e5e7eb;
    }
  </style>
</head>
<body>
<div layout:fragment="content">
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div>
          <div class="title">Managed Employees</div>
          <div class="muted">
            Departments:
            <span th:if="${managedDepartments == null or #lists.isEmpty(managedDepartments)}">No managed department</span>
            <span th:each="d,st : ${managedDepartments}">
              <span class="badge badge-dept" th:text="${d.deptName}"></span><span th:if="${!st.last}"> </span>
            </span>
          </div>
        </div>

        <form method="get" th:action="@{/manager/org/employees}" class="row">
          <input type="text" name="q" placeholder="Search employee name..." th:value="${q}">
          <select name="status">
            <option value="" th:selected="${status == null or status == ''}">All status</option>
            <option value="PROBATION" th:selected="${status == 'PROBATION'}">PROBATION</option>
            <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">ACTIVE</option>
            <option value="ON_LEAVE" th:selected="${status == 'ON_LEAVE'}">ON_LEAVE</option>
            <option value="RESIGNED" th:selected="${status == 'RESIGNED'}">RESIGNED</option>
          </select>
          <button class="btn" type="submit">Filter</button>
          <a class="btn" th:href="@{/manager/org/employees}">Reset</a>
        </form>
      </div>

      <table class="table">
        <thead>
        <tr>
          <th>Emp ID</th>
          <th>Full Name</th>
          <th>Phone</th>
          <th>Department</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${employees == null or #lists.isEmpty(employees)}">
          <td colspan="6" class="muted">No employees found.</td>
        </tr>
        <tr th:each="e : ${employees}">
          <td th:text="${e.empId}"></td>
          <td th:text="${e.fullName}"></td>
          <td th:text="${e.phone}"></td>
          <td th:text="${e.department != null ? e.department.deptName : '-'}"></td>
          <td>
            <span class="badge"
                  th:text="${e.status}"
                  th:classappend="${
                    #strings.equalsIgnoreCase(e.status, 'ACTIVE') ? ' badge-active' :
                    (#strings.equalsIgnoreCase(e.status, 'PROBATION') ? ' badge-probation' :
                    (#strings.equalsIgnoreCase(e.status, 'ON_LEAVE') ? ' badge-onleave' :
                    (#strings.equalsIgnoreCase(e.status, 'RESIGNED') ? ' badge-resigned' :
                    ' badge-default')))
                  }">
            </span>
          </td>
          <td>
            <a class="btn" th:href="@{'/manager/org/employees/' + ${e.empId}}">View / Edit</a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>

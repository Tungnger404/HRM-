<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>Assign Training - HRM System</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid">
        <div class="row mb-4">
            <div class="col-12">
                <h2>Assign Training</h2>
                <p class="text-muted mb-0">Create training assignments for employees in your team.</p>
            </div>
        </div>

        <div class="row mb-3" th:if="${msg != null and !#strings.isEmpty(msg)}">
            <div class="col-12">
                <script th:inline="javascript">
                    document.addEventListener("DOMContentLoaded", function () {
                        showSuccessToast(/*[[${msg}]]*/ "");
                    });
                </script>
            </div>
        </div>

        <div class="row mb-3" th:if="${err != null and !#strings.isEmpty(err)}">
            <div class="col-12">
                <script th:inline="javascript">
                    document.addEventListener("DOMContentLoaded", function () {
                        showErrorToast(/*[[${err}]]*/ "");
                    });
                </script>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-12">
                <div class="card h-100">
                    <div class="card-header">
                        <strong>New Assignment</strong>
                    </div>
                    <div class="card-body">
                        <form method="post" th:action="@{/manager/training/assign}">
                            <div th:if="${_csrf != null}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            </div>

                            <div class="mb-3">
                                <label for="empId" class="form-label">Employee <span class="text-danger">*</span></label>
                                <select id="empId" name="empId" class="form-select" required>
                                    <option value="">-- Select employee --</option>
                                    <option th:each="emp : ${teamMembers}"
                                            th:value="${emp.empId}"
                                            th:selected="${selectedEmpId != null and selectedEmpId == emp.empId}"
                                            th:text="${emp.empId + ' - ' + emp.fullName}">1 - Employee</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="programId" class="form-label">Training Program <span class="text-danger">*</span></label>
                                <select id="programId" name="programId" class="form-select" required>
                                    <option value="">-- Select program --</option>
                                    <option th:each="program : ${programs}"
                                            th:value="${program.programId}"
                                            th:text="${program.programCode + ' - ' + program.programName}">TR-001 - Program</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="deadline" class="form-label">Deadline <span class="text-danger">*</span></label>
                                <input id="deadline" name="deadline" type="date" class="form-control"
                                       th:attr="min=${today}" required>
                                <small class="text-muted">Assigned date is generated automatically by the system.</small>
                            </div>

                            <div class="mb-3">
                                <label for="objective" class="form-label">Training Objective <span class="text-danger">*</span></label>
                                <textarea id="objective" name="objective" class="form-control" rows="4"
                                          placeholder="State why this training is needed and the expected outcome."
                                          required></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary">
                                <i class="fa fa-plus-circle"></i> Assign Training
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

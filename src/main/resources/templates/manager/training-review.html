<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>Training Evidence Confirmations - HRM System</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid">
        <div class="row mb-4">
            <div class="col-12">
                <h2>Training Evidence Confirmations</h2>
                <p class="text-muted mb-0">Review certificate evidence submitted by your team and confirm completion.</p>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <strong>Pending Confirmations</strong>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Employee</th>
                                        <th>Course</th>
                                        <th>Submitted Date</th>
                                        <th>Completion Date</th>
                                        <th>Action / View Detail</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:if="${#lists.isEmpty(submissions)}">
                                        <td colspan="5" class="text-center text-muted">No pending submissions</td>
                                    </tr>
                                    <tr th:each="sub : ${submissions}">
                                        <td th:text="${empNames[sub.empId] != null ? empNames[sub.empId] : ('ID: ' + sub.empId)}">Employee Name</td>
                                        <td th:text="${sub.programName}">Java Programming</td>
                                        <td th:text="${sub.submittedAt != null ? #temporals.format(sub.submittedAt, 'dd/MM/yyyy HH:mm') : 'N/A'}">15/03/2024 10:30</td>
                                        <td th:text="${sub.completionDate != null ? #temporals.format(sub.completionDate, 'dd/MM/yyyy') : 'N/A'}">15/03/2024</td>
                                        <td>
                                            <a th:href="@{/manager/training/evidence-confirmations/{id}(id=${sub.assignId})}"
                                               class="btn btn-sm btn-info">
                                                <i class="fa fa-eye"></i> View Detail
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

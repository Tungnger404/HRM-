<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<body>
<div layout:fragment="content">
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">View Request - Pending (Manager)</h5>
        </div>
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Employee</th>
                        <th>Type</th>
                        <th>Target Date</th>
                        <th>Reason</th>
                        <th>Created At</th>
                        <th>Decision</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="r : ${requests}">
                        <td th:text="${r.requestId}"></td>
                        <td th:text="${r.empId}"></td>
                        <td th:text="${r.requestType}"></td>
                        <td th:text="${r.targetWorkDate != null ? #temporals.format(r.targetWorkDate,'dd/MM/yyyy') : '-'}"></td>
                        <td th:text="${r.reason}"></td>
                        <td th:text="${#temporals.format(r.createdAt,'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <form th:action="@{/manager/attendance-requests/{id}/approve(id=${r.requestId})}" method="post" class="mb-2">
                                <input type="text" name="note" class="form-control form-control-sm mb-1" placeholder="Approve note (optional)">
                                <button class="btn btn-sm btn-success w-100" type="submit">Approve</button>
                            </form>
                            <form th:action="@{/manager/attendance-requests/{id}/reject(id=${r.requestId})}" method="post">
                                <input type="text" name="note" class="form-control form-control-sm mb-1" placeholder="Reject note (optional)">
                                <button class="btn btn-sm btn-danger w-100" type="submit">Reject</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(requests)}">
                        <td colspan="7" class="text-center text-muted">No pending requests.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${job.title}">Job Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <a href="/careers" class="btn btn-secondary mb-3">← Back to list</a>

    <div class="card shadow">
        <div class="card-body">

            <h2 th:text="${job.title}">Job Title</h2>

            <p>
                <strong>Views:</strong>
                <span th:text="${job.viewCount}"></span>
            </p>

            <hr>

            <h5>Description</h5>
            <div th:utext="${job.description}"></div>

            <h5 class="mt-4">Requirements</h5>
            <div th:utext="${job.requirements}"></div>

            <h5 class="mt-4">Benefits</h5>
            <div th:utext="${job.benefits}"></div>

            <hr class="mt-4">

            <h4 class="mt-4">Apply for this position</h4>

            <div th:if="${error}" class="alert alert-danger"
                 th:text="${error}"></div>

            <form th:action="@{'/careers/' + ${job.slug} + '/apply'}"
                  th:object="${applyForm}"
                  method="post">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text"
                           th:field="*{fullName}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email"
                           th:field="*{email}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text"
                           th:field="*{phone}"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">CV URL (Google Drive link)</label>
                    <input type="text"
                           th:field="*{cvUrl}"
                           class="form-control">
                </div>

                <button type="submit" class="btn btn-success">
                    Submit Application
                </button>
            </form>

        </div>
    </div>

</div>

</body>
</html>

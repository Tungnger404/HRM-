<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Career Opportunities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Career Opportunities</h2>

    <div th:if="${#lists.isEmpty(jobs)}" class="alert alert-info">
        No job openings available at the moment.
    </div>

    <div class="row" th:each="job : ${jobs}">
        <div class="col-md-12 mb-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${job.title}">Job Title</h5>

                    <p class="card-text">
                        <strong>Department:</strong>
                        <span th:text="${job.recruitmentRequest.department.deptName}">Dept</span>
                    </p>

                    <p class="card-text">
                        <strong>Expiry Date:</strong>
                        <span th:text="${job.expiryDate}"></span>
                    </p>

                    <a class="btn btn-primary"
                       th:href="@{'/careers/' + ${job.slug}}">
                        View Details
                    </a>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>

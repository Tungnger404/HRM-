spring.application.name=hrm

# Active profile for local development
# This loads application-local.properties automatically
spring.profiles.active=local

# Database configuration
# For local development, copy values from application-local.properties
# Or set via environment variables: DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=hrm_system_db;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=CHANGE_ME
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

# ===============================
# Swagger/OpenAPI Configuration
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=false

# Scan all controllers
springdoc.packages-to-scan=com.example.hrm

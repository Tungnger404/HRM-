<form th:action="@{/onboarding/save}" method="post">

    <input type="hidden"
           name="candidateId"
           th:value="${candidate.candidateId}">

    <div>
        <label for="startDate">Start Date</label>
        <input type="date"
               id="startDate"
               name="startDate"
               required>
    </div>

    <div>
        <label for="department">Department</label>
        <input type="text"
               id="department"
               name="department"
               required>
    </div>

    <div>
        <label for="note">Note</label>
        <textarea id="note"
                  name="note"></textarea>
    </div>

    <button type="submit">Complete Onboarding</button>

</form>
